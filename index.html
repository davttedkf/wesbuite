<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Specimens</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #121212;
      --accent: #a38a6d;
      --bg: #f8f8f6;
      --white: #ffffff;
      --border: #e2e2df;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      opacity: 0; visibility: hidden; transition: 0.3s ease; z-index: 1500;
    }
    #overlay.active { opacity: 1; visibility: visible; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 5%; background: var(--white); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1000;
    }

    .logo { font-weight: 800; letter-spacing: 5px; text-transform: uppercase; cursor: pointer; }

    .cart-trigger { position: relative; cursor: pointer; font-size: 1.2rem; }

    .badge {
      position: absolute; top: -10px; right: -12px;
      background: var(--primary); color: white;
      font-size: 10px; width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

    .screen { display: none; }
    .screen.active { display: block; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

    .product-card {
      background: white;
      border: 1px solid var(--border);
      padding: 24px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-transform: uppercase;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      font-family: inherit;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .reviews { margin-top: 80px; border-top: 1px solid var(--border); padding-top: 40px; }

  </style>
</head>

<body>

<div id="overlay" onclick="toggleCart()"></div>

<nav>
  <div class="logo" onclick="location.reload()">LITHOS</div>
  <div class="cart-trigger" onclick="toggleCart()">
    <i class="fa-solid fa-bag-shopping"></i>
    <span class="badge" id="badge-count">0</span>
  </div>
</nav>

<!-- SHOP -->
<section id="shop-screen" class="screen active">
  <div class="container">

    <h1 style="margin-bottom:40px;">Select your companion.</h1>

    <div class="grid">
      <div class="product-card">
        <h3>Highland Slate</h3>
        <button class="btn" onclick="addToCart('Highland Slate', 34, 'fa-mountain')">Add</button>
      </div>
      <div class="product-card">
        <h3>River Stone</h3>
        <button class="btn" onclick="addToCart('River Stone', 28, 'fa-water')">Add</button>
      </div>
    </div>

  </div>
</section>

<!-- CHECKOUT -->
<section id="payment-screen" class="screen">
  <div class="container">

    <h1>Checkout</h1>

    <input id="cust-name" placeholder="Full Name">

    <!-- ✅ ONLY CHANGE: Google autocomplete works on this -->
    <input id="cust-street" placeholder="Street Address">

    <div style="display:flex; gap:10px;">
      <input id="cust-city" placeholder="City">
      <input id="cust-zip" placeholder="Zip">
    </div>

    <button class="btn" onclick="processOrder()">Place Order</button>

  </div>
</section>

<script>
  let cart = [];

  function addToCart(name, price, icon) {
    cart.push({ name, price, icon, qty: 1 });
    document.getElementById("payment-screen").classList.add("active");
    document.getElementById("shop-screen").classList.remove("active");
  }

  function processOrder() {
    const street = document.getElementById("cust-street").value;
    if (!street) return alert("Enter address");
    alert("Order placed!");
  }

  // ✅ GOOGLE AUTOCOMPLETE
  function initAutocomplete() {
    const input = document.getElementById("cust-street");

    new google.maps.places.Autocomplete(input, {
      types: ["address"],
      componentRestrictions: { country: "us" }
    });
  }
</script>

<!-- ✅ GOOGLE MAPS API -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvx7-qMTAhpyX71-XA9b0blPKulmDIpYs&libraries=places&callback=initAutocomplete"
  async
  defer>
</script>

</body>
</html>
