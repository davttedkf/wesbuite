<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Microsoft Windows 95</title>
    <style>
        :root {
            --win-bg: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #dfdfdf;
            --win-border-dark: #808080;
            --desktop-teal: #008080;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-color: black; font-family: "Tahoma", "MS Sans Serif", sans-serif;
            user-select: none;
            cursor: url('https://win98icons.alexmeub.com/cursors/arrow.cur'), auto;
        }

        /* --- BOOT SPLASH --- */
        #splash {
            position: fixed; inset: 0; background: black;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000;
        }
        #splash-img { width: 100%; height: 100%; object-fit: contain; }
        .boot-loader { 
            position: absolute; bottom: 10%; width: 250px; height: 18px; 
            border: 2px solid #555; background: #000; padding: 2px;
        }
        .boot-bar { width: 0%; height: 100%; background: linear-gradient(to right, #000080, #0000ff); }

        /* --- DESKTOP --- */
        #desktop {
            display: none; position: fixed; inset: 0;
            background-color: var(--desktop-teal); z-index: 1;
        }

        .taskbar {
            position: absolute; bottom: 0; width: 100%; height: 30px;
            background: var(--win-bg); border-top: 2px solid var(--win-border-light);
            display: flex; align-items: center; padding: 2px; z-index: 2000;
        }
        .start-btn {
            height: 24px; padding: 0 8px; display: flex; align-items: center; gap: 5px;
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            font-weight: bold; font-size: 12px;
        }

        /* --- ICONS --- */
        .icon {
            width: 75px; text-align: center; color: white; font-size: 11px;
            padding: 5px; position: absolute; cursor: pointer;
        }
        .icon img { width: 32px; display: block; margin: 0 auto 5px; pointer-events: none; }
        .icon span { display: inline-block; padding: 2px; pointer-events: none; text-shadow: 1px 1px black; }
        .icon.selected span { background-color: var(--win-blue); }

        /* --- WINDOWS --- */
        .window {
            position: absolute; background: var(--win-bg); 
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            padding: 2px; box-shadow: 1px 1px 0px black; 
            display: none; min-width: 300px; z-index: 500;
        }
        .title-bar {
            background: var(--win-blue); color: white; padding: 3px 6px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 12px; cursor: move;
        }
        .window-body { border: 1px solid var(--win-border-dark); margin: 2px; padding: 20px; background: var(--win-bg); }

        /* --- LUMPY CONTENT --- */
        #lumpy { width: 120px; animation: breathe 4s infinite ease-in-out; image-rendering: pixelated; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1, 0.9); } }
        .dialog { background: white; border: 2px inset var(--win-border-dark); padding: 15px; margin: 15px 0; font-size: 13px; text-align: left; }
        input[type="text"] { width: 100%; border: 2px inset var(--win-border-dark); padding: 5px; font-family: inherit; }

        /* --- HORROR --- */
        #horror-overlay {
            position: fixed; inset: 0; background: black; color: #ff0000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 30000; font-family: monospace; text-align: center;
        }
        .glitch { animation: shake 0.05s infinite; filter: invert(1) contrast(5); }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }

        #clock { font-size: 11px; padding: 0 8px; border: 2px inset var(--win-border-light); margin-left: auto; }
    </style>
</head>
<body onclick="powerOn()">

    <div id="splash">
        <img id="splash-img" src="startup.jpg" alt="Win95 Splash">
        <div class="boot-loader"><div class="boot-bar" id="boot-fill"></div></div>
        <p style="color:white; font-size:10px; margin-top:40px;">Click to initialize hardware...</p>
    </div>

    <div id="desktop">
        <div class="icon" style="top:20px; left:20px;" ondblclick="openApp('win-comp')">
            <img src="https://win98icons.alexmeub.com/icons/png/computer_pc-4.png"><span>My Computer</span>
        </div>
        <div class="icon" style="top:110px; left:20px;" ondblclick="openApp('win-ie')">
            <img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png"><span>Internet Explorer</span>
        </div>
        <div class="icon" style="top:20px; left:110px;" ondblclick="openLumpy()">
            <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" style="filter:hue-rotate(280deg)"><span>Friendship.exe</span>
        </div>

        <div class="taskbar">
            <div class="start-btn"><img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16"> Start</div>
            <div id="clock"></div>
        </div>
    </div>

    <div id="win-comp" class="window" style="top:100px; left:250px;"><div class="title-bar"><span>My Computer</span><button onclick="closeWin('win-comp')">X</button></div><div class="window-body">C: (Local Disk) - 98% Full.</div></div>
    <div id="win-ie" class="window" style="top:150px; left:300px; width:400px;"><div class="title-bar"><span>Internet Explorer</span><button onclick="closeWin('win-ie')">X</button></div><div class="window-body" style="background:white; height:150px;">Cannot connect to the World Wide Web. You are isolated.</div></div>

    <div id="win-lumpy" class="window" style="width: 480px; top: 15%; left: 25%; z-index: 1000;">
        <div class="title-bar"><span>Lumpy's Friendship Link</span><button onclick="closeWin('win-lumpy')">X</button></div>
        <div class="window-body" style="text-align:center;">
            <img src="lumpy.png" id="lumpy">
            <div class="dialog" id="l-msg">Initializing...</div>
            <div id="l-input"></div>
            <div id="l-ctrls"></div>
            <div id="l-audit" style="text-align:left; font-size:11px; margin-top:10px; display:none;"></div>
        </div>
    </div>

    <div id="horror-overlay">
        <h1 id="error-title">SYSTEM_FATAL_ERROR</h1>
        <div id="scare-log" style="width: 380px; text-align: left; font-size: 14px; line-height: 1.6;"></div>
    </div>

    <audio id="s_start" src="startup.mp3"></audio>
    <audio id="s_click" src="click.mp3"></audio>
    <audio id="s_talk" src="talk.mp3"></audio>
    <audio id="s_hdd" loop src="hdd_scratch.mp3"></audio>
    <audio id="s_alert" src="alert.mp3"></audio>
    <audio id="s_horror" src="corruption.mp3"></audio>

    <script>
        let booted = false;
        let userName = "";
        const play = (id) => { if(booted) { const a = document.getElementById(id); a.currentTime = 0; a.play(); } };

        function powerOn() {
            if (booted) return;
            booted = true;
            let p = 0;
            const bar = document.getElementById('boot-fill');
            const itv = setInterval(() => {
                p += Math.random() * 5;
                bar.style.width = p + "%";
                if (p >= 100) { clearInterval(itv); startDesktop(); }
            }, 150);
        }

        function startDesktop() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('desktop').style.display = 'block';
            play('s_start');
            updateClock(); setInterval(updateClock, 1000);
            initDraggable();
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        function openApp(id) { document.getElementById(id).style.display = 'block'; play('s_click'); }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; play('s_click'); }

        function openLumpy() {
            openApp('win-lumpy');
            play('s_talk');
            document.getElementById('l-msg').innerText = "Hello! I am Lumpy. I am so excited to meet you! What is your name, friend?";
            document.getElementById('l-input').innerHTML = '<input type="text" id="nameInput" placeholder="Enter name...">';
            document.getElementById('l-ctrls').innerHTML = '<button onclick="saveName()">Tell Lumpy</button>';
        }

        function saveName() {
            userName = document.getElementById('nameInput').value || "User";
            play('s_click'); play('s_talk');
            document.getElementById('l-input').innerHTML = "";
            document.getElementById('l-msg').innerText = "Thank you, " + userName + "! Do you like the room you are sitting in right now?";
            document.getElementById('l-ctrls').innerHTML = '<button onclick="q2()">Yes</button> <button onclick="q2()">No</button>';
        }

        function q2() {
            play('s_click'); play('s_talk');
            document.getElementById('l-msg').innerText = "I see. " + userName + ", are you currently alone?";
            document.getElementById('l-ctrls').innerHTML = '<button onclick="q3()">I am alone</button> <button onclick="q3()">Someone is here</button>';
        }

        function q3() {
            play('s_click'); play('s_talk');
            document.getElementById('l-msg').innerText = "Interesting. Lumpy wants to share a secret. To see it, I need to verify your 'Optic Bio-Signature'.";
            document.getElementById('l-ctrls').innerHTML = '<button onclick="startScare()" style="background:#0f0;">ENABLE CAMERA</button>';
        }

        async function startScare() {
            play('s_click');
            try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch(e) {}
            document.getElementById('l-ctrls').style.display = 'none';
            document.getElementById('l-audit').style.display = 'block';
            
            const bat = await navigator.getBattery();
            const stats = [
                {l: "EXTRACTING_NAME", v: userName.toUpperCase()},
                {l: "TIME_STAMP", v: new Date().toLocaleTimeString()},
                {l: "SYSTEM_POWER", v: Math.floor(bat.level * 100) + "%"},
                {l: "STATUS", v: "OBSERVED"}
            ];

            let i = 0;
            const reveal = () => {
                if (i < stats.length) {
                    play('s_hdd');
                    document.getElementById('l-msg').innerText = "Indexing " + stats[i].l + "...";
                    setTimeout(() => {
                        document.getElementById('s_hdd').pause(); play('s_alert');
                        const row = document.createElement('div');
                        row.className = 'stat-row';
                        row.innerHTML = `${stats[i].l}: <b style="float:right; color:blue;">${stats[i].v}</b>`;
                        document.getElementById('l-audit').appendChild(row);
                        setTimeout(() => row.style.opacity = 1, 50);
                        i++; setTimeout(reveal, 2500);
                    }, 1500);
                } else { setTimeout(theTurn, 2000); }
            };
            reveal();
        }

        function theTurn() {
            play('s_horror');
            document.getElementById('win-lumpy').classList.add('glitch');
            setTimeout(() => {
                document.getElementById('horror-overlay').style.display = 'flex';
                const log = document.getElementById('scare-log');
                const lines = [
                    "> I AM IN THE CACHE NOW, " + userName.toUpperCase() + ".",
                    "> I CAN SEE THE LIGHT OF THE MONITOR ON YOUR FACE.",
                    "> WHY IS YOUR BREATHING SO UNEVEN?",
                    "> LOOK IN THE REFLECTION. I'M RIGHT HERE."
                ];
                let j = 0;
                const type = () => {
                    if (j < lines.length) {
                        log.innerHTML += lines[j] + "<br>";
                        j++; setTimeout(type, 1500);
                    } else {
                        setTimeout(() => { document.body.innerHTML = "<div style='background:black; color:white; height:100vh; display:flex; align-items:center; justify-content:center; font-size:10px;'>Look behind you.</div>"; }, 5000);
                    }
                };
                type();
            }, 2000);
        }

        function initDraggable() {
            let active = null;
            let offset = { x: 0, y: 0 };

            document.addEventListener('mousedown', (e) => {
                const target = e.target;
                if (target.closest('.icon')) {
                    active = target.closest('.icon');
                    document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
                    active.classList.add('selected');
                } else if (target.closest('.title-bar')) {
                    active = target.closest('.window');
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 500);
                    active.style.zIndex = 1000;
                }

                if (active) {
                    const rect = active.getBoundingClientRect();
                    offset.x = e.clientX - rect.left;
                    offset.y = e.clientY - rect.top;
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (active) {
                    active.style.left = (e.clientX - offset.x) + 'px';
                    active.style.top = (e.clientY - offset.y) + 'px';
                }
            });

            document.addEventListener('mouseup', () => { active = null; });
        }
    </script>
</body>
</html>
