<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINGO! | CHALLENGE LEGENDS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b112b;
            --ui-panel: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2ff;
            --cup-red: #d92121;
            --money-yellow: #f1c40f;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- TOP NAVIGATION (Wingo Style) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.3);
        }
        .logo-group { display: flex; align-items: baseline; gap: 10px; }
        .logo-main { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }
        .logo-main span { color: var(--money-yellow); }
        .logo-sub { opacity: 0.6; font-size: 0.8rem; text-transform: uppercase; }

        /* --- THE STAGE --- */
        #game-stage {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            padding-bottom: 50px;
            perspective: 1000px;
        }

        .cup-container {
            position: absolute;
            width: 130px;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }

        .cup-num {
            font-weight: 900;
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0;
            color: white;
        }

        .red-cup {
            width: 120px;
            height: 150px;
            background: linear-gradient(to bottom, #ff4d4d, #990000);
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            border-bottom: 6px solid #440000;
            margin: 0 auto;
            position: relative;
        }
        
        .cup-logo {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: url('https://upload.wikimedia.org/wikipedia/en/d/db/MrBeast_logo.svg') no-repeat center;
            background-size: contain;
            filter: brightness(0) invert(1);
            opacity: 0.3;
        }

        .ball {
            position: absolute;
            width: 35px; height: 35px;
            background: radial-gradient(circle at 30% 30%, #fff, #8899aa);
            border-radius: 50%;
            bottom: 60px;
            display: none;
            z-index: 5;
        }

        /* --- STATS BAR --- */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; display: block; }
        .stat-value { font-weight: 700; font-size: 1.1rem; }

        /* --- BOTTOM CONTROL PANEL (Gambling Style) --- */
        .controls {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(10, 15, 40, 0.95);
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .bet-box {
            background: var(--ui-panel);
            padding: 10px 25px;
            border-radius: 12px;
        }
        .bet-label { font-size: 0.7rem; opacity: 0.6; }
        .bet-value { display: block; font-weight: 900; font-size: 1.2rem; }

        .go-btn {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: white;
            color: #0b112b;
            border: 8px solid #2d3656;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .go-btn:active { transform: scale(0.9); }
        .go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- MODALS --- */
        #result-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .result-text { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="logo-group">
            <div class="logo-main">WINGO<span>!</span></div>
            <div class="logo-sub">CHALLENGE LEGENDS</div>
        </div>
        <div style="font-size: 1.2rem;">10:59</div>
    </div>

    <div id="game-stage">
        <div id="ball" class="ball"></div>

        <div class="cup-container" id="cup0" style="left: calc(50% - 300px);">
            <div class="cup-num">1</div>
            <div class="red-cup"><div class="cup-logo"></div></div>
        </div>
        <div class="cup-container" id="cup1" style="left: calc(50% - 65px);">
            <div class="cup-num">2</div>
            <div class="red-cup"><div class="cup-logo"></div></div>
        </div>
        <div class="cup-container" id="cup2" style="left: calc(50% + 170px);">
            <div class="cup-num">3</div>
            <div class="red-cup"><div class="cup-logo"></div></div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-label">LUCK</span><span class="stat-value">0.0%</span></div>
        <div class="stat-item"><span class="stat-label">TRIES</span><span class="stat-value" id="tries">0</span></div>
        <div class="stat-item"><span class="stat-label">MULTIPLIER</span><span class="stat-value">x1.0</span></div>
    </div>

    <div class="controls">
        <div class="bet-box">
            <span class="bet-label">BALANCE</span>
            <span class="bet-value" id="balance">150 191.57 FUN</span>
        </div>

        <button class="go-btn" id="go-btn" onclick="Game.start()">GO!</button>

        <div class="bet-box" style="text-align: right;">
            <span class="bet-label">TOTAL BET</span>
            <span class="bet-value">1.50 FUN</span>
        </div>
    </div>

    <div id="result-overlay">
        <div class="result-text" id="result-title">FAILED</div>
        <button class="btn-action" style="padding: 15px 40px; border-radius: 10px; border:none; cursor:pointer; font-weight:900;" onclick="Game.reset()">TRY AGAIN</button>
    </div>

    <script>
        const Game = (function() {
            const state = {
                ballSlot: 0,
                isBusy: false,
                positions: [],
                cupOrder: [0, 1, 2],
                balance: 150191.57,
                tries: 0
            };

            return {
                start: function() {
                    if (state.isBusy) return;
                    state.isBusy = true;
                    document.getElementById('go-btn').disabled = true;

                    // Update UI
                    state.balance -= 1.50;
                    state.tries++;
                    document.getElementById('balance').innerText = state.balance.toLocaleString() + " FUN";
                    document.getElementById('tries').innerText = state.tries;

                    const ball = document.getElementById('ball');
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    
                    // 1. Initial Reveal
                    state.ballSlot = Math.floor(Math.random() * 3);
                    const startPos = cups[state.ballSlot].offsetLeft + 47;
                    gsap.set(ball, { left: startPos, display: 'block', bottom: 60 });

                    gsap.to(".red-cup", { y: -150, duration: 0.6, ease: "power2.out" });

                    // 2. Hide and Shuffle
                    setTimeout(() => {
                        gsap.to(".red-cup", { y: 0, duration: 0.4, onComplete: () => this.shuffle() });
                    }, 1200);
                },

                shuffle: async function() {
                    document.getElementById('ball').style.display = 'none';
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    const posValues = [
                        document.getElementById('cup0').offsetLeft,
                        document.getElementById('cup1').offsetLeft,
                        document.getElementById('cup2').offsetLeft
                    ];

                    for (let i = 0; i < 50; i++) {
                        let a = Math.floor(Math.random() * 3);
                        let b; do { b = Math.floor(Math.random() * 3); } while (a === b);

                        const speed = Math.max(0.04, 0.2 - (i * 0.005));
                        
                        const pA = posValues[state.cupOrder.indexOf(a)];
                        const pB = posValues[state.cupOrder.indexOf(b)];

                        gsap.to(cups[a], { left: pB, duration: speed });
                        await gsap.to(cups[b], { left: pA, duration: speed });

                        const iA = state.cupOrder.indexOf(a);
                        const iB = state.cupOrder.indexOf(b);
                        [state.cupOrder[iA], state.cupOrder[iB]] = [state.cupOrder[iB], state.cupOrder[iA]];
                    }

                    this.enableSelection();
                },

                enableSelection: function() {
                    gsap.to(".cup-num", { opacity: 1, duration: 0.5 });
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    cups.forEach((c, i) => {
                        c.onclick = () => this.reveal(i);
                    });
                },

                reveal: function(clickedIndex) {
                    // RIGGED LOGIC:
                    // If they picked the right one, move it to another cup silently
                    if (clickedIndex === state.ballSlot) {
                        state.ballSlot = (clickedIndex + 1) % 3;
                    }

                    const ball = document.getElementById('ball');
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    const finalBallPos = cups[state.ballSlot].offsetLeft + 47;
                    
                    gsap.set(ball, { left: finalBallPos, display: 'block' });
                    gsap.to(".red-cup", { y: -150, duration: 0.8, ease: "back.out" });
                    gsap.to(".cup-num", { opacity: 0 });

                    setTimeout(() => {
                        const overlay = document.getElementById('result-overlay');
                        overlay.style.display = 'flex';
                        document.getElementById('result-title').style.color = "#ff4d4d";
                    }, 1200);
                },

                reset: function() {
                    document.getElementById('result-overlay').style.display = 'none';
                    document.getElementById('go-btn').disabled = false;
                    gsap.set(".red-cup", { y: 0 });
                    document.getElementById('ball').style.display = 'none';
                    state.isBusy = false;
                }
            };
        })();
    </script>
</body>
</html>
