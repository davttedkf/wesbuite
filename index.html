<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Companions</title>
  <link rel="icon" href="favicon.ico?v=7">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #a38a6d; --bg: #ffffff; --light-bg: #f8f8f6; --border: #ececec; --success: #2d5a27; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }
    
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500; }
    #overlay.active { opacity: 1; visibility: visible; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
    .logo { font-weight: 800; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; font-size: 1.2rem; }
    .nav-icons { display: flex; gap: 20px; align-items: center; font-size: 1.1rem; }

    .container { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }
    .screen { display: none; animation: fadeIn 0.4s ease forwards; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .btn { 
      width: 100%; padding: 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px; 
      font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; font-size: 0.8rem; 
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
    }
    .btn:hover { transform: scale(1.02); background: #000; }
    .btn:active { transform: scale(0.98); }

    .shop-layout { display: flex; gap: 50px; }
    .sidebar { width: 200px; flex-shrink: 0; position: sticky; top: 100px; height: fit-content; }
    .sidebar h4 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: #aaa; }
    .sidebar-list { list-style: none; margin-bottom: 40px; }
    .sidebar-list li { padding: 10px 0; font-size: 0.9rem; color: #666; cursor: pointer; transition: 0.2s; }
    .sidebar-list li.active { color: var(--primary); font-weight: 700; border-left: 2px solid var(--primary); padding-left: 15px; margin-left: -17px; }

    .main-content { flex: 1; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .product-card { border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.3s; position: relative; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.06); }
    .img-box { width: 100%; aspect-ratio: 1; background: #f9f9f9; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .img-box img { width: 85%; }

    .card-rating { font-size: 0.75rem; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .badge { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; z-index: 10; }
    .badge-best { background: #121212; color: #fff; }
    .badge-fun { background: #ffeb3b; color: #000; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .detail-img-wrap { background: #f9f9f9; padding: 60px; border-radius: 20px; text-align: center; }
    .detail-img-wrap img { width: 100%; max-width: 400px; }

    .review-item { padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
    .review-scroll { max-height: 500px; overflow-y: auto; padding-right: 15px; border-top: 1px solid var(--border); }

    .checkout-layout { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
    .checkout-left { background: var(--light-bg); padding: 80px 5%; min-height: calc(100vh - 80px); display: flex; flex-direction: column; }
    .checkout-right { padding: 80px 5%; background: white; }
    .ch-item { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
    .ch-item-img { width: 50px; height: 50px; background: #eee; border-radius: 4px; overflow: hidden; }
    .ch-item-img img { width: 100%; height: 100%; object-fit: cover; }
    
    input { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-family: inherit; }

    .drawer { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: #fff; z-index: 2000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.1); }
    .drawer.active { right: 0; }
    .drawer-header { padding: 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
    .drawer-content { flex: 1; padding: 30px; overflow-y: auto; }

    @media (max-width: 900px) {
      .shop-layout, .detail-grid, .checkout-layout { grid-template-columns: 1fr; flex-direction: column; }
      .checkout-left, .checkout-right { height: auto; padding: 40px 5%; }
      .drawer { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

<div id="overlay"></div>

<nav>
  <div class="logo" onclick="showScreen('shop-screen')">LITHOS</div>
  <div class="nav-icons">
    <div style="position: relative; cursor: pointer;" onclick="toggleCart()">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="badge-count" style="position: absolute; top: -10px; right: -12px; background: var(--primary); color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800;">0</span>
    </div>
  </div>
</nav>

<section id="shop-screen" class="screen active">
  <div class="container shop-layout">
    <aside class="sidebar">
      <h4>Pet Category</h4>
      <ul class="sidebar-list">
        <li class="active" onclick="filterItems('all', this)">All Friends</li>
        <li onclick="filterItems('volcanic', this)">Volcanic</li>
        <li onclick="filterItems('special', this)">Special Packs</li>
        <li onclick="filterItems('fun', this)">Fun & Games</li>
      </ul>
    </aside>
    <div class="main-content">
      <h2 style="font-weight: 400; margin-bottom: 30px;">Adopt a Companion</h2>
      <div class="grid" id="product-grid"></div>
    </div>
  </div>
</section>

<section id="detail-screen" class="screen">
  <div class="container">
    <div style="cursor: pointer; margin-bottom: 40px; font-weight: 700; font-size: 0.8rem;" onclick="showScreen('shop-screen')">
      <i class="fa-solid fa-arrow-left"></i> BACK TO CATALOG
    </div>
    <div class="detail-grid">
      <div class="detail-img-wrap"><img id="detail-img" src=""></div>
      <div>
        <h1 id="detail-title" style="font-size: 3rem; margin-bottom: 10px; font-weight: 800;"></h1>
        <div id="detail-rating-header" style="color: var(--accent); margin-bottom: 20px;"></div>
        <p id="detail-price" style="font-size: 2rem; font-weight: 600; margin-bottom: 25px;"></p>
        <p id="detail-desc" style="line-height: 1.8; color: #555; margin-bottom: 40px;"></p>
        <button class="btn" onclick="addCurrentToCart()">Add to bag</button>
      </div>
    </div>
    <div style="margin-top: 80px; border-top: 1px solid var(--border); padding-top: 40px;">
        <h3 id="review-count-title">Verified Collector Experiences</h3>
        <div id="reviews-container" class="review-scroll"></div>
    </div>
  </div>
</section>

<section id="checkout-screen" class="screen">
  <div class="checkout-layout">
    <div class="checkout-left">
      <div style="margin-bottom: 30px; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; color: #888;">ORDER SUMMARY</div>
      <h1 id="checkout-total-top" style="font-size: 2.5rem; margin-bottom: 30px;">$0.00</h1>
      <div id="checkout-items-summary" style="flex-grow: 1; overflow-y: auto;"></div>
      <div style="border-top: 1px solid #ddd; padding-top: 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">Subtotal <span id="ch-sub">$0.00</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">Shipping <span>$5.00</span></div>
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.4rem;">Total Due <span id="ch-total">$0.00</span></div>
      </div>
    </div>
    <div class="checkout-right">
      <div style="background: #000; color: #fff; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; cursor: pointer;"> Pay</div>
      <input type="text" id="ship-name" placeholder="Full Name">
      <input type="text" id="ship-addr" placeholder="Street Address">
      <div style="position: relative;">
        <input type="text" id="card-display" placeholder="Card Number (•••• •••• •••• 1234)" maxlength="19">
      </div>
      <button class="btn" style="margin-top: 40px;" onclick="processOrder()">Complete Purchase — <span id="btn-pay-amt"></span></button>
    </div>
  </div>
</section>

<section id="tracking-screen" class="screen">
  <div class="container" style="text-align: center; max-width: 600px;">
    <i class="fa-solid fa-circle-check fa-4x" style="color: var(--success); margin-bottom: 20px;"></i>
    <h1 style="font-weight: 800;">Adoption Confirmed</h1>
    <div style="background: #f4f4f4; padding: 25px; margin: 30px 0; font-family: monospace; border-radius: 8px;" id="track-id"></div>
    <button class="btn" onclick="location.reload()">Return to Gallery</button>
  </div>
</section>

<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span>YOUR BAG</span>
    <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor: pointer;"></i>
  </div>
  <div id="cart-content" class="drawer-content"></div>
  <div style="padding: 30px; border-top: 1px solid var(--border);">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 800; font-size: 1.1rem;">
      <span>Subtotal</span>
      <span id="subtotal">$0.00</span>
    </div>
    <button class="btn" onclick="goToCheckout()">Secure Checkout</button>
  </div>
</div>

<script>
  let cart = [];
  let activeProduct = null;

  const products = [
    { id: 1, type: 'volcanic', name: 'Volcanic Basalt', price: 49, img: 'basalt.png', badge: 'Best Seller', rating: 4.9, count: 128, desc: 'A dense igneous masterpiece. Patient, quiet, and eternally loyal.' },
    { id: 2, type: 'metamorphic', name: 'Highland Slate', price: 34, img: 'slate.png', badge: 'New', rating: 4.7, count: 42, desc: 'Layered metamorphic rock. Excellent for deep conversation and focus.' },
    { id: 3, type: 'river', name: 'River Bed Stone', price: 28, img: 'river.png', badge: '', rating: 4.8, count: 85, desc: 'Smoothed by centuries of river water. The perfect pocket-sized companion.' },
    { id: 4, type: 'volcanic', name: 'Obsidian Shard', price: 55, img: 'obsidian.png', badge: 'Sharp', rating: 4.6, count: 31, desc: 'Volcanic glass. Shiny, elegant, and sophisticated. Handle with care.' },
    { id: 5, type: 'special', name: 'Family Rock Pack', price: 95, img: 'family.png', badge: 'Bundle', rating: 5.0, count: 18, desc: 'A collection of 4 rocks of varying sizes. Perfect for building a rocky household.' },
    { id: 6, type: 'fun', name: 'Adopt-a-Rock', price: 42, img: 'adopt.png', badge: 'Fan Favorite', rating: 4.9, count: 212, desc: 'A hand-selected pet rock wearing a custom knit outfit and googly eyes. Ready for love.' }
  ];

  const firstNames = ["James", "Sarah", "Michael", "Emma", "David", "Olivia", "Robert", "Sophia", "Will", "Luna"];
  const generalComments = ["Arrived quickly.", "My favorite purchase this year.", "Very happy with this friend."];
  
  const traitComments = {
    'volcanic': ["So dense!", "You can feel the heat of the earth.", "Stunning dark color."],
    'special': ["Perfect for the kids.", "The value is incredible.", "A whole family of friends!"],
    'fun': ["The sweater is so cute!", "Googly eyes make it so much better.", "I named mine Rocky."],
    'river': ["So smooth to the touch.", "Great for stress relief.", "Perfect skipping stone shape."]
  };

  function generateReviews(count, type) {
    let html = "";
    const specificTraits = traitComments[type] || ["Very solid choice."];
    for(let i=0; i<count; i++) {
        const name = firstNames[Math.floor(Math.random() * firstNames.length)];
        const trait = specificTraits[Math.floor(Math.random() * specificTraits.length)];
        const gen = generalComments[Math.floor(Math.random() * generalComments.length)];
        const stars = Math.random() > 0.1 ? 5 : 4;
        html += `<div class="review-item">
                <div style="color: var(--accent); font-size: 0.8rem;">${'<i class="fa-solid fa-star"></i>'.repeat(stars)}</div>
                <p style="font-weight: 600; margin: 5px 0;">"${trait} ${gen}"</p>
                <p style="font-size: 0.75rem; color: #888;">— ${name} ${String.fromCharCode(65 + i % 26)}.</p>
            </div>`;
    }
    return html;
  }

  function renderGrid(items) {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = items.map(p => `
      <div class="product-card" onclick="openProduct(${p.id})">
        ${p.badge ? `<span class="badge ${p.badge === 'Bundle' ? 'badge-bundle' : 'badge-best'}">${p.badge}</span>` : ''}
        <div class="img-box"><img src="${p.img}"></div>
        <div class="card-rating"><i class="fa-solid fa-star"></i> ${p.rating} <span style="color:#aaa; margin-left:5px;">(${p.count})</span></div>
        <h3 style="font-size: 1rem;">${p.name}</h3>
        <p style="font-weight: 700; color: var(--accent);">$${p.price}.00</p>
      </div>
    `).join('');
  }

  function openProduct(id) {
    const p = products.find(i => i.id === id);
    activeProduct = p;
    document.getElementById('detail-title').innerText = p.name;
    document.getElementById('detail-price').innerText = `$${p.price}.00`;
    document.getElementById('detail-desc').innerText = p.desc;
    document.getElementById('detail-img').src = p.img;
    document.getElementById('detail-rating-header').innerHTML = `<i class="fa-solid fa-star"></i> ${p.rating} (${p.count} reviews)`;
    document.getElementById('review-count-title').innerText = `${p.count} Verified Experiences`;
    document.getElementById('reviews-container').innerHTML = generateReviews(p.count, p.type);
    showScreen('detail-screen');
  }

  function filterItems(type, el) {
    document.querySelectorAll('.sidebar-list li').forEach(li => li.classList.remove('active'));
    el.classList.add('active');
    renderGrid(type === 'all' ? products : products.filter(p => p.type === type));
  }

  function toggleCart() {
    document.getElementById('drawer').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }

  function addCurrentToCart() {
    const existing = cart.find(i => i.id === activeProduct.id);
    if (existing) { existing.qty++; } else { cart.push({...activeProduct, qty: 1}); }
    renderCart(); toggleCart();
  }

  function updateQty(idx, delta) {
    cart[idx].qty += delta;
    if (cart[idx].qty < 1) cart.splice(idx, 1);
    renderCart();
  }

  function renderCart() {
    let sub = 0;
    const content = document.getElementById('cart-content');
    content.innerHTML = cart.map((item, idx) => {
      sub += item.price * item.qty;
      return `<div class="cart-item">
          <div class="cart-item-img"><img src="${item.img}"></div>
          <div style="flex:1;">
            <div style="font-weight: 700;">${item.name}</div>
            <div>$${item.price}.00</div>
            <div style="margin-top:5px; display: flex; align-items: center; gap: 10px;">
              <span style="cursor:pointer" onclick="updateQty(${idx}, -1)">-</span>
              <span>${item.qty}</span>
              <span style="cursor:pointer" onclick="updateQty(${idx}, 1)">+</span>
            </div>
          </div>
        </div>`;
    }).join('');
    document.getElementById('badge-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
    document.getElementById('subtotal').innerText = `$${sub}.00`;
    
    document.getElementById('ch-sub').innerText = `$${sub.toFixed(2)}`;
    document.getElementById('ch-total').innerText = `$${(sub + 5).toFixed(2)}`;
    document.getElementById('checkout-total-top').innerText = `$${(sub + 5).toFixed(2)}`;
    document.getElementById('btn-pay-amt').innerText = `$${(sub + 5).toFixed(2)}`;

    document.getElementById('checkout-items-summary').innerHTML = cart.map(item => `
      <div class="ch-item">
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="ch-item-img"><img src="${item.img}"></div>
          <div>${item.name} (x${item.qty})</div>
        </div>
        <div style="font-weight:700;">$${(item.price * item.qty).toFixed(2)}</div>
      </div>`).join('');
  }

  function goToCheckout() {
    if (cart.length === 0) return alert("Bag is empty");
    toggleCart(); showScreen('checkout-screen');
  }

  function processOrder() {
    if (!document.getElementById('ship-addr').value) return alert("Enter address");
    document.getElementById('track-id').innerText = "TRACK-LITH-" + Math.floor(Math.random()*900000000 + 100000000);
    showScreen('tracking-screen');
    cart = []; renderCart();
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  document.getElementById('card-display').addEventListener('input', (e) => {
    let val = e.target.value.replace(/\D/g, '').substring(0, 16);
    let masked = "";
    for(let i=0; i<val.length; i++) {
        if(i > 0 && i % 4 === 0) masked += " ";
        masked += (i < val.length - 4) ? "*" : val[i];
    }
    e.target.value = masked;
  });

  document.getElementById('overlay').addEventListener('click', toggleCart);
  renderGrid(products);
</script>

</body>
</html>
