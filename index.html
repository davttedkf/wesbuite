<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control - Registry Audit v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #060a0f;
  color: #7a9bb5;
  height: 100vh;
  overflow: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}

/* ── LOGIN ── */
#login { height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
.login-box { background: #0c1219; border: 1px solid #1e3a5f; border-radius: 4px; padding: 36px 32px; width: 320px; text-align: center; }
.login-box h2 { color: #e0eaf5; font-size: 15px; letter-spacing: 0.25em; margin-bottom: 4px; }
.login-box .sub { font-size: 10px; letter-spacing: 0.2em; color: #ef4444; margin-bottom: 24px; }
.login-box input { width: 100%; margin: 6px 0; padding: 10px 12px; background: #060a0f; border: 1px solid #1e3a5f; color: #c8ddef; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 2px; outline: none; }
.login-btn { width: 100%; margin-top: 12px; padding: 11px; background: #d4a54a; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.2em; color: #060a0f; border-radius: 2px; }

/* ── DASHBOARD ── */
#dash { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 1; }
#dash.visible { display: flex; }
.topbar { display: flex; align-items: center; gap: 24px; padding: 8px 16px; background: #0c1219; border-bottom: 1px solid #1a2a3a; font-size: 11px; letter-spacing: 0.12em; flex-shrink: 0; z-index: 5; }
.topbar .logo { color: #d4a54a; font-weight: 700; font-size: 13px; letter-spacing: 0.3em; }
.topbar .stat { color: #4a7a9b; }
.topbar .stat span { color: #22c55e; }
.topbar #clock { color: #7a9bb5; margin-left: auto; }

.content { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar { width: 280px; background: #0c1219; border-right: 1px solid #1a2a3a; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sidebar-title { font-size: 10px; letter-spacing: 0.2em; color: #4a7a9b; padding: 12px 14px 8px; border-bottom: 1px solid #1a2a3a; }
#info-panel { padding: 14px; border-bottom: 1px solid #1a2a3a; min-height: 160px; }
#info-panel h3 { color: #e0eaf5; font-size: 13px; letter-spacing: 0.15em; margin-bottom: 10px; border-left: 2px solid #d4a54a; padding-left: 8px; }
#info-panel .row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid #0f1e2e; }
#info-panel .row .label { color: #4a7a9b; font-size: 9px; }

.audit-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: #080d14; }
#missing-list { flex: 1; overflow-y: auto; padding: 10px 14px; font-size: 10px; }
.missing-item { color: #ef4444; padding: 4px 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 2px; }
.missing-item:hover { background: #1a1a2e; border-color: #ef4444; color: #fff; }

/* ── MAP ── */
.map-wrap { flex: 1; position: relative; overflow: hidden; background: #060a0f; }
#map-svg { width: 100%; height: 100%; display: block; }
.country { fill: #0f1e2e; stroke: #1a3550; stroke-width: 0.5; cursor: pointer; transition: fill 0.2s; }
.country:hover { fill: #162a40; stroke: #3b82f6; }
.country.selected { fill: #0d2a45; stroke: #3b82f6; stroke-width: 1.2; }
.country-glow { fill: none; stroke: #3b82f6; stroke-width: 3; opacity: 0; pointer-events: none; }
.country-glow.active { opacity: 1; animation: countryPulse 2s ease-in-out infinite; }
@keyframes countryPulse { 0%, 100% { opacity: 0.6; stroke-width: 2; } 50% { opacity: 0.2; stroke-width: 4; } }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>⬡ MISSION CONTROL</h2>
    <div class="sub">REGISTRY AUDIT MODE</div>
    <input id="uname" placeholder="USERNAME" value="admin">
    <input id="upass" type="password" placeholder="PASSWORD" value="admin">
    <button class="login-btn" onclick="tryLogin()">INITIALIZE</button>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <span class="logo">⬡ MISSION CONTROL</span>
    <span class="stat">AUDIT_STATUS <span id="audit-status">SCANNING...</span></span>
    <span id="clock">--:--:-- UTC</span>
  </div>

  <div class="content">
    <div class="sidebar">
      <div id="info-panel">
        <div class="sidebar-title" style="padding:0; margin-bottom:10px;">// INTEL REPORT</div>
        <div id="report-content">Select signal...</div>
      </div>
      
      <div class="audit-section">
        <div class="sidebar-title">// UNIDENTIFIED SIGNALS</div>
        <div id="missing-list">Syncing...</div>
      </div>
    </div>

    <div class="map-wrap" id="map-wrap">
      <svg id="map-svg"></svg>
    </div>
  </div>
</div>

<script>
function tryLogin() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").classList.add("visible");
  initDash();
}

function startClock() {
  setInterval(() => { document.getElementById("clock").textContent = new Date().toUTCString().split(' ')[4] + " UTC"; }, 1000);
}

var projection, path, svgEl, countryLayer, glowLayer;
var ALL_FEATURES = [];

function initDash() {
  startClock();
  var wrap = document.getElementById("map-wrap");
  svgEl = d3.select("#map-svg").attr("viewBox", `0 0 ${wrap.clientWidth} ${wrap.clientHeight}`);
  projection = d3.geoNaturalEarth1().scale(wrap.clientWidth / 6.5).translate([wrap.clientWidth / 2, wrap.clientHeight / 2]);
  path = d3.geoPath().projection(projection);

  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    .then(r => r.json())
    .then(world => {
      var countries = topojson.feature(world, world.objects.countries);
      ALL_FEATURES = countries.features;
      
      glowLayer = svgEl.append("g");
      countryLayer = svgEl.append("g");

      countryLayer.selectAll("path.country")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country")
        .attr("id", d => "c"+d.id)
        .attr("d", path)
        .on("click", (e, d) => triggerScan(d.id));

      glowLayer.selectAll("path.country-glow")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country-glow")
        .attr("id", d => "g"+d.id)
        .attr("d", path);

      runAudit();
    });
}

function runAudit() {
  var names = getCountryNames();
  var missingContainer = document.getElementById("missing-list");
  missingContainer.innerHTML = "";
  var missingCount = 0;

  ALL_FEATURES.forEach(f => {
    var idNum = parseInt(f.id);
    // If idNum is NaN or not in our registry, flag it
    if (isNaN(idNum)) return; 

    if (!names[idNum] && f.id !== "-99" && f.id !== 0) {
      missingCount++;
      var div = document.createElement("div");
      div.className = "missing-item";
      div.innerText = `SIGNAL_ID: ${idNum.toString().padStart(3, '0')} (Click to locate)`;
      div.onclick = () => triggerScan(f.id);
      missingContainer.appendChild(div);
    }
  });

  document.getElementById("audit-status").innerText = missingCount === 0 ? "REGISTRY CLEAN" : `${missingCount} DISCREPANCIES`;
  if(missingCount === 0) missingContainer.innerHTML = "<div style='color:#22c55e; padding:10px;'>Grid Fully Verified.</div>";
}

function triggerScan(id) {
  var names = getCountryNames();
  var idNum = parseInt(id);
  
  // Safe string formatting for display to prevent NaN issues
  var displayId = isNaN(idNum) ? "???" : idNum.toString().padStart(3, '0');
  var name = names[idNum] || "UNIDENTIFIED SECTOR";
  
  countryLayer.selectAll(".country").classed("selected", false);
  glowLayer.selectAll(".country-glow").classed("active", false);
  
  countryLayer.select("#c"+id).classed("selected", true);
  glowLayer.select("#g"+id).classed("active", true);

  document.getElementById("report-content").innerHTML = `
    <h3>${name.toUpperCase()}</h3>
    <div class="row"><span class="label">REGISTRY_ID</span><span class="val">${displayId}</span></div>
    <div class="row"><span class="label">STATUS</span><span class="val" style="color:${names[idNum] ? '#22c55e' : '#ef4444'}">${names[idNum] ? "VERIFIED" : "UNKNOWN"}</span></div>
  `;
}

</script>
