<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUP LEGENDS | CASINO GRAND MASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020308;
            --panel: #0a0c14;
            --gold: #c5a059;
            --cyan: #00e5ff;
            --red: #ff2e2e;
            --green: #00ff95;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Archivo', sans-serif;
            height: 100vh; display: grid; grid-template-columns: 320px 1fr;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar { background: #000; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .label-gold { font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .dot { aspect-ratio: 1; border-radius: 4px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        .dot.win { background: var(--green); color: #000; }
        .dot.loss { background: var(--red); }

        /* --- MAIN STAGE --- */
        .main-stage { position: relative; display: flex; flex-direction: column; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .logo { font-weight: 900; font-size: 1.5rem; font-style: italic; }
        .logo span { color: var(--gold); }
        
        .daily-trigger { 
            background: var(--green); color: #000; border: none; padding: 10px 20px; 
            border-radius: 4px; font-weight: 900; cursor: pointer; font-size: 0.75rem; 
            box-shadow: 0 0 15px rgba(0,255,149,0.3); transition: 0.3s;
        }
        .daily-trigger:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

        #arena { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .floor { position: absolute; bottom: 0; width: 100%; height: 40%; background: radial-gradient(ellipse at center, #161a2e 0%, #020308 80%); transform: rotateX(60deg); }
        .cup-node { position: absolute; width: 150px; bottom: 120px; z-index: 20; }
        .cup-mesh { width: 130px; height: 170px; margin: 0 auto; background: linear-gradient(135deg, #ef4444 0%, #7f1d1d 100%); clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); position: relative; border-bottom: 6px solid #2b060c; }
        .cup-mesh::before { content: ''; position: absolute; top: 0; width: 100%; height: 8px; background: var(--gold); }
        .ball { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, #fff, #bdc3c7); border-radius: 50%; display: none; bottom: 125px; z-index: 10; }

        /* --- FOOTER UI --- */
        .footer { height: 180px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 40px; justify-content: space-between; position: relative; }
        .control-stack { display: flex; flex-direction: column; gap: 15px; }
        .bet-input-row { display: flex; align-items: center; background: #080a0f; border-radius: 4px; border: 1px solid #1a1a1a; overflow: hidden; }
        .adj-btn { width: 40px; height: 40px; background: #111; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; border-right: 1px solid #1a1a1a; }
        .bet-val { width: 100px; text-align: center; font-family: 'JetBrains Mono'; font-weight: 700; font-size: 1.2rem; color: #fff; }
        .chip { padding: 6px 14px; border-radius: 4px; background: #0d1117; border: 1px solid #222; font-size: 0.75rem; font-weight: 700; cursor: pointer; color: #666; }
        .chip.active { border: 2px solid var(--cyan); color: var(--cyan); }
        .go-btn { width: 110px; height: 110px; border-radius: 50%; background: #fff; color: #000; border: 12px solid #161a24; font-weight: 900; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }

        /* --- WHEEL MODAL --- */
        #wheel-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 2000; }
        .wheel-box { position: relative; width: 500px; height: 500px; border: 10px solid #111; border-radius: 50%; box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px var(--gold); }
        #wheel-svg { width: 100%; height: 100%; }
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%) rotate(0deg); 
            width: 35px; height: 45px; background: var(--gold); 
            clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 10; 
            transform-origin: top center;
        }
        
        #toast-bin { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; }
        .toast { padding: 15px 40px; border-radius: 50px; background: #000; border: 1px solid var(--gold); font-weight: 900; animation: tIn 0.3s forwards; }
        @keyframes tIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .timer-text { color: #666; font-size: 0.8rem; margin-top: 10px; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body oncontextmenu="return false;">

    <aside class="sidebar">
        <div><div class="label-gold">Roadmap</div><div class="history-grid" id="roadmap"></div></div>
        <div style="flex-grow:1; overflow:hidden;"><div class="label-gold">Live Feed</div><div id="feed" style="display:flex;flex-direction:column;gap:5px;"></div></div>
    </aside>

    <main class="main-stage">
        <header>
            <div class="logo">CUP<span>LEGENDS</span></div>
            <div style="display:flex;gap:15px;align-items:center;">
                <div style="display:flex; flex-direction:column; align-items:flex-end;">
                    <button id="daily-btn-header" class="daily-trigger" onclick="Rewards.open()">DAILY SPIN</button>
                    <div id="countdown-header" class="timer-text"></div>
                </div>
                <div class="balance-pill" id="balance-ui" style="background:#000;padding:12px;border:1px solid var(--gold);font-family:'JetBrains Mono';color:var(--gold);min-width:180px;text-align:right;">150,191.57 FUN</div>
            </div>
        </header>

        <div id="arena">
            <div class="floor"></div>
            <div id="ball" class="ball"></div>
            <div class="cup-node" id="c0" style="left: calc(50% - 320px);"><div class="cup-mesh"></div></div>
            <div class="cup-node" id="c1" style="left: calc(50% - 65px);"><div class="cup-mesh"></div></div>
            <div class="cup-node" id="c2" style="left: calc(50% + 190px);"><div class="cup-mesh"></div></div>
        </div>

        <div class="footer">
            <div class="control-stack">
                <div>
                    <div class="label-gold">Bet Amount</div>
                    <div class="bet-input-row">
                        <button class="adj-btn" onclick="Game.adjBet(-0.5)">-</button>
                        <div class="bet-val" id="bet-ui">4.50</div>
                        <button class="adj-btn" style="border-right:none;" onclick="Game.adjBet(0.5)">+</button>
                    </div>
                </div>
                <div>
                    <div class="label-gold">Risk Multiplier</div>
                    <div class="risk-row">
                        <div class="chip" onclick="Game.setRisk(2, this)">x2</div>
                        <div class="chip active" onclick="Game.setRisk(3, this)">x3</div>
                        <div class="chip" onclick="Game.setRisk(5, this)">x5</div>
                        <div class="chip" onclick="Game.setRisk(10, this)">x10</div>
                    </div>
                </div>
            </div>
            <button class="go-btn" id="go-btn" onclick="Game.play()">GO!</button>
        </div>
    </main>

    <div id="wheel-modal">
        <h1 style="color:var(--gold);font-weight:900;letter-spacing:5px;">DAILY SPIN</h1>
        <div class="wheel-box">
            <div id="wheel-ticker" class="pointer"></div>
            <svg id="wheel-svg" viewBox="0 0 100 100"></svg>
        </div>
        <button id="spin-btn-modal" class="go-btn" style="margin-top:40px;height:70px;width:180px;border-radius:8px;" onclick="Rewards.spin()">SPIN</button>
        <div id="countdown-modal" class="timer-text" style="font-size:1.2rem; color:var(--red); margin-top:15px;"></div>
        <p onclick="Rewards.close()" style="color:#444;margin-top:20px;cursor:pointer;">CLOSE</p>
    </div>

    <div id="toast-bin"></div>

    <script>
        const AudioFX = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f, t, d, v=0.1) {
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(v, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            },
            tick() { this.play(800, 'sine', 0.05, 0.05); },
            win() { this.play(523, 'sine', 0.2); setTimeout(()=>this.play(659, 'sine', 0.2), 100); }
        };

        const Game = (function() {
            const S = { balance: 150191.57, bet: 4.50, risk: 3, busy: false, order:[0,1,2], ball:0 };
            return {
                adjBet: (v) => { if(S.busy) return; S.bet = Math.max(0.5, S.bet + v); document.getElementById('bet-ui').innerText = S.bet.toFixed(2); AudioFX.tick(); },
                setRisk: (r, el) => { if(S.busy) return; S.risk = r; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); AudioFX.tick(); },
                play: function() {
                    if(S.busy || S.balance < S.bet) return;
                    S.busy = true; document.getElementById('go-btn').disabled = true;
                    S.balance -= S.bet; this.upd();
                    const cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    const pos = cups.map(c => c.offsetLeft);
                    S.ball = Math.floor(Math.random()*3);
                    gsap.set("#ball", { left: pos[S.ball]+45, display:'block', bottom: 125 });
                    gsap.to(".cup-mesh", { y:-160, duration:0.6, ease:"power2.out" });
                    setTimeout(()=> gsap.to(".cup-mesh", { y:0, duration:0.4, onComplete:()=>this.shuffle(pos) }), 1200);
                },
                shuffle: async function(pos) {
                    document.getElementById('ball').style.display='none';
                    for(let i=0; i<50; i++) {
                        let a=Math.floor(Math.random()*3), b; do{ b=Math.floor(Math.random()*3); } while(a===b);
                        const spd = Math.max(0.04, 0.2-(i*0.005));
                        const pA = pos[S.order.indexOf(a)], pB = pos[S.order.indexOf(b)];
                        gsap.to(document.getElementById('c'+a), { left:pB, duration:spd });
                        await gsap.to(document.getElementById('c'+b), { left:pA, duration:spd });
                        const iA=S.order.indexOf(a), iB=S.order.indexOf(b); [S.order[iA], S.order[iB]]=[S.order[iB], S.order[iA]];
                    }
                    this.ready(pos);
                },
                ready: function(pos) {
                    [0,1,2].forEach(i=> document.getElementById('c'+i).onclick = () => {
                        if(!S.busy) return;
                        if(Math.random() < 0.8 && i === S.ball) S.ball = (i+1)%3;
                        const win = (i === S.ball);
                        gsap.set("#ball", { left: pos[S.order.indexOf(S.ball)]+45, display:'block' });
                        gsap.to(".cup-mesh", { y:-180, duration:0.7, ease:"back.out" });
                        setTimeout(()=> {
                            if(win) { S.balance += (S.bet*S.risk); AudioFX.win(); Rewards.toast("WIN!", "win"); }
                            else { AudioFX.play(100, 'sawtooth', 0.4); Rewards.toast("LOST", "loss"); }
                            this.upd(); this.cleanup();
                        }, 800);
                    });
                },
                cleanup: () => setTimeout(()=>{ gsap.to(".cup-mesh", {y:0}); document.getElementById('ball').style.display='none'; document.getElementById('go-btn').disabled=false; S.busy=false; }, 1200),
                upd: () => document.getElementById('balance-ui').innerText = S.balance.toLocaleString('en-US', {minimumFractionDigits:2}) + " FUN"
            };
        })();

        const Rewards = (function() {
            const prizes = [100, 500, 250, 50000, 150, 1000, 300, 5000];
            const odds = ["40%", "5%", "15%", "0.1%", "30%", "4%", "5%", "0.9%"];
            const colors = ["#111", "#c5a059", "#111", "#00ff95", "#111", "#c5a059", "#111", "#00e5ff"];
            let spinning = false;

            function checkTimer() {
                const last = localStorage.getItem('last_spin');
                if(!last) return true;
                const diff = Date.now() - parseInt(last);
                return diff >= 86400000; // 24 Hours
            }

            function updateUI() {
                const canSpin = checkTimer();
                document.getElementById('daily-btn-header').disabled = !canSpin;
                document.getElementById('spin-btn-modal').disabled = !canSpin;
                if(!canSpin) {
                    const next = parseInt(localStorage.getItem('last_spin')) + 86400000;
                    const rem = next - Date.now();
                    const h = Math.floor(rem/3600000), m = Math.floor((rem%3600000)/60000), s = Math.floor((rem%60000)/1000);
                    const timeStr = `Next spin in: ${h}h ${m}m ${s}s`;
                    document.getElementById('countdown-header').innerText = timeStr;
                    document.getElementById('countdown-modal').innerText = timeStr;
                    document.getElementById('spin-btn-modal').innerText = "LOCKED";
                } else {
                    document.getElementById('countdown-header').innerText = "";
                    document.getElementById('countdown-modal').innerText = "";
                    document.getElementById('spin-btn-modal').innerText = "SPIN";
                }
            }
            setInterval(updateUI, 1000);

            return {
                open: () => { document.getElementById('wheel-modal').style.display='flex'; Rewards.draw(); updateUI(); },
                close: () => { if(!spinning) document.getElementById('wheel-modal').style.display='none'; },
                draw: () => {
                    const svg = document.getElementById('wheel-svg'); svg.innerHTML = '';
                    prizes.forEach((p, i) => {
                        const ang = 360/prizes.length;
                        const x1 = 50 + 50 * Math.cos(Math.PI*(i*ang-90)/180), y1 = 50 + 50 * Math.sin(Math.PI*(i*ang-90)/180);
                        const x2 = 50 + 50 * Math.cos(Math.PI*((i+1)*ang-90)/180), y2 = 50 + 50 * Math.sin(Math.PI*((i+1)*ang-90)/180);
                        svg.innerHTML += `<path d="M50,50 L${x1},${y1} A50,50 0 0,1 ${x2},${y2} Z" fill="${colors[i]}" stroke="#222" stroke-width="0.3"/>`;
                        const tang = (i*ang)+(ang/2);
                        const tx = 50 + 36 * Math.cos(Math.PI*(tang-90)/180), ty = 50 + 36 * Math.sin(Math.PI*(tang-90)/180);
                        svg.innerHTML += `
                            <text x="${tx}" y="${ty-2}" fill="white" font-size="3.5" font-weight="900" text-anchor="middle" transform="rotate(${tang},${tx},${ty})">${p}</text>
                            <text x="${tx}" y="${ty+2}" fill="rgba(255,255,255,0.5)" font-size="1.8" font-weight="400" text-anchor="middle" transform="rotate(${tang},${tx},${ty})">${odds[i]}</text>
                        `;
                    });
                },
                spin: function() {
                    if(spinning || !checkTimer()) return; 
                    spinning = true;
                    document.getElementById('spin-btn-modal').disabled = true;
                    
                    const targetIdx = 4; // Target 150 (Troll near-miss)
                    const sliceAng = 360/prizes.length;
                    const finalRot = (360 * 10) + (360 - (targetIdx * sliceAng)) - (sliceAng/2);

                    let lastTick = 0;
                    gsap.to("#wheel-svg", { 
                        rotation: finalRot, 
                        duration: 7, 
                        ease: "power4.out", 
                        onUpdate: function() {
                            const curRot = gsap.getProperty("#wheel-svg", "rotation");
                            const tickIdx = Math.floor(curRot / sliceAng);
                            if(tickIdx !== lastTick) {
                                lastTick = tickIdx;
                                AudioFX.tick();
                                // Pin Flick Animation
                                gsap.fromTo("#wheel-ticker", { rotation: -25 }, { rotation: 0, duration: 0.15, ease: "back.out(4)" });
                            }
                        },
                        onComplete: () => {
                            localStorage.setItem('last_spin', Date.now());
                            Game.balance += prizes[targetIdx]; Game.upd();
                            Rewards.toast(`+${prizes[targetIdx]} FUN`, "win");
                            updateUI();
                            setTimeout(() => { spinning=false; Rewards.close(); gsap.set("#wheel-svg", {rotation:0}); }, 2500);
                        }
                    });
                },
                toast: (t, type) => { const el=document.createElement('div'); el.className=`toast ${type}`; el.innerText=t; document.getElementById('toast-bin').appendChild(el); setTimeout(()=>el.remove(), 2500); }
            };
        })();

        // Roadmap
        for(let i=0; i<20; i++) document.getElementById('roadmap').innerHTML += '<div class="dot"></div>';
        updateUI();
    </script>
</body>
</html>
