<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUP LEGENDS | ELITE CASINO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030407;
            --panel: rgba(10, 12, 20, 0.9);
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --cyan: #00d2ff;
            --red: #ff3e3e;
            --green: #00ff88;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Archivo', sans-serif;
            height: 100vh; display: grid; grid-template-columns: 300px 1fr;
            overflow: hidden;
        }

        /* --- SIDEBAR & FEED --- */
        .sidebar {
            background: #000; border-right: 1px solid var(--border);
            padding: 24px; display: flex; flex-direction: column; gap: 20px;
            z-index: 100;
        }
        .section-label { font-size: 0.65rem; color: var(--gold); letter-spacing: 3px; font-weight: 900; text-transform: uppercase; }
        .feed-container { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; gap: 8px; }
        .log-entry {
            background: var(--panel); padding: 12px; border-radius: 4px; border-left: 3px solid var(--red);
            font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center;
        }
        .log-entry.win { border-left-color: var(--green); }
        .history-dots { display: flex; gap: 6px; flex-wrap: wrap; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #222; }
        .dot.win { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot.loss { background: var(--red); }

        /* --- MAIN CASINO FLOOR --- */
        .casino { position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        header {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 50;
        }
        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; }
        .logo span { color: var(--gold); }
        .balance-pill {
            background: #000; padding: 10px 24px; border-radius: 12px;
            border: 1px solid var(--gold); font-family: 'JetBrains Mono'; color: var(--gold);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* --- GAME ARENA --- */
        #arena {
            flex-grow: 1; position: relative; display: flex; justify-content: center;
            align-items: center; perspective: 1200px;
        }
        .table-surface {
            position: absolute; bottom: 0; width: 200%; height: 350px;
            background: radial-gradient(ellipse at center, #1a1e2e 0%, #030407 80%);
            transform: rotateX(60deg); border-top: 1px solid rgba(255,255,255,0.1);
        }

        .cup-anchor { position: absolute; width: 150px; bottom: 120px; z-index: 20; }
        .cup-num {
            font-size: 4rem; font-weight: 900; color: rgba(255,255,255,0.03);
            text-align: center; margin-bottom: 20px; transition: 0.3s;
        }
        .cup-obj {
            width: 130px; height: 175px; margin: 0 auto;
            background: linear-gradient(145deg, #cc0000 0%, #660000 100%);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            position: relative; border-bottom: 6px solid #220000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            cursor: pointer;
        }
        .cup-obj::after {
            content: ''; position: absolute; top: 0; width: 100%; height: 12px;
            background: rgba(255,255,255,0.15);
        }
        .beast-branding {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: url('https://upload.wikimedia.org/wikipedia/en/d/db/MrBeast_logo.svg') no-repeat center;
            background-size: contain; filter: brightness(0) invert(1); opacity: 0.1;
        }

        .ball {
            position: absolute; width: 42px; height: 42px;
            background: radial-gradient(circle at 35% 35%, #fff 0%, #aab 50%, #778 100%);
            border-radius: 50%; display: none; bottom: 128px;
            z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* --- DASHBOARD --- */
        .dashboard {
            height: 160px; background: #080a0f; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-evenly; padding: 0 60px;
            z-index: 60;
        }
        .dash-item { display: flex; flex-direction: column; gap: 6px; }
        .dash-label { font-size: 0.7rem; color: #444; font-weight: 900; letter-spacing: 2px; }
        .dash-val {
            background: #000; padding: 14px 24px; border-radius: 8px;
            font-family: 'JetBrains Mono'; border: 1px solid #1a1a1a; min-width: 160px;
        }

        .go-btn {
            width: 120px; height: 120px; border-radius: 50%; background: #fff;
            color: #000; border: 10px solid #111; font-weight: 900;
            font-size: 1.4rem; cursor: pointer; transition: 0.3s;
            margin-top: -60px; box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }
        .go-btn:hover:not(:disabled) { background: var(--gold-bright); transform: scale(1.05) translateY(-5px); }
        .go-btn:disabled { opacity: 0.2; transform: scale(0.95); cursor: not-allowed; }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-layer {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 12px; pointer-events: none;
        }
        .toast {
            padding: 16px 40px; border-radius: 50px; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); border: 1px solid var(--border);
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            animation: toastPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes toastPop { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast.win { color: var(--green); border-color: var(--green); box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .toast.loss { color: var(--red); border-color: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

    <aside class="sidebar">
        <div>
            <div class="section-label" style="margin-bottom: 15px;">Round History</div>
            <div class="history-dots" id="history">
                </div>
        </div>
        <div style="flex-grow: 1; display: flex; flex-direction: column;">
            <div class="section-label" style="margin-bottom: 15px;">Global Feed</div>
            <div class="feed-container" id="feed"></div>
        </div>
    </aside>

    <div class="casino">
        <header>
            <div class="logo">CUP<span>LEGENDS</span></div>
            <div class="balance-pill" id="balance">150 191.57 FUN</div>
        </header>

        <div id="arena">
            <div class="table-surface"></div>
            <div id="ball" class="ball"></div>
            
            <div class="cup-anchor" id="cup0" style="left: calc(50% - 350px);">
                <div class="cup-num">1</div>
                <div class="cup-obj"><div class="beast-branding"></div></div>
            </div>
            <div class="cup-anchor" id="cup1" style="left: calc(50% - 75px);">
                <div class="cup-num">2</div>
                <div class="cup-obj"><div class="beast-branding"></div></div>
            </div>
            <div class="cup-anchor" id="cup2" style="left: calc(50% + 200px);">
                <div class="cup-num">3</div>
                <div class="cup-obj"><div class="beast-branding"></div></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="dash-item">
                <div class="dash-label">Multiplier</div>
                <div class="dash-val" style="color:var(--green)">x3.00</div>
            </div>
            <button class="go-btn" id="go-btn" onclick="Game.play()">GO!</button>
            <div class="dash-item" style="text-align: right;">
                <div class="dash-label">Total Bet</div>
                <div class="dash-val">1.50 FUN</div>
            </div>
        </div>
    </div>

    <div id="toast-layer"></div>

    <script>
        // --- PRO AUDIO SYNTH ---
        const Sound = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f, t, d, v = 0.1) {
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(v, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            },
            click() { this.play(600, 'sine', 0.1); },
            move() { this.play(200, 'triangle', 0.15, 0.05); },
            win() { this.play(523, 'sine', 0.1); setTimeout(()=>this.play(659, 'sine', 0.1), 100); setTimeout(()=>this.play(783, 'sine', 0.3), 200); },
            loss() { this.play(110, 'sawtooth', 0.5, 0.05); }
        };

        const Game = (function() {
            const state = {
                balance: 150191.57,
                ballSlot: 0,
                isBusy: false,
                canPick: false,
                cupOrder: [0, 1, 2],
                positions: []
            };

            function toast(msg, type) {
                const layer = document.getElementById('toast-layer');
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.innerText = msg;
                layer.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }

            function updateHistory(win) {
                const hist = document.getElementById('history');
                const dot = document.createElement('div');
                dot.className = `dot ${win ? 'win' : 'loss'}`;
                hist.prepend(dot);
                if(hist.children.length > 20) hist.lastChild.remove();
            }

            // Fake Feed
            setInterval(() => {
                const f = document.getElementById('feed');
                const isWin = Math.random() > 0.85;
                const e = document.createElement('div');
                e.className = `log-entry ${isWin ? 'win' : ''}`;
                e.innerHTML = `<span>User_${Math.floor(Math.random()*999)}</span> <span>${isWin ? '+4.50' : '-1.50'}</span>`;
                f.prepend(e);
                if(f.children.length > 12) f.lastChild.remove();
            }, 4000);

            return {
                play: function() {
                    if (state.isBusy) return;
                    Sound.click();
                    state.isBusy = true;
                    state.canPick = false;
                    document.getElementById('go-btn').disabled = true;

                    state.balance -= 1.50;
                    document.getElementById('balance').innerText = state.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " FUN";

                    const ball = document.getElementById('ball');
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    state.positions = cups.map(c => c.offsetLeft);

                    // 1. Initial Setup
                    state.ballSlot = Math.floor(Math.random() * 3);
                    gsap.set(ball, { left: state.positions[state.ballSlot] + 54, display: 'block', bottom: 128 });
                    
                    // 2. Reveal then Drop (Fixing the "don't go down" bug)
                    gsap.to(".cup-obj", { y: -180, duration: 0.6, ease: "power2.out", stagger: 0.1 });
                    
                    setTimeout(() => {
                        // Ensure they drop to 0
                        gsap.to(".cup-obj", { y: 0, duration: 0.5, ease: "power2.in", onComplete: () => this.shuffle() });
                    }, 1400);
                },

                shuffle: async function() {
                    document.getElementById('ball').style.display = 'none';
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    
                    // Impossible Speed: 60 swaps
                    for (let i = 0; i < 60; i++) {
                        let a = Math.floor(Math.random() * 3);
                        let b; do { b = Math.floor(Math.random() * 3); } while (a === b);
                        
                        const speed = Math.max(0.03, 0.22 - (i * 0.005));
                        if(i % 2 === 0) Sound.move();
                        
                        const pA = state.positions[state.cupOrder.indexOf(a)];
                        const pB = state.positions[state.cupOrder.indexOf(b)];

                        gsap.to(cups[a], { left: pB, duration: speed, ease: "sine.inOut" });
                        await gsap.to(cups[b], { left: pA, duration: speed, ease: "sine.inOut" });

                        const iA = state.cupOrder.indexOf(a);
                        const iB = state.cupOrder.indexOf(b);
                        [state.cupOrder[iA], state.cupOrder[iB]] = [state.cupOrder[iB], state.cupOrder[iA]];
                    }
                    this.ready();
                },

                ready: function() {
                    state.canPick = true;
                    gsap.to(".cup-num", { opacity: 1, color: "var(--cyan)" });
                    const anchors = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    anchors.forEach((a, i) => {
                        a.onclick = () => this.reveal(i);
                    });
                },

                reveal: function(choice) {
                    if(!state.canPick) return;
                    state.canPick = false; // BUG FIX: Cannot pick multiple cups

                    // 85% Rigged Chance
                    if (Math.random() < 0.85 && choice === state.ballSlot) {
                        state.ballSlot = (choice + 1) % 3;
                    }

                    const isWin = (choice === state.ballSlot);
                    const ball = document.getElementById('ball');
                    const finalX = state.positions[state.cupOrder.indexOf(state.ballSlot)] + 54;
                    
                    gsap.set(ball, { left: finalX, display: 'block' });
                    gsap.to(".cup-obj", { y: -200, duration: 0.8, ease: "back.out", stagger: 0.05 });
                    gsap.to(".cup-num", { opacity: 0 });

                    setTimeout(() => {
                        if (isWin) {
                            Sound.win();
                            state.balance += 4.50;
                            toast("WINNER! +4.50 FUN", "win");
                        } else {
                            Sound.loss();
                            toast("BET LOST", "loss");
                        }
                        updateHistory(isWin);
                        document.getElementById('balance').innerText = state.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " FUN";
                        this.cleanup();
                    }, 1000);
                },

                cleanup: function() {
                    setTimeout(() => {
                        gsap.to(".cup-obj", { y: 0, duration: 0.5 });
                        document.getElementById('ball').style.display = 'none';
                        document.getElementById('go-btn').disabled = false;
                        state.isBusy = false;
                    }, 1500);
                }
            };
        })();
    </script>
</body>
</html>
