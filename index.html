<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FATAL_ERROR_LOG</title>
    <style>
        body, html {
            background: #000;
            color: #111; /* Almost invisible text */
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }

        #scare-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 9999;
        }

        #instruction {
            color: #222;
            font-size: 10px;
            text-align: center;
            transition: color 5s ease;
        }

        /* The Lull: Subtle movement to make them lean in */
        .dot {
            width: 2px;
            height: 2px;
            background: #111;
            position: absolute;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            background: none;
            border: 1px solid #111;
            color: #111;
            padding: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay">
    <button onclick="start()">ENTER THE VOID</button>
</div>

<div id="instruction">LOOK CLOSER... THERE IS A PIXEL OUT OF PLACE</div>
<div id="dot" class="dot" style="top: 50%; left: 50%;"></div>

<img id="scare-image" src="https://i.imgur.com/vH3y1r4.jpeg" alt="SCREAM">
<audio id="scream" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Scream+1&filename=24/241857-797585be-5872-4638-89c0-681907e2c90c.mp3"></audio>

<script>
    const scareImg = document.getElementById('scare-image');
    const scream = document.getElementById('scream');
    const dot = document.getElementById('dot');
    const instruction = document.getElementById('instruction');

    function start() {
        document.getElementById('overlay').style.display = 'none';
        
        // 1. Start the 'Focus' phase (8 seconds)
        setTimeout(() => {
            instruction.style.color = "#444";
            instruction.innerText = "DO YOU SEE THE MOVEMENT IN THE CENTER?";
        }, 3000);

        // 2. The Jumpscare Trigger
        // We trigger it when the user gets "bored" or "invested" (around 12 seconds)
        setTimeout(() => {
            trigger();
        }, 12000);
    }

    function trigger() {
        // Force full screen for maximum impact
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        scareImg.style.display = 'block';
        scream.volume = 1.0;
        scream.play();

        // Strobe effect
        let flip = true;
        const strobe = setInterval(() => {
            document.body.style.backgroundColor = flip ? "#fff" : "#000";
            scareImg.style.filter = flip ? "invert(1)" : "invert(0)";
            flip = !flip;
        }, 50);

        // Kill the strobe after 2 seconds so they can see the face
        setTimeout(() => {
            clearInterval(strobe);
            document.body.style.backgroundColor = "#000";
            scareImg.style.filter = "contrast(2) brightness(0.8)";
        }, 2000);
    }

    // Move the dot slightly to keep them chasing it
    document.addEventListener('mousemove', (e) => {
        dot.style.left = (e.clientX + 5) + 'px';
        dot.style.top = (e.clientY + 5) + 'px';
    });
</script>

</body>
</html>
