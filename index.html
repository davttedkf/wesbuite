<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Specimens</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #121212;
      --accent: #a38a6d;
      --bg: #f8f8f6;
      --white: #ffffff;
      --border: #e2e2df;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      opacity: 0; visibility: hidden; transition: 0.3s ease; z-index: 1500;
    }
    #overlay.active { opacity: 1; visibility: visible; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 5%; background: var(--white); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1000;
    }

    .logo { font-weight: 800; letter-spacing: 5px; text-transform: uppercase; cursor: pointer; }

    .cart-trigger { position: relative; cursor: pointer; font-size: 1.2rem; }

    .badge {
      position: absolute; top: -10px; right: -12px;
      background: var(--primary); color: white;
      font-size: 10px; width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

    .screen { display: none; }
    .screen.active { display: block; }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      font-family: inherit;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">LITHOS</div>
</nav>

<section id="payment-screen" class="screen active">
  <div class="container">

    <h1>Checkout</h1>

    <input id="cust-name" placeholder="Full Name">

    <!-- ✅ GOOGLE AUTOCOMPLETE INPUT -->
    <input id="cust-street" placeholder="Street Address" type="text">

    <div style="display:flex; gap:10px;">
      <input id="cust-city" placeholder="City">
      <input id="cust-zip" placeholder="Zip">
    </div>

    <button class="btn" onclick="processOrder()">Place Order</button>

  </div>
</section>

<script>
  function processOrder() {
    const street = document.getElementById("cust-street").value;
    if (!street) return alert("Please enter address");
    alert("Order placed!");
  }

  // ✅ GOOGLE AUTOCOMPLETE INIT
  function initAutocomplete() {
    const input = document.getElementById("cust-street");

    const autocomplete = new google.maps.places.Autocomplete(input, {
      types: ["address"],
      componentRestrictions: { country: "us" }
    });

    autocomplete.addListener("place_changed", function () {
      const place = autocomplete.getPlace();
      console.log("Selected:", place);
    });
  }
</script>

<!-- ✅ GOOGLE MAPS API (Places Library) -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvx7-qMTAhpyX71-XA9b0blPKulmDIpYs&libraries=places&callback=initAutocomplete"
  async
  defer>
</script>

</body>
</html>
