<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Companions</title>
  <link rel="icon" href="favicon.ico?v=17">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #a38a6d; --bg: #ffffff; --light-bg: #f8f8f6; --border: #e8e8e6; --success: #2d5a27; --error: #c62828; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }
    
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500; }
    #overlay.active { opacity: 1; visibility: visible; }

    #loader { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2000; }
    .logo { font-weight: 800; letter-spacing: 6px; text-transform: uppercase; cursor: pointer; font-size: 1.1rem; }
    
    .screen { display: none; width: 100%; min-height: 100vh; background: var(--bg); }
    .screen.active { display: block; }

    .shop-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 60px 5%; gap: 60px; }
    .sidebar { width: 220px; flex-shrink: 0; position: sticky; top: 120px; height: fit-content; }
    .sidebar h4 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: #aaa; }
    .sidebar-list { list-style: none; margin-bottom: 40px; }
    .sidebar-list li { padding: 10px 0; font-size: 0.9rem; color: #666; cursor: pointer; transition: 0.2s; }
    .sidebar-list li:hover { color: var(--primary); }
    .sidebar-list li.active { color: var(--primary); font-weight: 700; border-left: 2px solid var(--primary); padding-left: 15px; margin-left: -17px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .product-card { border: 2px solid var(--border); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.4s; position: relative; background: #fff; }
    .product-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    .img-box { width: 100%; aspect-ratio: 1/1; background: #fafafa; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .img-box img { width: 75%; height: 75%; object-fit: contain; }

    /* DETAIL PAGE */
    .detail-container { max-width: 1200px; margin: 0 auto; padding: 60px 5%; }
    .detail-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: start; }
    .detail-img-wrap { background: #fcfcfc; padding: 60px; border-radius: 30px; text-align: center; border: 1px solid #f0f0f0; }
    .detail-img-wrap img { width: 100%; max-height: 500px; object-fit: contain; }

    /* CHECKOUT GUI (Per image_7.png) */
    .checkout-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .checkout-left { background: var(--light-bg); padding: 60px 10%; border-right: 1px solid var(--border); }
    .checkout-right { padding: 60px 10%; background: #fff; }

    .section-label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #999; margin-bottom: 12px; letter-spacing: 1px; }
    input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 1rem; color: var(--primary); transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--accent); }

    /* The Image-matched Card Details Container */
    .payment-container { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-num-input { border: none; border-bottom: 1px solid var(--border); border-radius: 0; }
    .expiry-cvc-row { display: flex; align-items: center; background: #fff; }
    .sub-input { border: none; border-radius: 0; padding: 16px; width: 65px; text-align: center; }
    .cvc-input { border: none; border-radius: 0; flex: 1; text-align: right; padding-right: 20px; }
    .divider { width: 1px; height: 30px; background: var(--border); }

    /* Complete Adoption Button (The change you requested) */
    .adopt-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; font-size: 0.8rem; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .adopt-btn:hover { background: #927e62; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(163, 138, 109, 0.3); }

    .btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
    .btn:hover { background: #333; }

    .drawer { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: #fff; z-index: 3000; transition: 0.5s; display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.1); }
    .drawer.active { right: 0; }

    @media (max-width: 900px) {
      .checkout-layout, .detail-grid, .shop-container { grid-template-columns: 1fr; flex-direction: column; }
      .drawer { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text" style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; font-weight: 700;">Processing Transfer...</p>
</div>

<div id="overlay" onclick="toggleCart()"></div>

<nav>
  <div class="logo" onclick="showScreen('shop-screen')">LITHOS</div>
  <div class="nav-icons">
    <div style="position: relative; cursor: pointer;" onclick="toggleCart()">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="badge-count" style="position: absolute; top: -10px; right: -12px; background: var(--primary); color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800;">0</span>
    </div>
  </div>
</nav>

<section id="shop-screen" class="screen active">
  <div class="shop-container">
    <aside class="sidebar">
      <h4>Collection</h4>
      <ul class="sidebar-list">
        <li class="active" onclick="filterItems('all', this)">All Friends</li>
        <li onclick="filterItems('volcanic', this)">Volcanic</li>
        <li onclick="filterItems('metamorphic', this)">Metamorphic</li>
        <li onclick="filterItems('special', this)">Value Packs</li>
        <li onclick="filterItems('fun', this)">Smooth Stones</li>
      </ul>
    </aside>
    <div class="main-content">
      <div class="grid" id="product-grid"></div>
    </div>
  </div>
</section>

<section id="checkout-screen" class="screen">
  <div class="checkout-layout">
    <div class="checkout-left">
      <div style="cursor: pointer; font-weight: 700; font-size: 0.7rem; color: #aaa; margin-bottom: 40px;" onclick="showScreen('shop-screen')">RETURN</div>
      <h2 style="font-size: 2.5rem; margin-bottom: 40px;">Order Review</h2>
      <div id="checkout-items-summary" style="margin-bottom: 30px;"></div>
      <div style="border-top: 1px solid #ddd; padding-top: 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">Subtotal <span id="ch-sub"></span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">Shipping <span id="ch-ship">$5.00</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; color:#888; font-size:0.9rem;">Estimated Tax (6%) <span id="ch-tax"></span></div>
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.5rem;">Total <span id="ch-total"></span></div>
      </div>
    </div>

    <div class="checkout-right">
        <h4 style="margin-bottom:40px; letter-spacing:1px;">SECURE CHECKOUT</h4>
        
        <div style="margin-bottom: 30px;">
            <span class="section-label">Shipping Address</span>
            <input type="text" id="ship-name" placeholder="Full Name" style="margin-bottom: 10px;">
            <input type="text" id="ship-addr" placeholder="Street Address">
        </div>

        <div style="margin-bottom: 30px;">
            <span class="section-label">Card Details</span>
            <div class="payment-container">
                <input type="text" id="card-num" class="card-num-input" placeholder="Card Number" maxlength="19">
                <div class="expiry-cvc-row">
                    <input type="text" id="exp-mm" class="sub-input" placeholder="MM" maxlength="2">
                    <span style="color: #ddd;">/</span>
                    <input type="text" id="exp-yy" class="sub-input" placeholder="YY" maxlength="2">
                    <div class="divider"></div>
                    <input type="text" id="cvc" class="cvc-input" placeholder="CVC" maxlength="3">
                </div>
            </div>
        </div>

        <button class="adopt-btn" onclick="validateAndProcess()">Complete Adoption</button>
    </div>
  </div>
</section>

<section id="tracking-screen" class="screen">
    <div class="container" style="text-align: center; padding-top: 150px; max-width:600px; margin:0 auto;">
      <i class="fa-solid fa-circle-check fa-5x" style="color: var(--success); margin-bottom: 30px;"></i>
      <h1 style="font-weight: 800;">ADOPTION CONFIRMED.</h1>
      <div id="track-id" style="margin: 40px 0; font-family: monospace; font-size: 1.2rem; background: #f8f8f8; padding: 25px; border: 1px dashed #ccc;"></div>
      <button class="btn" style="width: 250px;" onclick="location.reload()">HOME</button>
    </div>
</section>

<div id="drawer" class="drawer">
  <div style="padding: 30px; border-bottom: 1px solid var(--border); font-weight: 800;">YOUR BAG</div>
  <div id="cart-content" style="flex:1; padding:30px; overflow-y:auto;"></div>
  <div style="padding:30px; border-top:1px solid var(--border); background:#fafafa;">
    <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:20px;">
        <span>SUBTOTAL</span>
        <span id="subtotal"></span>
    </div>
    <button class="btn" onclick="goToCheckout()">CHECKOUT</button>
  </div>
</div>

<script>
  let cart = [];
  let activeProduct = null;

  const products = [
    { id: 1, type: 'volcanic', name: 'Volcanic Basalt', price: 49, img: 'basalt.png', badge: 'BEST SELLER', rating: 4.9, count: 128 },
    { id: 2, type: 'metamorphic', name: 'Highland Slate', price: 34, img: 'slate.png', badge: 'NEW', rating: 4.7, count: 42 },
    { id: 3, type: 'river', name: 'River Bed Stone', price: 28, img: 'river.png', badge: '', rating: 4.8, count: 85 },
    { id: 4, type: 'volcanic', name: 'Obsidian Shard', price: 55, img: 'obsidian.png', badge: 'SHARP', rating: 4.6, count: 31 },
    { id: 5, type: 'special', name: 'Family Pack', price: 95, img: 'family.png', badge: 'BUNDLE', rating: 5.0, count: 18 },
    { id: 6, type: 'fun', name: 'Smooth Stone', price: 42, img: 'adopt.png', badge: 'FAN FAVORITE', rating: 4.9, count: 212 },
    { id: 7, type: 'metamorphic', name: 'Imperial Marble', price: 65, img: 'marble.png', badge: 'PREMIUM', rating: 4.8, count: 56 }
  ];

  function renderGrid(items = products) {
    document.getElementById('product-grid').innerHTML = items.map(p => `
      <div class="product-card" onclick="openProduct(${p.id})">
        ${p.badge ? `<span class="badge" style="position:absolute; top:15px; left:15px; padding:5px 12px; border-radius:50px; font-size:0.6rem; font-weight:800; background:#121212; color:#fff;">${p.badge}</span>` : ''}
        <div class="img-box"><img src="${p.img}"></div>
        <div style="font-size:0.75rem; color:var(--accent); margin-bottom:5px;"><i class="fa-solid fa-star"></i> ${p.rating} (${p.count})</div>
        <h3 style="font-size: 0.9rem; letter-spacing: 2px; text-transform:uppercase;">${p.name}</h3>
        <p style="color:#aaa;">$${p.price}.00</p>
      </div>`).join('');
  }

  function toggleCart() {
    document.getElementById('drawer').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }

  function addCurrentToCart() {
    cart.push({...activeProduct});
    renderCart(); toggleCart();
  }

  function renderCart() {
    let sub = cart.reduce((a, b) => a + b.price, 0);
    let tax = sub * 0.06;
    let total = sub + 5 + tax;

    document.getElementById('cart-content').innerHTML = cart.map(item => `
      <div style="display:flex; gap:15px; margin-bottom:20px; align-items:center;">
          <div style="width:60px; height:60px; background:#f4f4f4; border-radius:8px; display:flex; align-items:center; justify-content:center;"><img src="${item.img}" style="width:80%; height:80%; object-fit:contain;"></div>
          <div style="flex:1;"><div style="font-weight:700; font-size:0.8rem;">${item.name}</div><div style="color:var(--accent); font-size:0.8rem;">$${item.price}.00</div></div>
      </div>`).join('');
    
    document.getElementById('badge-count').innerText = cart.length;
    document.getElementById('subtotal').innerText = `$${sub.toFixed(2)}`;
    document.getElementById('ch-sub').innerText = `$${sub.toFixed(2)}`;
    document.getElementById('ch-tax').innerText = `$${tax.toFixed(2)}`;
    document.getElementById('ch-total').innerText = `$${total.toFixed(2)}`;
    
    document.getElementById('checkout-items-summary').innerHTML = cart.map(item => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${item.name}</span><span style="font-weight:700;">$${item.price}.00</span></div>`).join('');
  }

  function validateAndProcess() {
    if(!document.getElementById('ship-addr').value) return alert("Enter address");
    
    const mm = parseInt(document.getElementById('exp-mm').value);
    const yy = parseInt("20" + document.getElementById('exp-yy').value);
    const now = new Date();
    const expiry = new Date(yy, mm - 1, 1);

    if (expiry < now) {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader-text').innerText = "Transaction Failed: Date in past";
        document.getElementById('loader-text').style.color = "var(--error)";
        setTimeout(() => document.getElementById('loader').style.display = 'none', 3000);
        return;
    }

    document.getElementById('loader').style.display = 'flex';
    document.getElementById('loader-text').innerText = "Processing Geologic Transfer...";
    document.getElementById('loader-text').style.color = "var(--primary)";
    
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('track-id').innerText = "LITH-" + Math.floor(Math.random()*90000000);
        showScreen('tracking-screen');
        cart = []; renderCart();
    }, 3000);
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function goToCheckout() { toggleCart(); showScreen('checkout-screen'); }

  // --- MONTH TO YEAR AUTO JUMP ---
  document.getElementById('exp-mm').addEventListener('input', function() {
      if(this.value.length === 2) document.getElementById('exp-yy').focus();
  });

  document.getElementById('card-num').addEventListener('input', function() {
    let val = this.value.replace(/\D/g, '').substring(0, 16);
    let out = "";
    for(let i=0; i < val.length; i++) {
        if(i > 0 && i % 4 === 0) out += " ";
        out += val[i]; // SHOW ALL DIGITS
    }
    this.value = out;
  });

  function filterItems(type, el) {
    document.querySelectorAll('.sidebar-list li').forEach(li => li.classList.remove('active'));
    el.classList.add('active');
    renderGrid(type === 'all' ? products : products.filter(p => p.type === type));
  }

  renderGrid();
</script>
</body>
</html>
