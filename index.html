<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUP LEGENDS | HIGH STAKES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #06070d;
            --panel-bg: rgba(20, 24, 45, 0.7);
            --accent-gold: #facc15;
            --accent-cyan: #22d3ee;
            --cup-red: #ef4444;
            --win-green: #10b981;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
        }

        /* --- SIDEBAR: LIVE FEED --- */
        .sidebar {
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .sidebar-title { font-size: 0.8rem; font-weight: 700; color: var(--accent-cyan); letter-spacing: 2px; }
        .live-bet {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid var(--cup-red);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity:0; transform: translateX(-10px); } to { opacity:1; transform: translateX(0); } }

        /* --- MAIN STAGE --- */
        .main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #161b33 0%, #06070d 100%);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent-gold); }

        .balance-pill {
            background: #111827;
            padding: 8px 20px;
            border-radius: 99px;
            border: 1px solid var(--accent-gold);
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-gold);
        }

        /* --- THE GAME --- */
        #stage {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .cup-wrapper {
            position: absolute;
            width: 160px;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }

        .cup-num {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .pro-cup {
            width: 140px;
            height: 180px;
            background: linear-gradient(135deg, #ff4d4d 0%, #7f1d1d 100%);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-bottom: 8px solid #450a0a;
        }
        .pro-cup::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(255,255,255,0.2);
        }

        .beast-mark {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: url('https://upload.wikimedia.org/wikipedia/en/d/db/MrBeast_logo.svg') no-repeat center;
            background-size: contain; filter: brightness(0) invert(1); opacity: 0.2;
        }

        .orb {
            position: absolute;
            width: 45px; height: 45px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--accent-cyan));
            border-radius: 50%;
            bottom: 120px;
            display: none;
            box-shadow: 0 0 30px var(--accent-cyan);
            z-index: 5;
        }

        /* --- DASHBOARD --- */
        .dashboard {
            height: 160px;
            background: #0d1117;
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 50px;
        }

        .bet-control {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .label { font-size: 0.7rem; color: #6b7280; font-weight: 700; text-transform: uppercase; }
        .input-box {
            background: #1f2937;
            padding: 12px 25px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            border: 1px solid #374151;
        }

        .go-btn {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: white;
            color: black;
            border: 10px solid #1f2937;
            font-weight: 900;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            transition: 0.2s;
            margin-top: -60px;
        }
        .go-btn:hover { transform: scale(1.05); background: var(--accent-gold); }
        .go-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* --- WIN/LOSS MODAL --- */
        #overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .result-title { font-size: 5rem; font-weight: 900; margin-bottom: 10px; }
        .result-sub { color: #6b7280; margin-bottom: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-title">LIVE CHALLENGE FEED</div>
        <div id="feed-container">
            </div>
    </aside>

    <main class="main-container">
        <header>
            <div class="logo">CUP<span>LEGENDS</span></div>
            <div class="balance-pill" id="balance">150 191.57 FUN</div>
        </header>

        <div id="stage">
            <div id="target-orb" class="orb"></div>

            <div class="cup-wrapper" id="cup0" style="left: calc(50% - 350px);">
                <div class="cup-num">1</div>
                <div class="pro-cup"><div class="beast-mark"></div></div>
            </div>

            <div class="cup-wrapper" id="cup1" style="left: calc(50% - 70px);">
                <div class="cup-num">2</div>
                <div class="pro-cup"><div class="beast-mark"></div></div>
            </div>

            <div class="cup-wrapper" id="cup2" style="left: calc(50% + 210px);">
                <div class="cup-num">3</div>
                <div class="pro-cup"><div class="beast-mark"></div></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="bet-control">
                <span class="label">Profit Multiplier</span>
                <div class="input-box" style="color: var(--win-green);">×3.00</div>
            </div>

            <button class="go-btn" id="go-btn" onclick="Game.play()">GO!</button>

            <div class="bet-control">
                <span class="label">Current Bet</span>
                <div class="input-box">1.50 FUN</div>
            </div>
        </div>
    </main>

    <div id="overlay">
        <div class="result-title" id="res-msg">FAILED</div>
        <div class="result-sub">QUANTUM SWAP ACTIVE: BALL RELOCATED</div>
        <button class="btn-action" style="padding: 15px 50px; cursor:pointer; font-weight:900;" onclick="Game.reset()">NEXT ROUND</button>
    </div>

    <script>
        const Game = (function() {
            const state = {
                ballSlot: 0,
                isBusy: false,
                cupOrder: [0, 1, 2],
                balance: 150191.57,
                positions: [0, 0, 0]
            };

            // Fake Live Feed
            const names = ["User_88", "GamerX", "Satoshi99", "BeastFan", "Hidden_Whale"];
            setInterval(() => {
                const feed = document.getElementById('feed-container');
                const div = document.createElement('div');
                div.className = 'live-bet';
                div.innerHTML = `<span>${names[Math.floor(Math.random()*5)]}</span><span style="color:#ef4444">-1.50 FUN</span>`;
                feed.prepend(div);
                if(feed.children.length > 8) feed.lastChild.remove();
            }, 4000);

            return {
                play: function() {
                    if (state.isBusy) return;
                    state.isBusy = true;
                    document.getElementById('go-btn').disabled = true;

                    state.balance -= 1.50;
                    document.getElementById('balance').innerText = state.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " FUN";

                    const orb = document.getElementById('target-orb');
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    
                    // 1. Initial Reveal
                    state.ballSlot = Math.floor(Math.random() * 3);
                    state.positions = cups.map(c => c.offsetLeft);
                    
                    gsap.set(orb, { left: state.positions[state.ballSlot] + 55, display: 'block', bottom: 120 });
                    gsap.to(".pro-cup", { y: -200, duration: 0.7, ease: "power4.out", stagger: 0.1 });

                    // 2. Start Rigged Shuffle
                    setTimeout(() => {
                        gsap.to(".pro-cup", { y: 0, duration: 0.5, onComplete: () => this.shuffle() });
                    }, 1500);
                },

                shuffle: async function() {
                    document.getElementById('target-orb').style.display = 'none';
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    
                    for (let i = 0; i < 60; i++) {
                        let a = Math.floor(Math.random() * 3);
                        let b; do { b = Math.floor(Math.random() * 3); } while (a === b);

                        const speed = Math.max(0.03, 0.25 - (i * 0.006));
                        
                        const pA = state.positions[state.cupOrder.indexOf(a)];
                        const pB = state.positions[state.cupOrder.indexOf(b)];

                        gsap.to(cups[a], { left: pB, duration: speed, ease: "sine.inOut" });
                        await gsap.to(cups[b], { left: pA, duration: speed, ease: "sine.inOut" });

                        const iA = state.cupOrder.indexOf(a);
                        const iB = state.cupOrder.indexOf(b);
                        [state.cupOrder[iA], state.cupOrder[iB]] = [state.cupOrder[iB], state.cupOrder[iA]];
                    }

                    this.enableSelection();
                },

                enableSelection: function() {
                    gsap.to(".cup-num", { opacity: 1, color: "var(--accent-cyan)" });
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    cups.forEach((c, i) => {
                        c.onclick = () => this.reveal(i);
                    });
                },

                reveal: function(clickedIndex) {
                    // THE RIG: Milliseconds before the reveal, the ball moves
                    // Logic: If user is right, pick any other cup.
                    if (clickedIndex === state.ballSlot) {
                        state.ballSlot = (clickedIndex + 1) % 3;
                    }

                    const orb = document.getElementById('target-orb');
                    const cups = [document.getElementById('cup0'), document.getElementById('cup1'), document.getElementById('cup2')];
                    const finalX = state.positions[state.cupOrder.indexOf(state.ballSlot)] + 55;
                    
                    gsap.set(orb, { left: finalX, display: 'block' });
                    gsap.to(".pro-cup", { y: -200, duration: 0.8, ease: "back.out", stagger: 0.05 });
                    gsap.to(".cup-num", { opacity: 0 });

                    setTimeout(() => {
                        const overlay = document.getElementById('overlay');
                        overlay.style.display = 'flex';
                        document.getElementById('res-msg').style.color = "#ef4444";
                    }, 1500);
                },

                reset: function() {
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('go-btn').disabled = false;
                    gsap.set(".pro-cup", { y: 0 });
                    document.getElementById('target-orb').style.display = 'none';
                    state.isBusy = false;
                }
            };
        })();
    </script>
</body>
</html>
