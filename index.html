<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Mission Control</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at center, #0e1117 0%, #0b0f14 70%);
  color: #9da7b3;
}

/* GRID */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ===== LOGIN ===== */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box {
  background: #11161c;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

.login-box h2 {
  color: #e6edf3;
  margin-bottom: 10px;
}

.warning {
  color: #ef4444;
  font-size: 12px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #0b0f14;
  border: 1px solid #222;
  color: #e6edf3;
}

button {
  width: 100%;
  padding: 10px;
  background: #d4a54a;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* ===== DASHBOARD ===== */
#dashboard {
  display: none;
  height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #11161c;
  border-right: 1px solid rgba(255,255,255,0.05);
  padding: 20px;
}

.sidebar h3 {
  color: #e6edf3;
}

.log {
  font-size: 12px;
  margin-top: 10px;
  line-height: 1.6;
}

/* MAIN */
.main {
  flex: 1;
  position: relative;
}

/* HEADER */
.header {
  padding: 10px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: #6b7280;
  font-size: 12px;
}

/* MAP */
.map {
  position: relative;
  width: 100%;
  height: calc(100% - 40px);
  background: url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/2000px-World_map_-_low_resolution.svg.png") center/cover no-repeat;
  opacity: 0.2;
}

/* POINTS */
.point {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 10px #22c55e;
  cursor: pointer;
}

/* DATA PANEL */
.panel {
  position: absolute;
  right: 20px;
  top: 60px;
  width: 250px;
  background: #161b22;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
}

.panel h4 {
  color: #e6edf3;
}

/* GLOW TITLE */
.title {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 22px;
  color: #e6edf3;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>SECURE ACCESS</h2>
    <div class="warning">AUTHORIZED PERSONNEL ONLY</div>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="enterSystem()">ACCESS SYSTEM</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h3>System Logs</h3>
    <div class="log" id="logs"></div>
  </div>

  <div class="main">
    <div class="header">NODE: GLOBAL-01 | STATUS: ACTIVE | UTC: <span id="time"></span></div>
    <div class="title">MISSION CONTROL</div>

    <div class="map">

      <!-- Sample Points -->
      <div class="point" style="top:40%; left:30%;" onclick="showData('New York')"></div>
      <div class="point" style="top:50%; left:50%;" onclick="showData('Europe Node')"></div>
      <div class="point" style="top:65%; left:75%;" onclick="showData('Asia Node')"></div>

    </div>

    <div class="panel" id="panel">
      <h4>Node Info</h4>
      <p>Select a location</p>
    </div>

  </div>

</div>

<script>

/* LOGIN */
function enterSystem() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "flex";
  startLogs();
}

/* CLOCK */
setInterval(() => {
  document.getElementById("time").innerText = new Date().toUTCString();
}, 1000);

/* LOG SYSTEM */
function startLogs() {
  const logs = document.getElementById("logs");

  setInterval(() => {
    const entry = document.createElement("div");
    entry.textContent =
      "[SYS] " + new Date().toLocaleTimeString() + " - Signal received...";
    logs.prepend(entry);
  }, 2000);
}

/* MAP DATA */
function showData(name) {
  document.getElementById("panel").innerHTML = `
    <h4>${name}</h4>
    <p>Status: ACTIVE</p>
    <p>Signal Strength: ${Math.floor(Math.random()*40+60)}%</p>
    <p>Last Activity: ${new Date().toLocaleTimeString()}</p>
    <p>Node ID: ${Math.random().toString(36).substring(2,8).toUpperCase()}</p>
  `;
}

</script>

</body>
</html>
