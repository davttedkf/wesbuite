<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at center, #0e1117, #0b0f14);
  color:#9da7b3;
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
  linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
  linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
  background-size:40px 40px;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:#11161c;
  padding:30px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  text-align:center;
}

.box h2{color:#e6edf3;}
.warn{color:#ef4444;font-size:12px;margin:10px 0;}

input{
  width:100%;
  margin:8px 0;
  padding:10px;
  background:#0b0f14;
  border:1px solid #222;
  color:#e6edf3;
}

button{
  width:100%;
  padding:10px;
  background:#d4a54a;
  border:none;
  cursor:pointer;
}

/* DASHBOARD */
#dash{display:none;height:100vh;display:flex;}

.side{
  width:250px;
  background:#11161c;
  padding:15px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.main{flex:1;position:relative;}

.header{
  font-size:12px;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.map{
  position:relative;
  height:100%;
}

/* SVG */
svg{width:100%;height:100%;}

/* WORLD */
.world{
  fill:#1f2937;
  opacity:0.4;
}

/* NODES */
.node{
  fill:#22c55e;
  filter:drop-shadow(0 0 6px #22c55e);
}

/* PULSE RINGS */
.ring{
  fill:none;
  stroke:#22c55e;
  stroke-width:1;
  opacity:0.5;
  animation:ring 2s infinite;
}

@keyframes ring{
  0%{r:5;opacity:0.6;}
  100%{r:30;opacity:0;}
}

/* LINES */
.path{
  fill:none;
  stroke:#3b82f6;
  stroke-width:1.5;
  opacity:0.4;
}

/* MOVING SIGNAL */
.signal{
  fill:#3b82f6;
  filter:drop-shadow(0 0 6px #3b82f6);
}

/* SCAN LINE */
.map::after{
  content:"";
  position:absolute;
  width:100%;
  height:2px;
  background:rgba(59,130,246,0.2);
  animation:scan 5s linear infinite;
}

@keyframes scan{
  0%{top:0;}
  100%{top:100%;}
}

/* PANEL */
.panel{
  position:absolute;
  right:20px;
  top:60px;
  width:260px;
  background:#161b22;
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
}

.panel h4{color:#e6edf3;}

/* LOG */
.log{font-size:12px;margin-top:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>SECURE ACCESS</h2>
    <div class="warn">AUTHORIZED PERSONNEL ONLY</div>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="enter()">ENTER</button>
  </div>
</div>

<!-- DASH -->
<div id="dash">

<div class="side">
  <h3>Logs</h3>
  <div id="logs" class="log"></div>
</div>

<div class="main">
  <div class="header">
    NODE: GLOBAL-01 | STATUS: ACTIVE | UTC: <span id="time"></span>
  </div>

  <div class="map">
<svg viewBox="0 0 1000 500">

<!-- WORLD MAP -->
<image href="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
width="1000" height="500" opacity="0.3"/>

<!-- PATHS -->
<path id="p1" d="M300 200 Q450 100 600 250" class="path"/>
<path id="p2" d="M600 250 Q700 200 800 350" class="path"/>

<!-- SIGNALS -->
<circle r="4" class="signal">
  <animateMotion dur="3s" repeatCount="indefinite">
    <mpath href="#p1"/>
  </animateMotion>
</circle>

<circle r="4" class="signal">
  <animateMotion dur="2.5s" repeatCount="indefinite">
    <mpath href="#p2"/>
  </animateMotion>
</circle>

<!-- NODES -->
<circle cx="300" cy="200" r="6" class="node" onclick="data('US NODE')"/>
<circle cx="600" cy="250" r="6" class="node" onclick="data('EU NODE')"/>
<circle cx="800" cy="350" r="6" class="node" onclick="data('ASIA NODE')"/>

<!-- RINGS -->
<circle cx="300" cy="200" class="ring"/>
<circle cx="600" cy="250" class="ring"/>
<circle cx="800" cy="350" class="ring"/>

</svg>

<div class="panel" id="panel">
<h4>Node Info</h4>
<p>Select node</p>
</div>

</div>
</div>

</div>

<script>

/* LOGIN */
function enter(){
  document.getElementById("login").style.display="none";
  document.getElementById("dash").style.display="flex";
  logs();
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("time").innerText=new Date().toUTCString();
},1000);

/* LOGS */
function logs(){
  setInterval(()=>{
    let el=document.createElement("div");
    el.textContent="[SYS] "+new Date().toLocaleTimeString()+" signal routed...";
    document.getElementById("logs").prepend(el);
  },2000);
}

/* DATA PANEL */
function data(name){
  document.getElementById("panel").innerHTML=
  `<h4>${name}</h4>
  <p>Status: ACTIVE</p>
  <p>Signal: ${Math.floor(Math.random()*40+60)}%</p>
  <p>Last Ping: ${new Date().toLocaleTimeString()}</p>
  <p>ID: ${Math.random().toString(36).substring(2,8).toUpperCase()}</p>`;
}

</script>

</body>
</html>
