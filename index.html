<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumpy Loves You!</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="world" class="happy-mode">

    <div class="sky-container">
        <div class="sun-character prop">
            <div class="sun-face">
                <div class="eyes"><span>.</span><span>.</span></div>
                <div class="mouth">v</div>
            </div>
            <div class="rays">
                <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="cloud-character prop">
            <div class="cloud-face">
                <div class="eyes">^ ^</div>
                <div class="blush"></div>
                <div class="mouth">v</div>
            </div>
        </div>
    </div>

    <main class="content-wrapper">
        
        <div class="header-placeholder">
            </div>

        <div class="lumpy-container">
            <div class="lumpy-character" id="lumpy">
                <div class="face">
                    <div class="eyes">. .</div>
                    <div class="blush"></div>
                    <div class="mouth">v</div>
                </div>
            </div>
            <div class="shadow"></div>
        </div>

        <button id="friend-button" class="happy-btn">Click to Play!</button>
    </main>

    <footer class="field-container">
        <div class="rolling-hill"></div>
        
        <div class="field-props">
            <div class="flower prop">
                <div class="petals">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="face">
                    <div class="eyes">. .</div>
                    <div class="mouth">v</div>
                </div>
                <div class="stem"></div>
            </div>
            
            <div class="blueberry prop">
                <div class="face">
                    <div class="eyes">. .</div>
                    <div class="mouth">v</div>
                </div>
            </div>
            
            <div class="flower prop">
                <div class="petals">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="face">
                    <div class="eyes">. .</div>
                    <div class="mouth">v</div>
                </div>
                <div class="stem"></div>
            </div>
        </div>
    </footer>

    <div class="magic-cursor-trail" id="cursorTrail"></div>

    <script src="script.js"></script>
</body>
</html>
