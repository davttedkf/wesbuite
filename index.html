<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Terminal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Login Screen Styles */
        #login-container {
            text-align: center;
            border: 1px solid #333;
            padding: 40px;
            background: #0a0a0a;
            z-index: 10;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            background: #111;
            border: 1px solid #444;
            color: #0f0;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        /* Credits Screen Styles */
        #credits-wrapper {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #credits-content {
            position: absolute;
            width: 100%;
            /* Start fully below the visible screen */
            top: 100%;
            text-align: center;
        }

        /* 
            Total duration: 3 minutes 20 seconds = 200 seconds
            We need the content to travel from top:100% to above the screen.
            Using translateY to move it up by (100vh + full content height).
            We use a large translateY value to ensure all content scrolls past.
        */
        .scrolling {
            animation: scroll-up 200s linear forwards;
        }

        @keyframes scroll-up {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-3500px); }
        }

        h1 { font-size: 3em; margin-bottom: 50px; color: #aaa; }
        h2 { margin-top: 60px; color: #888; }
        p  { font-size: 1.2em; margin: 10px 0; }

        .error { color: #f00; font-size: 0.8em; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>SYSTEM ACCESS</h2>
        <input type="text"     id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="attemptLogin()">AUTHORIZE</button>
        <div id="error-msg" class="error">INVALID CREDENTIALS</div>
    </div>

    <div id="credits-wrapper">
        <div id="credits-content">
            <h1>STRATCOM</h1>

            <h2>DEVELOPMENT TEAM</h2>
            <p>Lead Developer</p>
            <p>UI/UX Design</p>

            <h2>SIMULATION ENGINE</h2>
            <p>Logic Systems</p>
            <p>Data Management</p>

            <h2>SOUND DESIGN</h2>
            <p>Ambient Score</p>
            <p>Sound Effects</p>

            <h2>SPECIAL THANKS</h2>
            <p>The Testers</p>
            <p>Community Supporters</p>
            <p>And You.</p>

            <div style="margin-top: 500px;">
                <p>© 2026 PROJECT TERMINATED</p>
            </div>
        </div>
    </div>

    <!--
        IMPORTANT: Replace "credits.mp3" with the exact filename of your MP3
        as it appears in the root of your GitHub repository.
        Example: if your file is called "theme.mp3", change it to src="theme.mp3"
    -->
    <audio id="credits-music">
        <source src="credits.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        function attemptLogin() {
            const user     = document.getElementById('username').value;
            const pass     = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (user === "admin" && pass === "general") {
                startCredits();
            } else {
                errorMsg.style.display = "block";
            }
        }

        function startCredits() {
            // Hide login
            document.getElementById('login-container').style.display = 'none';

            // Show credits wrapper
            const wrapper = document.getElementById('credits-wrapper');
            const content = document.getElementById('credits-content');
            wrapper.style.display = 'block';

            // Play music — this works on GitHub Pages because it's
            // triggered directly by a user click (the AUTHORIZE button).
            const music = document.getElementById('credits-music');
            music.play().catch(e => {
                console.warn("Audio could not play:", e);
            });

            // Start the 3:20 scroll animation
            content.classList.add('scrolling');
        }
    </script>
</body>
</html>
