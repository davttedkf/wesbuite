<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Microsoft Windows 95</title>
    <style>
        :root {
            --win-bg: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #dfdfdf;
            --win-border-dark: #808080;
            --desktop-teal: #008080;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-color: black; font-family: "Tahoma", sans-serif;
            cursor: url('https://win98icons.alexmeub.com/cursors/arrow.cur'), auto;
        }

        /* --- BOOT SEQUENCE --- */
        #boot-screen {
            position: fixed; inset: 0; background: black;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: white;
        }

        #win95-logo { width: 300px; margin-bottom: 20px; image-rendering: pixelated; }
        .loading-bar-container { width: 200px; height: 15px; border: 2px solid #555; position: relative; }
        .loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(to right, #000080, #0000ff); }

        /* --- THE DESKTOP --- */
        #desktop {
            display: none; position: fixed; inset: 0;
            background-color: var(--desktop-teal); z-index: 1;
        }

        .taskbar {
            position: absolute; bottom: 0; width: 100%; height: 28px;
            background: var(--win-bg); border-top: 2px solid var(--win-border-light);
            display: flex; align-items: center; padding: 2px; z-index: 1000;
        }

        .start-btn {
            height: 22px; padding: 0 5px; display: flex; align-items: center;
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            font-weight: bold; font-size: 11px; margin-right: 10px;
        }

        .icon-grid {
            padding: 20px; display: flex; flex-direction: column; gap: 30px;
        }

        .icon {
            width: 64px; text-align: center; color: white; font-size: 11px;
            text-shadow: 1px 1px black; cursor: pointer;
        }

        .icon img { width: 32px; display: block; margin: 0 auto 5px; }

        /* --- THE WINDOW --- */
        #app-window {
            position: absolute; top: 20%; left: 30%; width: 450px;
            background: var(--win-bg); border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            padding: 2px; box-shadow: 2px 2px 0px black;
            display: none; z-index: 500;
        }

        .title-bar {
            background: var(--win-blue); color: white; padding: 3px 6px;
            display: flex; justify-content: space-between; font-weight: bold; font-size: 12px;
        }

        .window-content {
            padding: 20px; border: 1px solid var(--win-border-dark); margin: 2px; text-align: center;
        }

        #lumpy {
            width: 100px; animation: breathe 3s infinite ease-in-out;
            image-rendering: pixelated;
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05, 0.95); } }

        .dialog {
            background: white; border: 2px inset var(--win-border-dark);
            padding: 10px; margin: 15px 0; font-size: 12px; text-align: left; min-height: 40px;
        }

        /* --- DATA REVEAL --- */
        #audit-log { text-align: left; font-size: 11px; display: none; }
        .log-entry { margin: 5px 0; opacity: 0; transition: opacity 0.3s; }
        .val { color: var(--win-blue); float: right; font-weight: bold; }

        /* --- THE END --- */
        #horror-overlay {
            position: fixed; inset: 0; background: black; color: red;
            z-index: 20000; display: none; flex-direction: column;
            justify-content: center; align-items: center; font-family: monospace;
        }

        .glitch { animation: shake 0.05s infinite; filter: invert(1) contrast(5); }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="boot-screen">
        <img id="win95-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/e9/Windows_95_logo_and_wordmark.svg" alt="Win95">
        <div class="loading-bar-container">
            <div class="loading-bar-fill" id="boot-progress"></div>
        </div>
        <p style="font-size: 10px; margin-top: 10px;">Click to initialize hardware...</p>
    </div>

    <div id="desktop">
        <div class="icon-grid">
            <div class="icon" ondblclick="openApp()">
                <img src="https://win98icons.alexmeub.com/icons/png/computer_pc-4.png">
                My Computer
            </div>
            <div class="icon" ondblclick="openApp()">
                <img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png">
                Recycle Bin
            </div>
            <div class="icon" id="exe-icon" ondblclick="runLumpy()">
                <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png">
                Friendship.exe
            </div>
        </div>

        <div class="taskbar">
            <div class="start-btn">Start</div>
            <div style="flex:1"></div>
            <div id="clock" style="font-size:11px; padding-right:10px;"></div>
        </div>
    </div>

    <div id="app-window" class="window">
        <div class="title-bar"><span>Lumpy's Friendship Scan</span><span>[X]</span></div>
        <div class="window-content">
            <img src="lumpy.png" id="lumpy">
            <div class="dialog" id="dialog">...</div>
            <div id="controls"></div>
            <div id="audit-log"></div>
        </div>
    </div>

    <div id="horror-overlay">
        <h1 id="scare-msg">SYSTEM CORRUPTION</h1>
        <div id="final-stats" style="text-align: left; width: 300px;"></div>
    </div>

    <audio id="snd_startup" src="startup.mp3"></audio>
    <audio id="snd_click" src="click.mp3"></audio>
    <audio id="snd_talk" src="talk.mp3"></audio>
    <audio id="snd_hdd" loop src="hdd_scratch.mp3"></audio>
    <audio id="snd_alert" src="alert.mp3"></audio>
    <audio id="snd_horror" src="corruption.mp3"></audio>

    <script>
        let audioStarted = false;
        const play = (id) => { if(audioStarted) { document.getElementById(id).currentTime = 0; document.getElementById(id).play(); } };

        function enableAudio() {
            if(!audioStarted) {
                audioStarted = true;
                startBoot();
            }
        }

        function startBoot() {
            let prog = 0;
            const bar = document.getElementById('boot-progress');
            const interval = setInterval(() => {
                prog += Math.random() * 5;
                bar.style.width = prog + "%";
                if(prog >= 100) {
                    clearInterval(interval);
                    showDesktop();
                }
            }, 100);
        }

        function showDesktop() {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('desktop').style.display = 'block';
            play('snd_startup');
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function runLumpy() {
            play('snd_click');
            document.body.style.cursor = "url('https://win98icons.alexmeub.com/cursors/wait.cur'), wait";
            setTimeout(() => {
                document.body.style.cursor = "url('https://win98icons.alexmeub.com/cursors/arrow.cur'), auto";
                document.getElementById('app-window').style.display = 'block';
                startLumpyTalk();
            }, 1000);
        }

        function startLumpyTalk() {
            play('snd_talk');
            document.getElementById('dialog').innerText = "Hi! I'm Lumpy! I want to link our souls! Can I see your eyes through the camera?";
            document.getElementById('controls').innerHTML = '<button onclick="openCam()" style="padding:4px 15px;">Enable Optics</button>';
        }

        async function openCam() {
            play('snd_click');
            try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch(e) {}
            
            document.getElementById('controls').style.display = 'none';
            document.getElementById('audit-log').style.display = 'block';
            runSlowReveal();
        }

        async function runSlowReveal() {
            const bat = await navigator.getBattery();
            const time = new Date().toLocaleTimeString();
            
            const entries = [
                { label: "TARGET_OS", val: navigator.platform },
                { label: "SYNC_TIME", val: time },
                { label: "ENERGY_RESERVE", val: Math.floor(bat.level * 100) + "%" },
                { label: "BIO_SCAN", val: "VULNERABLE" }
            ];

            let i = 0;
            const revealNext = () => {
                if(i < entries.length) {
                    play('snd_hdd');
                    document.getElementById('dialog').innerText = "Analyzing " + entries[i].label + "...";
                    
                    setTimeout(() => {
                        document.getElementById('snd_hdd').pause();
                        play('snd_alert');
                        const id = "log-" + i;
                        document.getElementById('audit-log').innerHTML += `<div class="log-entry" id="${id}" style="opacity:1">${entries[i].label}: <span class="val">${entries[i].val}</span></div>`;
                        i++;
                        setTimeout(revealNext, 2000); // 2 second delay for "Slow Rot"
                    }, 12000 / 10); // Simulated HDD seek time
                } else {
                    setTimeout(triggerHorror, 2500);
                }
            };
            revealNext();
        }

        function triggerHorror() {
            play('snd_horror');
            document.getElementById('app-window').classList.add('glitch');
            document.getElementById('lumpy').style.animation = "shake 0.05s infinite";
            
            setTimeout(() => {
                document.getElementById('horror-overlay').style.display = 'flex';
                document.getElementById('final-stats').innerHTML = "> I CAN SEE YOU BLINKING.<br>> I'M IN THE ROOM NOW.<br>> DON'T TURN OFF THE MONITOR.";
                
                setTimeout(() => {
                    document.body.innerHTML = "<div style='background:black; color:white; height:100vh; display:flex; align-items:center; justify-content:center; font-size:10px;'>Look behind you.</div>";
                }, 6000);
            }, 2000);
        }
    </script>
</body>
</html>
