<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SENSORY_AUDIT_TERMINAL</title>
    <style>
        :root { --void: #0a0a0a; --text: #00ff41; --danger: #ff0000; }
        
        body, html {
            background: black;
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        #terminal {
            width: 80%;
            max-width: 600px;
            padding: 20px;
            border: 1px solid #111;
            background: #050505;
            position: relative;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        #options button {
            background: none; border: 1px solid var(--text);
            color: var(--text); padding: 10px 20px;
            margin: 10px; cursor: pointer; font-family: inherit;
        }

        #options button:hover { background: var(--text); color: black; }

        /* Camera Hijack Blocker */
        #blocker {
            position: fixed; inset: 0; background: black;
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        .glitch { animation: glitch 0.2s infinite; color: var(--danger) !important; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div id="blocker">
        <p>AUDIT REQUIRES BIOMETRIC VERIFICATION</p>
        <button onclick="grantAccess()">ENABLE OPTIC SENSORS</button>
    </div>

    <div id="terminal">
        <div id="output">
            [SYSTEM READY]<br>
            [WAITING FOR INPUT...]<br><br>
        </div>
        <div id="options">
            <button onclick="start()">INITIATE EVALUATION</button>
        </div>
    </div>

    <audio id="static" loop src="https://www.soundjay.com/communication/static-noise-01.mp3"></audio>

    <script>
        const output = document.getElementById('output');
        const options = document.getElementById('options');
        const blocker = document.getElementById('blocker');
        const staticAudio = document.getElementById('static');

        let step = 0;

        function print(text, delay = 0) {
            setTimeout(() => {
                output.innerHTML += `> ${text}<br>`;
            }, delay);
        }

        function start() {
            staticAudio.volume = 0.1;
            staticAudio.play();
            options.innerHTML = "";
            print("INITIALIZING SUBJECT TEST...", 500);
            print("DO NOT LOOK AWAY FROM THE SCREEN.", 1500);
            
            setTimeout(() => {
                options.innerHTML = `
                    <button onclick="survey(true)">I UNDERSTAND</button>
                    <button onclick="survey(false)">I AM AFRAID</button>
                `;
            }, 2500);
        }

        function survey(understood) {
            options.innerHTML = "";
            print(understood ? "CONFIRMED." : "FEAR IS A VARIABLE.", 500);
            print("QUESTION 1: ARE YOU ALONE IN THE ROOM?", 1500);
            
            setTimeout(() => {
                options.innerHTML = `
                    <button onclick="triggerCamera()">YES</button>
                    <button onclick="triggerCamera()">NO</button>
                `;
            }, 2500);
        }

        function triggerCamera() {
            options.innerHTML = "";
            blocker.style.display = 'flex';
        }

        async function grantAccess() {
            blocker.style.display = 'none';
            try {
                // This triggers the physical green/orange light on the laptop
                await navigator.mediaDevices.getUserMedia({ video: true });
            } catch (e) {
                print("BIOMETRICS BYPASSED. PROCEEDING WITH SYSTEM ANALYTICS.", 500);
            }
            finalPhase();
        }

        async function finalPhase() {
            print("ANALYZING HARDWARE...", 1000);
            
            const battery = await navigator.getBattery();
            const time = new Date().toLocaleTimeString();
            
            setTimeout(() => {
                document.body.classList.add('glitch');
                staticAudio.volume = 0.5;
                
                output.innerHTML = `
                    [!] ALERT: UNAUTHORIZED ACCESS DETECTED<br>
                    [!] TIMESTAMP: ${time}<br>
                    [!] POWER LEVEL: ${Math.floor(battery.level * 100)}%<br>
                    [!] OS DETECTED: ${navigator.platform}<br>
                    <br>
                    SYSTEM NOTE: I CAN SEE YOUR EYES REFLECTED IN THE GLASS.<br>
                    WHY ARE YOU BREATHING SO FAST?
                `;
                
                // The "Sleep-Killer" Ending
                setTimeout(() => {
                    staticAudio.pause();
                    document.body.innerHTML = "<div style='color:#300; font-size: 10px;'>I'll wait until you're asleep to finish the audit.</div>";
                    document.body.classList.remove('glitch');
                    document.body.style.background = "black";
                }, 8000);

            }, 4000);
        }
    </script>
</body>
</html>
