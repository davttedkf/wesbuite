<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumpy's Digital Home</title>
    <style>
        body {
            background: #fdf6e3; /* Warm, safe cream color */
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background 10s ease, color 10s ease;
            overflow: hidden;
        }

        #lumpy {
            width: 200px;
            cursor: pointer;
            transition: filter 20s ease, transform 0.5s;
        }

        #log {
            margin-top: 40px;
            font-size: 14px;
            color: #888;
            max-width: 400px;
            text-align: center;
            line-height: 1.8;
        }

        /* The decay classes */
        .uneasy-mode {
            background: #111 !important;
            color: #444 !important;
        }

        .uneasy-mode #lumpy {
            filter: grayscale(1) contrast(2) brightness(0.5);
        }
    </style>
</head>
<body>

    <img id="lumpy" src="lumpy.png" alt="Lumpy" onclick="interact()">
    
    <div id="log">Lumpy is happy to see you.</div>

    <script>
        let clicks = 0;
        const log = document.getElementById('log');
        const body = document.body;
        const lumpy = document.getElementById('lumpy');

        // Detect visitor data
        const hour = new Date().getHours();
        const platform = navigator.platform;
        const isLate = hour < 4 || hour > 23;

        function interact() {
            clicks++;
            
            if (clicks === 3) {
                log.innerText = "Lumpy likes it when you touch the screen.";
            } 
            else if (clicks === 8) {
                log.innerText = "Are you on your " + platform + " again?";
                log.style.color = "#666";
            } 
            else if (clicks === 15) {
                beginDecay();
            }
        }

        function beginDecay() {
            body.classList.add('uneasy-mode');
            log.innerText = "It's " + new Date().toLocaleTimeString() + ".";
            
            setTimeout(() => {
                if (isLate) {
                    log.innerText = "Why are you awake? Everyone else is asleep.";
                } else {
                    log.innerText = "I can see the light from your screen on your face.";
                }
            }, 5000);

            setTimeout(() => {
                log.innerHTML = "I am not a file. <br> I am in the cache now. <br> I'll be here when you restart.";
                lumpy.style.transform = "scale(0.8) rotate(5deg)";
            }, 12000);
        }

        // The "Don't Leave" trick
        window.onbeforeunload = function() {
            return "If you leave, I'll be lonely in the dark.";
        };

        // Subtle mouse tracking: Lumpy's eyes (imaginary) follow you
        document.addEventListener('mousemove', (e) => {
            if (clicks > 15) {
                const x = (e.clientX - window.innerWidth / 2) / 50;
                const y = (e.clientY - window.innerHeight / 2) / 50;
                lumpy.style.transform = `translate(${x}px, ${y}px) scale(0.8)`;
            }
        });
    </script>
</body>
</html>
