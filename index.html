<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Companions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #a38a6d; --bg: #ffffff; --light-bg: #f8f8f6; --border: #e8e8e6; --success: #2d5a27; --error: #c62828; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; position: relative; }
    
    /* BACKGROUND FIX: pointer-events none prevents blocking clicks on PC */
    .tectonic-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; pointer-events: none; }
    .plate { position: absolute; background: radial-gradient(circle, #f0f0f0 0%, rgba(255,255,255,0) 70%); border-radius: 50%; filter: blur(60px); animation: shift 30s infinite alternate ease-in-out; }
    .plate-1 { width: 800px; height: 800px; top: -200px; left: -200px; }
    .plate-2 { width: 600px; height: 600px; bottom: -100px; right: -100px; animation-duration: 45s; }
    @keyframes shift { from { transform: translate(0, 0); } to { transform: translate(80px, 40px); } }

    /* Buttons & Interaction */
    button, .qty-btn, .logo, .drop-item, .sidebar-list li { cursor: pointer; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    button:active { transform: scale(0.96); }

    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500; }
    #overlay.active { opacity: 1; visibility: visible; }

    #loader { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2000; }
    .logo { font-weight: 800; letter-spacing: 6px; text-transform: uppercase; font-size: 1.1rem; }
    .nav-icons { display: flex; gap: 25px; align-items: center; }

    .dropdown-container { position: relative; }
    .dropdown-content { display: none; position: absolute; right: 0; top: 35px; background: #fff; min-width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; border: 1px solid var(--border); z-index: 2100; overflow: hidden; }
    .dropdown-content.show { display: block; }
    .drop-item { padding: 15px 20px; font-size: 0.85rem; color: #666; border-bottom: 1px solid #f9f9f9; }

    .screen { display: none; width: 100%; min-height: 100vh; }
    .screen.active { display: block; }

    /* Sidebar Animation Fix */
    .shop-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 40px 5%; gap: 60px; }
    .sidebar { width: 220px; flex-shrink: 0; position: sticky; top: 120px; height: fit-content; }
    .sidebar-list { list-style: none; }
    .sidebar-list li { padding: 12px 0; font-size: 0.9rem; color: #999; border-left: 2px solid transparent; transition: 0.3s; }
    .sidebar-list li.active { color: var(--primary); font-weight: 700; border-left: 2px solid var(--primary); padding-left: 15px; margin-left: -17px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; flex: 1; }
    .product-card { border: 2px solid var(--border); border-radius: 20px; padding: 20px; background: #fff; position: relative; transition: 0.4s; overflow: hidden; }
    .product-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    .card-badge { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; background: var(--primary); color: #fff; z-index: 100; }
    .img-box { width: 100%; aspect-ratio: 1; background: #fafafa; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; z-index: 10; }
    .img-box img { width: 75%; transition: 0.5s; filter: grayscale(0.6); }
    .product-card:hover .img-box img { transform: scale(1.1); filter: grayscale(0); }

    /* DETAIL SCREEN: Optimized for PC (No Scroll) */
    .detail-container { max-height: 90vh; display: flex; align-items: center; justify-content: center; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center; width: 100%; max-width: 1000px; padding: 20px; }
    .detail-img-box { background: #fcfcfc; border-radius: 30px; padding: 30px; border: 1px solid var(--border); text-align: center; }
    .detail-img-box img { width: 100%; max-height: 350px; object-fit: contain; }

    .flash-sale-box { background: #fffcf0; border: 1px solid #f9e8a0; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; }

    /* Orders Centered */
    .orders-wrapper { max-width: 800px; margin: 0 auto; padding: 60px 5%; text-align: center; }
    .order-card { border: 1px solid var(--border); border-radius: 15px; padding: 30px; margin-bottom: 30px; background: #fff; text-align: left; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .track-visual { height: 6px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; }
    .track-fill { height: 100%; background: var(--success); transition: 1s ease; }

    /* Checkout */
    .checkout-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .checkout-left { background: #fdfdfd; padding: 60px 10%; border-right: 1px solid var(--border); }
    .checkout-right { padding: 60px 10%; background: #fff; }
    .checkout-summary { background: #f8f8f6; padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; }

    input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; margin-bottom: 12px; outline: none; }
    .btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    .adopt-btn { width: 100%; padding: 20px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-top: 30px; }

    .drawer { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: #fff; z-index: 3000; transition: 0.5s; display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.1); }
    .drawer.active { right: 0; }

    @media (max-width: 900px) { .checkout-layout, .detail-grid { grid-template-columns: 1fr; } .detail-container { max-height: none; } .drawer { width: 100%; } }
  </style>
</head>
<body onload="initApp()">

<div class="tectonic-bg"><div class="plate plate-1"></div><div class="plate plate-2"></div></div>

<div id="loader">
    <div class="spinner"></div>
    <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; font-weight: 700;">Authorizing Session...</p>
</div>

<nav>
  <div class="logo" onclick="handleLogoClick()">LITHOS</div>
  <div class="nav-icons" id="main-nav-icons" style="display: none;">
    <div class="dropdown-container">
        <i class="fa-regular fa-circle-user" onclick="toggleDropdown()"></i>
        <div id="account-dropdown" class="dropdown-content">
            <div class="drop-item" onclick="showScreen('orders-screen')">My Orders</div>
            <div class="drop-item" style="color: var(--error);" onclick="logout()">Logout</div>
        </div>
    </div>
    <div style="position: relative; cursor: pointer;" onclick="toggleCart()">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="badge-count" style="position: absolute; top: -10px; right: -12px; background: var(--primary); color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800;">0</span>
    </div>
  </div>
</nav>

<div id="overlay" onclick="closeAll()"></div>

<section id="auth-screen" class="screen active">
    <div style="max-width: 400px; margin: 100px auto; padding: 40px; border: 1px solid var(--border); border-radius: 20px; text-align: center; background: #fff;">
        <h2 style="font-weight: 800; margin-bottom: 10px;">LITHOS MEMBER</h2>
        <p style="color: #aaa; font-size: 0.85rem; margin-bottom: 30px;">Login required to enter.</p>
        <button class="btn" onclick="login()">Enter Collective</button>
    </div>
</section>

<section id="shop-screen" class="screen">
  <div class="shop-container">
    <aside class="sidebar">
      <h4 style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: #aaa;">Collection</h4>
      <ul class="sidebar-list">
        <li class="active" onclick="filterItems('all', this)">All Friends</li>
        <li onclick="filterItems('volcanic', this)">Volcanic</li>
        <li onclick="filterItems('metamorphic', this)">Metamorphic</li>
        <li onclick="filterItems('smooth', this)">Smooth Stones</li>
      </ul>
    </aside>
    <div class="grid" id="product-grid"></div>
  </div>
</section>

<section id="detail-screen" class="screen">
  <div class="detail-container">
    <div style="width: 100%; max-width: 1100px; padding: 0 5%;">
        <div style="cursor: pointer; margin-bottom: 20px; font-weight: 700; font-size: 0.7rem; color: #aaa;" onclick="showScreen('shop-screen')">BACK</div>
        <div class="detail-grid">
          <div class="detail-img-box"><img id="detail-img" src=""></div>
          <div>
            <h1 id="detail-title" style="font-size: 2.8rem; font-weight: 800; margin-bottom: 5px;"></h1>
            <p id="detail-price" style="font-size: 1.8rem; margin-bottom: 10px; font-weight: 300;"></p>
            <div class="flash-sale-box">
                <i class="fa-solid fa-bolt" style="color:#f9e8a0;"></i>
                <span>Order in <span id="timer-val" style="font-weight:800; font-family:monospace;">--:--:--</span> for 20% OFF.</span>
            </div>
            <p id="detail-desc" style="line-height: 1.6; color: #666; margin-bottom: 30px; font-size: 0.95rem;"></p>
            <button class="btn" onclick="addCurrentToCart()">Add to Bag</button>
          </div>
        </div>
    </div>
  </div>
</section>

<section id="orders-screen" class="screen">
    <div class="orders-wrapper">
        <h1 style="font-weight: 800; margin-bottom: 40px;">ORDER HISTORY</h1>
        <div id="orders-list"></div>
    </div>
</section>

<section id="checkout-screen" class="screen">
  <div class="checkout-layout">
    <div class="checkout-left">
      <h2 id="ch-total-hero" style="font-size: 3.5rem; font-weight: 800; margin-bottom: 30px; line-height: 0.8;"></h2>
      <div class="checkout-summary" id="ch-list"></div>
      <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.5rem;">Total <span id="ch-final"></span></div>
    </div>
    <div class="checkout-right">
        <h4 style="margin-bottom:30px;">SECURE CHECKOUT</h4>
        <input type="text" id="ship-name-input" placeholder="Full Name">
        <input type="text" id="ship-addr-input" placeholder="Street Address">
        <button class="adopt-btn" onclick="processAdoption()">Complete Adoption</button>
    </div>
  </div>
</section>

<section id="tracking-screen" class="screen">
    <div class="container" style="text-align: center; padding-top: 150px;">
      <h1>MANIFEST SECURED.</h1>
      <div id="track-id-box" style="margin: 40px 0; font-family: monospace; font-size: 1.2rem; background: #f8f8f8; padding: 25px;"></div>
      <button class="btn" style="width: 250px;" onclick="showScreen('orders-screen')">View Manifest</button>
    </div>
</section>

<div id="drawer" class="drawer">
  <div style="padding: 30px; border-bottom: 1px solid var(--border); font-weight: 800;">YOUR BAG</div>
  <div id="cart-content" style="flex:1; padding:30px; overflow-y:auto;"></div>
  <div style="padding:30px; border-top:1px solid var(--border); background:#fafafa;">
    <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:20px;">
        <span>SUBTOTAL</span><span id="subtotal"></span>
    </div>
    <button class="btn" onclick="goToCheckout()">CHECKOUT</button>
  </div>
</div>

<script>
  let cart = [];
  let orders = JSON.parse(localStorage.getItem('lithos_orders')) || [];
  let isLoggedIn = localStorage.getItem('lithos_logged_in') === 'true';
  let activeProduct = null;

  const products = [
    { id: 1, type: 'volcanic', name: 'Volcanic Basalt', price: 49, img: 'basalt.png', badge: 'BEST SELLER' },
    { id: 2, type: 'metamorphic', name: 'Highland Slate', price: 34, img: 'slate.png', badge: 'NEW' },
    { id: 3, type: 'river', name: 'River Bed Stone', price: 28, img: 'river.png', badge: '' },
    { id: 7, type: 'metamorphic', name: 'Imperial Marble', price: 65, img: 'marble.png', badge: 'PREMIUM' }
  ];

  function initApp() {
    startFlashTimer();
    if (isLoggedIn) { document.getElementById('main-nav-icons').style.display = 'flex'; showScreen('shop-screen'); }
    renderGrid(); renderOrders();
  }

  function login() { isLoggedIn = true; localStorage.setItem('lithos_logged_in', 'true'); document.getElementById('main-nav-icons').style.display = 'flex'; showScreen('shop-screen'); }
  function logout() { isLoggedIn = false; localStorage.removeItem('lithos_logged_in'); document.getElementById('main-nav-icons').style.display = 'none'; showScreen('auth-screen'); }

  function renderGrid(items = products) {
    document.getElementById('product-grid').innerHTML = items.map(p => `
      <div class="product-card" onclick="openProduct(${p.id})">
        ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
        <div class="img-box"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/300?text=Specimen'"></div>
        <h3 style="font-size: 0.9rem; text-transform:uppercase; font-weight: 700;">${p.name}</h3>
        <p style="color:#aaa;">$${p.price}.00</p>
      </div>`).join('');
  }

  function openProduct(id) {
    activeProduct = products.find(p => p.id === id);
    document.getElementById('detail-title').innerText = activeProduct.name;
    document.getElementById('detail-price').innerText = `$${activeProduct.price}.00`;
    document.getElementById('detail-desc').innerText = `A high-density geologic specimen. Displays absolute loyalty and requires zero maintenance.`;
    document.getElementById('detail-img').src = activeProduct.img;
    showScreen('detail-screen');
  }

  function addCurrentToCart() {
    const existing = cart.find(i => i.id === activeProduct.id);
    if(existing) existing.qty++; else cart.push({...activeProduct, qty: 1});
    renderCart(); toggleCart();
  }

  function updateQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if(item) { item.qty += delta; if(item.qty < 1) cart = cart.filter(i => i.id !== id); renderCart(); }
  }

  function renderCart() {
    let sub = cart.reduce((a, b) => a + (b.price * b.qty), 0);
    document.getElementById('badge-count').innerText = cart.reduce((a,b)=>a+b.qty, 0);
    document.getElementById('subtotal').innerText = `$${sub.toFixed(2)}`;
    document.getElementById('cart-content').innerHTML = cart.map(item => `
        <div class="cart-item">
            <img src="${item.img}" style="width:50px;">
            <div style="flex:1;"><div style="font-weight:700; font-size:0.8rem;">${item.name}</div>
                <div class="qty-control"><span class="qty-btn" onclick="updateQty(${item.id},-1)">-</span><span>${item.qty}</span><span class="qty-btn" onclick="updateQty(${item.id},1)">+</span></div>
            </div>
            <div style="font-weight:800;">$${item.price * item.qty}.00</div>
        </div>`).join('');
  }

  function processAdoption() {
    const name = document.getElementById('ship-name-input').value;
    const addr = document.getElementById('ship-addr-input').value;
    if(!name || !addr) return alert("All fields required.");

    document.getElementById('loader').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        const tid = "LITH-" + Math.floor(Math.random()*90000000);
        const sub = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        orders.unshift({ id: tid, date: new Date().toLocaleDateString(), timestamp: new Date().getTime(), total: sub + 5, items: cart.map(i=>({...i, paidPrice: i.price})) });
        localStorage.setItem('lithos_orders', JSON.stringify(orders));
        renderOrders(); cart = []; renderCart(); 
        document.getElementById('track-id-box').innerText = tid;
        showScreen('tracking-screen');
    }, 2000);
  }

  function renderOrders() {
    const list = document.getElementById('orders-list');
    if (!orders.length) { list.innerHTML = `<div style="text-align:center; padding:100px 0; color:#ccc;">Empty ledger.</div>`; return; }
    const now = new Date().getTime();
    list.innerHTML = orders.map(o => {
        const diff = (now - o.timestamp) / 3600000;
        let s = diff > 10 ? "Shipped" : "Nesting"; let w = diff > 10 ? "75%" : "30%";
        return `<div class="order-card">
            <div style="display:flex; justify-content:space-between;">
                <div><div style="font-weight:800;">Manifest #${o.id.substring(6,12)}</div><div style="color:#aaa; font-size:0.7rem;">${o.date}</div></div>
                <div style="font-weight:800; color:var(--accent); font-size:0.7rem; text-transform:uppercase;">${s}</div>
            </div>
            <div class="track-visual"><div class="track-fill" style="width:${w}"></div></div>
            <div style="font-size:0.85rem; margin:15px 0;">${o.items.map(i=>`<div>${i.name} (x${i.qty}) — <strong>$${i.paidPrice}.00</strong></div>`).join('')}</div>
            <div style="font-weight:800;">Paid: $${o.total.toFixed(2)}</div>
        </div>`;
    }).join('');
  }

  function startFlashTimer() {
      function update() {
          const ms = (10 * 3600000) - (new Date().getTime() % (10 * 3600000));
          const h = Math.floor(ms / 3600000);
          const m = Math.floor((ms % 3600000) / 60000);
          const s = Math.floor((ms % 60000) / 1000);
          const el = document.getElementById('timer-val');
          if(el) el.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      update(); setInterval(update, 1000);
  }

  function filterItems(t, el) {
    document.querySelectorAll('.sidebar-list li').forEach(li => li.classList.remove('active'));
    el.classList.add('active');
    renderGrid(t === 'all' ? products : products.filter(p => p.type === t));
  }

  function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
  function toggleDropdown() { document.getElementById('account-dropdown').classList.toggle('show'); }
  function toggleCart() { document.getElementById('drawer').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
  function handleLogoClick() { isLoggedIn ? showScreen('shop-screen') : showScreen('auth-screen'); }
  function closeAll() { document.getElementById('drawer').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); document.getElementById('account-dropdown').classList.remove('show'); }
  function goToCheckout() { if(!cart.length) return; 
    let sub = cart.reduce((a, b) => a + (b.price * b.qty), 0);
    document.getElementById('ch-total-hero').innerText = `$${(sub + 5).toFixed(2)}`;
    document.getElementById('ch-sub').innerText = `$${sub.toFixed(2)}`;
    document.getElementById('ch-final').innerText = `$${(sub + 5).toFixed(2)}`;
    document.getElementById('ch-list').innerHTML = cart.map(i=>`<div class="checkout-item-row"><span>${i.name} (x${i.qty})</span><span>$${i.price*i.qty}.00</span></div>`).join('');
    toggleCart(); showScreen('checkout-screen'); 
  }
</script>
</body>
</html>
