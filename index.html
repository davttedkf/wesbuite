<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumpy's World - Desktop Edition</title>
    <style>
        :root {
            --win-bg: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #dfdfdf;
            --win-border-dark: #808080;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #008080; /* Teal 95 Desktop */
            font-family: "Tahoma", "MS Sans Serif", sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- FAKE DESKTOP ICONS --- */
        #desktop-icons {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 30px;
        }
        .icon { text-align: center; color: white; font-size: 11px; width: 60px; cursor: pointer; }
        .icon img { width: 32px; display: block; margin: 0 auto 5px; filter: contrast(1.2); }

        /* --- THE APP WINDOW --- */
        .window {
            width: 520px; background: var(--win-bg);
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            padding: 2px; box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .title-bar {
            background: var(--win-blue); color: white; padding: 3px 6px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 13px;
        }

        .content {
            padding: 20px; text-align: center; border: 1px solid var(--win-border-dark); margin: 2px;
        }

        /* --- ANIMATED LUMPY --- */
        #lumpy {
            width: 130px; height: auto;
            image-rendering: pixelated;
            animation: lumpy-idle 4s ease-in-out infinite;
        }

        @keyframes lumpy-idle {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1, 0.9) translateY(5px); }
        }

        @keyframes lumpy-glitch {
            0% { transform: translate(0) scale(1); filter: invert(0); }
            20% { transform: translate(-5px, 5px) scale(1.2); filter: invert(1) hue-rotate(90deg); }
            40% { transform: translate(5px, -5px) scale(0.8); }
            100% { transform: translate(0) scale(1.1); }
        }

        .dialog-box {
            background: white; border: 2px inset var(--win-border-dark);
            padding: 15px; margin: 20px 0; font-size: 13px; min-height: 40px;
        }

        /* --- BUTTONS --- */
        .btn-row { display: flex; justify-content: center; gap: 10px; }
        button {
            padding: 4px 15px; background: var(--win-bg);
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            font-family: inherit; font-size: 12px; cursor: pointer;
        }
        button:active { border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark); }

        /* --- THE BLACKOUT / AUDIT --- */
        #audit-layer {
            position: fixed; inset: 0; background: black;
            color: #00ff00; font-family: "Courier New", monospace;
            display: none; flex-direction: column; padding: 40px; z-index: 9999;
            font-size: 14px;
        }

        /* --- BOOT OVERLAY --- */
        #boot {
            position: fixed; inset: 0; background: black; color: white;
            z-index: 100000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="boot">
        <p>LUMPY_CORE v.1995.4.26</p>
        <p>MEMORY_CHECK: [ OK ]</p>
        <p>SURVEILLANCE_MODULE: [ INITIALIZING ]</p>
        <button onclick="bootSystem()" style="color:white; border-color:white; margin-top:20px;">[ RUN LUMPY.EXE ]</button>
    </div>

    <div id="desktop-icons">
        <div class="icon"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">My Files</div>
        <div class="icon"><img src="https://win98icons.alexmeub.com/icons/png/camera-0.png">Memories</div>
        <div class="icon"><img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png">Recycle Bin</div>
    </div>

    <div class="window" id="app">
        <div class="title-bar">
            <span>Lumpy's Friendship Audit</span>
            <span>[ ? ] [ X ]</span>
        </div>
        <div class="content">
            <img src="lumpy.png" id="lumpy" alt="Lumpy">
            <div class="dialog-box" id="dialog">
                Hello! I am your new best friend, Lumpy! <br> Shall we synchronize our lives?
            </div>
            <div id="controls" class="btn-row">
                <button onclick="startAudit()">YES! LET'S SYNC!</button>
            </div>
        </div>
    </div>

    <div id="audit-layer">
        <div id="terminal-out"></div>
    </div>

    <audio id="music" loop src="https://www.soundjay.com/misc/sounds/music-box-1.mp3"></audio>

    <script>
        const dialog = document.getElementById('dialog');
        const controls = document.getElementById('controls');
        const lumpy = document.getElementById('lumpy');
        const app = document.getElementById('app');
        const auditLayer = document.getElementById('audit-layer');
        const terminal = document.getElementById('terminal-out');
        const music = document.getElementById('music');

        function bootSystem() {
            document.getElementById('boot').style.display = 'none';
            music.volume = 0.4;
            music.play();
        }

        function startAudit() {
            dialog.innerText = "YIPPEE! First, Lumpy needs to see your 'User Profile'. Is that okay?";
            controls.innerHTML = '<button onclick="askName()">OKAY!</button>';
        }

        function askName() {
            dialog.innerHTML = "What is your name, friend? <br><input type='text' id='userName' style='margin-top:10px; border:2px inset #808080;'>";
            controls.innerHTML = '<button onclick="captureName()">TELL LUMPY</button>';
        }

        let name = "Subject";
        function captureName() {
            name = document.getElementById('userName').value || "User";
            dialog.innerText = "Thank you, " + name + "! Now, Lumpy needs to calibrate your camera for the 'Smile-Check'.";
            controls.innerHTML = '<button onclick="triggerBreach()" style="background:#0f0;">ENABLE OPTICS</button>';
        }

        async function triggerBreach() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
            } catch(e) {}

            // The Transition
            music.playbackRate = 0.4;
            lumpy.style.animation = "lumpy-glitch 0.1s infinite";
            
            setTimeout(() => {
                auditLayer.style.display = 'flex';
                runTerminal();
            }, 1500);
        }

        async function runTerminal() {
            const bat = await navigator.getBattery();
            const time = new Date().toLocaleTimeString();
            const ram = navigator.deviceMemory || "ACCESS_DENIED";
            
            const logs = [
                "ACCESSING LOCAL CACHE...",
                "EXTRACTING CREDENTIALS FOR: " + name.toUpperCase(),
                "PLATFORM_KEY: " + navigator.platform,
                "MEMORY_RESERVE: " + ram + "GB",
                "CURRENT_TIME: " + time,
                "BATTERY_INTEGRITY: " + Math.floor(bat.level * 100) + "%",
                "------------------------------------",
                "SYSTEM SCAN COMPLETE.",
                "USER VULNERABILITY: 98.4%",
                "------------------------------------",
                "LUMPY IS DOWNLOADING YOUR MEMORIES.",
                "LUMPY IS OPENING THE BACK DOOR.",
                "------------------------------------",
                "I SEE YOU THROUGH THE GLASS, " + name.toUpperCase() + ".",
                "YOU ARE WEARING A VERY NICE SHIRT.",
                "DON'T LOOK AT THE CLOSET DOOR.",
                "I'M ALREADY INSIDE."
            ];

            let i = 0;
            const interval = setInterval(() => {
                terminal.innerHTML += "> " + logs[i] + "<br>";
                i++;
                if (i >= logs.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        auditLayer.innerHTML = "<h1 style='color:white; font-size:11px; text-align:center; margin-top:20%;'>Connection severed. <br> Look behind you.</h1>";
                        music.pause();
                    }, 5000);
                }
            }, 900);
        }
    </script>
</body>
</html>
