<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mission Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at center, #0e1117 0%, #0b0f14 70%);
  color: #9da7b3;
  overflow: hidden;
}

/* GRID */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ===== LOGIN ===== */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #11161c;
  padding: 30px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  text-align: center;
}

.login-box h2 {
  color: #e6edf3;
}

.warning {
  color: #ef4444;
  font-size: 12px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #0b0f14;
  border: 1px solid #222;
  color: #e6edf3;
}

button {
  width: 100%;
  padding: 10px;
  background: #d4a54a;
  border: none;
  cursor: pointer;
}

/* ===== DASHBOARD ===== */
#dashboard {
  display: none;
  height: 100vh;
}

/* HEADER */
.header {
  padding: 10px;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* MAP */
.map {
  position: relative;
  height: 100%;
}

/* SVG */
svg {
  width: 100%;
  height: 100%;
}

/* MAP IMAGE */
.world-map {
  opacity: 0.2;
}

/* NODES */
.node {
  fill: #22c55e;
  filter: drop-shadow(0 0 6px #22c55e);
  cursor: pointer;
}

/* PULSE RINGS */
.ring {
  fill: none;
  stroke: #22c55e;
  stroke-width: 1;
  opacity: 0.5;
  animation: expand 2s infinite;
}

@keyframes expand {
  0% { r: 6; opacity: 0.6; }
  100% { r: 25; opacity: 0; }
}

/* CONNECTION LINES */
.path {
  stroke: #3b82f6;
  stroke-width: 1.5;
  fill: none;
  opacity: 0.4;
}

/* MOVING SIGNAL */
.signal {
  fill: #3b82f6;
  filter: drop-shadow(0 0 6px #3b82f6);
}

/* SIGNAL ANIMATION */
@keyframes travel {
  0% { offset-distance: 0%; }
  100% { offset-distance: 100%; }
}

/* SCAN LINE */
.map::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
  background: rgba(59,130,246,0.2);
  animation: scan 5s linear infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* PANEL */
.panel {
  position: absolute;
  right: 20px;
  top: 50px;
  background: #161b22;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  border: 1px solid rgba(255,255,255,0.05);
}

.panel h4 {
  color: #e6edf3;
}

/* LOGS */
.logs {
  position: absolute;
  left: 20px;
  top: 50px;
  width: 250px;
  font-size: 12px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>SECURE ACCESS</h2>
    <div class="warning">AUTHORIZED PERSONNEL ONLY</div>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="enter()">ENTER SYSTEM</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
  NODE: GLOBAL-01 | STATUS: ACTIVE | UTC: <span id="time"></span>
</div>

<div class="map">

<svg viewBox="0 0 1000 500">

  <!-- WORLD -->
  <image class="world-map"
    href="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
    width="1000" height="500" />

  <!-- CONNECTION PATHS -->
  <path id="path1" d="M300 200 Q450 150 600 250" class="path"/>
  <path id="path2" d="M600 250 Q700 300 800 350" class="path"/>

  <!-- SIGNALS -->
  <circle r="4" class="signal">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#path1"/>
    </animateMotion>
  </circle>

  <circle r="4" class="signal">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#path2"/>
    </animateMotion>
  </circle>

  <!-- NODES -->
  <circle cx="300" cy="200" r="6" class="node" onclick="selectNode('New York')"/>
  <circle cx="600" cy="250" r="6" class="node" onclick="selectNode('Europe')"/>
  <circle cx="800" cy="350" r="6" class="node" onclick="selectNode('Asia')"/>

  <!-- RINGS -->
  <circle cx="300" cy="200" class="ring"/>
  <circle cx="600" cy="250" class="ring"/>
  <circle cx="800" cy="350" class="ring"/>

</svg>

<!-- PANEL -->
<div class="panel" id="panel">
  <h4>Node Data</h4>
  <p>Select a node</p>
</div>

<!-- LOGS -->
<div class="logs" id="logs"></div>

</div>
</div>

<script>

/* LOGIN */
function enter() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  startLogs();
}

/* TIME */
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toUTCString();
},1000);

/* LOGS */
function startLogs(){
  const logs = document.getElementById("logs");

  setInterval(()=>{
    let el = document.createElement("div");
    el.textContent = "[SYS] " + new Date().toLocaleTimeString() + " Signal detected...";
    logs.prepend(el);
  },2000);
}

/* NODE DATA */
function selectNode(name){
  document.getElementById("panel").innerHTML = `
    <h4>${name}</h4>
    <p>Status: ACTIVE</p>
    <p>Signal: ${Math.floor(Math.random()*40+60)}%</p>
    <p>Last Ping: ${new Date().toLocaleTimeString()}</p>
    <p>ID: ${Math.random().toString(36).substring(2,8).toUpperCase()}</p>
  `;
}

</script>

</body>
</html>
