<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier New', monospace;
  background: #060a0f;
  color: #7a9bb5;
  height: 100vh;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── LOGIN ── */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 10;
}

.login-box {
  background: #0c1219;
  border: 1px solid #1e3a5f;
  border-radius: 4px;
  padding: 36px 32px;
  width: 320px;
  text-align: center;
}

.login-box h2 {
  color: #e0eaf5;
  font-size: 15px;
  letter-spacing: 0.25em;
  margin-bottom: 4px;
}

.login-box .sub {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #ef4444;
  margin-bottom: 24px;
}

.login-box input {
  width: 100%;
  margin: 6px 0;
  padding: 10px 12px;
  background: #060a0f;
  border: 1px solid #1e3a5f;
  color: #c8ddef;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s;
}

.login-box input:focus { border-color: #3b82f6; }

.login-btn {
  width: 100%;
  margin-top: 12px;
  padding: 11px;
  background: #d4a54a;
  border: none;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #060a0f;
  border-radius: 2px;
  transition: background 0.2s, transform 0.1s;
}

.login-btn:hover { background: #e6b85a; }
.login-btn:active { transform: scale(0.98); }
.login-err { color: #ef4444; font-size: 11px; margin-top: 10px; min-height: 14px; letter-spacing: 0.05em; }

/* ── DASH ── */
#dash {
  display: none;
  height: 100vh;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

#dash.visible { display: flex; }

.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 16px;
  background: #0c1219;
  border-bottom: 1px solid #1a2a3a;
  font-size: 11px;
  letter-spacing: 0.12em;
  flex-shrink: 0;
  z-index: 5;
}

.topbar .logo { color: #d4a54a; font-weight: 700; font-size: 13px; letter-spacing: 0.3em; }
.topbar .stat { color: #4a7a9b; }
.topbar .stat span { color: #22c55e; }
.topbar #clock { color: #7a9bb5; margin-left: auto; }

.content { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px;
  background: #0c1219;
  border-right: 1px solid #1a2a3a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-title {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #4a7a9b;
  padding: 12px 14px 8px;
  border-bottom: 1px solid #1a2a3a;
}

#info-panel {
  padding: 14px;
  border-bottom: 1px solid #1a2a3a;
  min-height: 160px;
}

#info-panel .no-select { color: #2a4a6a; font-size: 11px; font-style: italic; margin-top: 8px; }
#info-panel h3 { color: #e0eaf5; font-size: 13px; letter-spacing: 0.15em; margin-bottom: 10px; }
#info-panel .row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #0f1e2e; }
#info-panel .row .label { color: #4a7a9b; }
#info-panel .row .val { color: #c8ddef; }

.log-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.log-title { font-size: 10px; letter-spacing: 0.2em; color: #4a7a9b; padding: 10px 14px 6px; }
#logs { flex: 1; overflow-y: auto; padding: 0 14px 10px; }
#logs::-webkit-scrollbar { width: 3px; }
#logs::-webkit-scrollbar-track { background: transparent; }
#logs::-webkit-scrollbar-thumb { background: #1e3a5f; }
.log-entry { font-size: 10px; padding: 3px 0; border-bottom: 1px solid #0f1e2e; line-height: 1.5; }
.log-entry .ts { color: #2a5a7a; }
.log-entry .msg { color: #5a8aaa; margin-left: 4px; }
.log-entry.alert .msg { color: #d4a54a; }
.log-entry.warn .msg  { color: #ef4444; }

/* ── MAP ── */
.map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #060a0f;
}

#map-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.country {
  fill: #0f1e2e;
  stroke: #1a3550;
  stroke-width: 0.4;
  cursor: pointer;
  transition: fill 0.2s;
}

.country:hover { fill: #162a40; }

.country.selected {
  fill: #0d2a45;
  stroke: #3b82f6;
  stroke-width: 1.5;
}

.country-glow {
  fill: none;
  stroke: #3b82f6;
  stroke-width: 3;
  opacity: 0;
  pointer-events: none;
}

.country-glow.active {
  opacity: 1;
  animation: countryPulse 2s ease-in-out infinite;
}

@keyframes countryPulse {
  0%, 100% { opacity: 0.8; stroke-width: 3; filter: drop-shadow(0 0 4px #3b82f6); }
  50%        { opacity: 0.3; stroke-width: 5; filter: drop-shadow(0 0 12px #3b82f6); }
}

/* Scan line */
.map-wrap::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), transparent);
  animation: scan 6s linear infinite;
  z-index: 4;
  pointer-events: none;
}

@keyframes scan {
  0%   { top: 0%; }
  100% { top: 100%; }
}

/* Legend */
.legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: rgba(12,18,25,0.85);
  border: 1px solid #1a2a3a;
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 10px;
  letter-spacing: 0.1em;
  z-index: 3;
}

.legend-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Corner brackets */
.corner {
  position: absolute;
  width: 16px;
  height: 16px;
  border-color: #d4a54a;
  border-style: solid;
  opacity: 0.5;
  z-index: 3;
  pointer-events: none;
}
.corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
.corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
.corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>⬡ MISSION CONTROL</h2>
    <div class="sub">AUTHORIZED PERSONNEL ONLY</div>
    <input id="uname" placeholder="USERNAME" onkeydown="if(event.key==='Enter')tryLogin()">
    <input id="upass" type="password" placeholder="PASSWORD" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">ACCESS SYSTEM</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <span class="logo">⬡ MISSION CONTROL</span>
    <span class="stat">STATUS <span>ONLINE</span></span>
    <span class="stat">ALERTS <span id="alert-count" style="color:#d4a54a">0</span></span>
    <span id="clock">--:--:-- UTC</span>
  </div>

  <div class="content">
    <div class="sidebar">
      <div class="sidebar-title">// SELECTED REGION</div>
      <div id="info-panel">
        <div class="no-select">Click a country to inspect</div>
      </div>
      <div class="log-section">
        <div class="log-title">// ACTIVITY LOG</div>
        <div id="logs"></div>
      </div>
    </div>

    <div class="map-wrap" id="map-wrap">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <svg id="map-svg"></svg>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444; border-radius:0; width:12px; height:2px; margin: 3px 0;"></div> <span style="color:#5a8aaa">SELECTED BORDER</span></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   LOGIN
───────────────────────────────────────── */
var VALID_USER = "admin", VALID_PASS = "admin";

function tryLogin() {
  var u = document.getElementById("uname").value.trim();
  var p = document.getElementById("upass").value;
  var err = document.getElementById("lerr");
  if (!u || !p) { err.textContent = "Enter username and password."; return; }
  if (u !== VALID_USER || p !== VALID_PASS) {
    err.textContent = "Invalid credentials. Access denied.";
    document.getElementById("upass").value = "";
    return;
  }
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").classList.add("visible");
  initDash();
}

/* ─────────────────────────────────────────
   CLOCK
───────────────────────────────────────── */
function startClock() {
  function tick() {
    var now = new Date();
    document.getElementById("clock").textContent =
      now.toUTCString().split(' ').slice(4,5)[0] + " UTC";
  }
  tick(); setInterval(tick, 1000);
}

/* ─────────────────────────────────────────
   DATA
───────────────────────────────────────── */
var COUNTRY_DATA = {
  "United States of America": { pop:"331M", gdp:"$23T", capital:"Washington D.C.", status:"MONITORED", region:"N. America" },
  "United Kingdom":            { pop:"68M",  gdp:"$3.1T", capital:"London", status:"MONITORED", region:"Europe" },
  "China":                     { pop:"1.4B", gdp:"$17.7T", capital:"Beijing", status:"ACTIVE", region:"Asia" },
  "Japan":                     { pop:"125M", gdp:"$4.9T", capital:"Tokyo", status:"ACTIVE", region:"Asia" },
  "Australia":                 { pop:"26M",  gdp:"$1.7T", capital:"Canberra", status:"MONITORED", region:"Oceania" },
  "Brazil":                    { pop:"215M", gdp:"$1.9T", capital:"Brasília", status:"TRACKED", region:"S. America" },
  "Russia":                    { pop:"144M", gdp:"$1.8T", capital:"Moscow", status:"ALERT", region:"Europe/Asia" },
  "India":                     { pop:"1.4B", gdp:"$3.5T", capital:"New Delhi", status:"ACTIVE", region:"Asia" },
  "Germany":                   { pop:"84M",  gdp:"$4.2T", capital:"Berlin", status:"MONITORED", region:"Europe" },
  "France":                    { pop:"68M",  gdp:"$2.9T", capital:"Paris", status:"MONITORED", region:"Europe" },
  "Canada":                    { pop:"38M",  gdp:"$2.2T", capital:"Ottawa", status:"MONITORED", region:"N. America" },
  "South Africa":              { pop:"60M",  gdp:"$419B", capital:"Pretoria", status:"TRACKED", region:"Africa" },
  "Nigeria":                   { pop:"218M", gdp:"$477B", capital:"Abuja", status:"TRACKED", region:"Africa" },
  "Argentina":                 { pop:"46M",  gdp:"$487B", capital:"Buenos Aires", status:"TRACKED", region:"S. America" },
  "Saudi Arabia":              { pop:"35M",  gdp:"$1T",   capital:"Riyadh", status:"ACTIVE", region:"Middle East" },
  "South Korea":               { pop:"52M",  gdp:"$1.8T", capital:"Seoul", status:"MONITORED", region:"Asia" },
  "Indonesia":                 { pop:"275M", gdp:"$1.2T", capital:"Jakarta", status:"TRACKED", region:"Asia" },
  "Mexico":                    { pop:"130M", gdp:"$1.3T", capital:"Mexico City", status:"TRACKED", region:"N. America" },
  "Egypt":                     { pop:"104M", gdp:"$476B", capital:"Cairo", status:"TRACKED", region:"Africa" },
  "Turkey":                    { pop:"85M",  gdp:"$907B", capital:"Ankara", status:"ACTIVE", region:"Europe/Asia" },
};

/* ─────────────────────────────────────────
   LOG SYSTEM
───────────────────────────────────────── */
var alertCount = 0;
var logMessages = [
  ["info",  "Uplink heartbeat stable"],
  ["info",  "Global node sync established"],
  ["info",  "Packet distribution optimal"],
  ["info",  "Security handshake verified"],
  ["warn",  "High traffic in selected sector"],
];

function addLog(type, msg) {
  var el = document.createElement("div");
  el.className = "log-entry " + (type === "alert" ? "alert" : type === "warn" ? "warn" : "");
  var now = new Date();
  var ts = now.toTimeString().split(' ')[0];
  el.innerHTML = '<span class="ts">' + ts + '</span><span class="msg">' + msg + '</span>';
  var logs = document.getElementById("logs");
  logs.insertBefore(el, logs.firstChild);
  if (logs.children.length > 60) logs.removeChild(logs.lastChild);
  if (type === "alert" || type === "warn") {
    alertCount++;
    document.getElementById("alert-count").textContent = alertCount;
  }
}

function startLogs() {
  setInterval(function() {
    var entry = logMessages[Math.floor(Math.random() * logMessages.length)];
    addLog(entry[0], entry[1]);
  }, 3500);
}

/* ─────────────────────────────────────────
   MAP
───────────────────────────────────────── */
var projection, path, svgEl, mapW, mapH;

function initMap() {
  var wrap = document.getElementById("map-wrap");
  mapW = wrap.clientWidth;
  mapH = wrap.clientHeight;

  svgEl = d3.select("#map-svg").attr("viewBox", "0 0 " + mapW + " " + mapH);
  projection = d3.geoNaturalEarth1().scale(mapW / 6.5).translate([mapW / 2, mapH / 2]);
  path = d3.geoPath().projection(projection);

  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    .then(r => r.json())
    .then(world => {
      var countries = topojson.feature(world, world.objects.countries);
      var names = getCountryNames();

      var glowLayer = svgEl.append("g");
      var countryLayer = svgEl.append("g");

      countryLayer.selectAll("path.country")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country")
        .attr("id", d => "c"+d.id)
        .attr("d", path)
        .on("click", (event, d) => {
          var name = names[d.id] || "Restricted Territory";
          selectCountry(d, name, glowLayer, countryLayer);
        });

      glowLayer.selectAll("path.country-glow")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country-glow")
        .attr("id", d => "g"+d.id)
        .attr("d", path);
    });
}

function selectCountry(d, name, glowLayer, countryLayer) {
  countryLayer.selectAll(".country").classed("selected", false);
  glowLayer.selectAll(".country-glow").classed("active", false);

  countryLayer.select("#c"+d.id).classed("selected", true);
  glowLayer.select("#g"+d.id).classed("active", true);

  showCountryInfo(name);
  addLog("info", "Registry Access: " + name);
}

function showCountryInfo(name) {
  var panel = document.getElementById("info-panel");
  var data = COUNTRY_DATA[name];

  if (!data) {
    panel.innerHTML = '<h3>' + name.toUpperCase() + '</h3>' +
      '<div class="row"><span class="label">STATUS</span><span class="val" style="color:#5a8aaa">SECURED / UNLISTED</span></div>';
    return;
  }

  var statusColor = { "MONITORED": "#3b82f6", "ACTIVE": "#22c55e", "TRACKED": "#d4a54a", "ALERT": "#ef4444" };
  var col = statusColor[data.status] || "#7a9bb5";
  
  panel.innerHTML =
    '<h3>' + name.toUpperCase() + '</h3>' +
    '<div class="row"><span class="label">STATUS</span><span class="val" style="color:'+col+'">'+data.status+'</span></div>' +
    '<div class="row"><span class="label">REGION</span><span class="val">'+data.region+'</span></div>' +
    '<div class="row"><span class="label">CAPITAL</span><span class="val">'+data.capital+'</span></div>' +
    '<div class="row"><span class="label">POPULATION</span><span class="val">'+data.pop+'</span></div>' +
    '<div class="row"><span class="label">GDP</span><span class="val">'+data.gdp+'</span></div>';
}

function getCountryNames() {
  return {
    4:"Afghanistan",8:"Albania",12:"Algeria",24:"Angola",32:"Argentina",36:"Australia",40:"Austria",50:"Bangladesh",56:"Belgium",64:"Bhutan",
    68:"Bolivia",76:"Brazil",100:"Bulgaria",116:"Cambodia",120:"Cameroon",124:"Canada",144:"Sri Lanka",152:"Chile",156:"China",170:"Colombia",
    180:"Dem. Rep. Congo",188:"Costa Rica",192:"Cuba",204:"Benin",208:"Denmark",218:"Ecuador",818:"Egypt",222:"El Salvador",231:"Ethiopia",
    246:"Finland",250:"France",276:"Germany",288:"Ghana",300:"Greece",320:"Guatemala",332:"Haiti",340:"Honduras",356:"India",360:"Indonesia",
    364:"Iran",368:"Iraq",372:"Ireland",376:"Israel",380:"Italy",388:"Jamaica",392:"Japan",400:"Jordan",398:"Kazakhstan",404:"Kenya",
    410:"South Korea",408:"North Korea",414:"Kuwait",418:"Laos",422:"Lebanon",430:"Liberia",434:"Libya",442:"Luxembourg",484:"Mexico",
    504:"Morocco",508:"Mozambique",516:"Namibia",524:"Nepal",528:"Netherlands",554:"New Zealand",558:"Nicaragua",562:"Niger",566:"Nigeria",
    578:"Norway",586:"Pakistan",591:"Panama",604:"Peru",608:"Philippines",616:"Poland",620:"Portugal",634:"Qatar",642:"Romania",643:"Russia",
    646:"Rwanda",682:"Saudi Arabia",686:"Senegal",694:"Sierra Leone",706:"Somalia",710:"South Africa",724:"Spain",729:"Sudan",752:"Sweden",
    756:"Switzerland",760:"Syria",158:"Taiwan",762:"Tajikistan",764:"Thailand",788:"Tunisia",792:"Turkey",800:"Uganda",804:"Ukraine",
    784:"UAE",826:"United Kingdom",840:"United States of America",858:"Uruguay",860:"Uzbekistan",862:"Venezuela",704:"Vietnam",887:"Yemen",
    894:"Zambia",716:"Zimbabwe",140:"Central African Republic",148:"Chad",262:"Djibouti",266:"Gabon",270:"Gambia",324:"Guinea",
    328:"Guyana",352:"Iceland",384:"Ivory Coast",426:"Lesotho",438:"Madagascar",450:"Malawi",454:"Malaysia",466:"Mali",478:"Mauritania",
    496:"Mongolia",512:"Oman",548:"Papua New Guinea",558:"Nicaragua",562:"Niger",566:"Nigeria",586:"Pakistan",598:"Papua New Guinea",
    600:"Paraguay",646:"Rwanda",748:"Eswatini",834:"Tanzania",104:"Myanmar",203:"Czechia",703:"Slovakia",705:"Slovenia",191:"Croatia",
    70:"Bosnia and Herz.",688:"Serbia",807:"North Macedonia",51:"Armenia",31:"Azerbaijan",268:"Georgia",498:"Moldova",233:"Estonia",
    428:"Latvia",440:"Lithuania",112:"Belarus",417:"Kyrgyzstan",795:"Turkmenistan"
  };
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
function initDash() {
  startClock();
  startLogs();
  initMap();
  addLog("info", "Mission Control Grid Updated.");
}
</script>
</body>
</html>
