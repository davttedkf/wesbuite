<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE $1,000,000 IMPOSSIBLE CHALLENGE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f2ff;
            --money-green: #00ff88;
            --cup-red: #e61919;
            --bg-dark: #050508;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        .studio {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            height: 140px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 4px solid var(--neon-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .prize-amount {
            font-family: 'Archivo Black', sans-serif;
            font-size: 4.5rem;
            color: var(--money-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 0;
        }

        #game-area {
            position: relative;
            width: 1000px;
            height: 600px;
            margin-top: 40px;
            z-index: 10;
        }

        .cup-wrap {
            position: absolute;
            width: 160px;
            height: 200px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .cup-mesh {
            width: 130px;
            height: 170px;
            background: linear-gradient(135deg, var(--cup-red) 0%, #800000 100%);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            position: relative;
            border-bottom: 10px solid #500000;
        }

        .beast-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: url('https://upload.wikimedia.org/wikipedia/en/d/db/MrBeast_logo.svg') no-repeat center;
            background-size: contain;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }

        .ball {
            position: absolute;
            width: 44px; height: 44px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
            z-index: 5;
            display: none;
        }

        .label-num {
            font-family: 'Archivo Black';
            font-size: 50px;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            opacity: 0;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-action {
            padding: 25px 80px;
            font-family: 'Archivo Black';
            font-size: 2.2rem;
            background: var(--money-green);
            color: black;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        #status-msg {
            font-family: 'Archivo Black';
            font-size: 4rem;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="studio">
        <header>
            <h1 class="prize-amount" id="prize-display">$1,000,000</h1>
        </header>

        <div id="game-area">
            <div id="ball-obj" class="ball"></div>

            <div class="cup-wrap" id="c0" style="left: 80px;">
                <div class="label-num">1</div>
                <div class="cup-mesh"><div class="beast-logo"></div></div>
            </div>

            <div class="cup-wrap" id="c1" style="left: 420px;">
                <div class="label-num">2</div>
                <div class="cup-mesh"><div class="beast-logo"></div></div>
            </div>

            <div class="cup-wrap" id="c2" style="left: 760px;">
                <div class="label-num">3</div>
                <div class="cup-mesh"><div class="beast-logo"></div></div>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div id="status-msg">WIN THE MILLION</div>
        <button class="btn-action" onclick="Game.init()">START CHALLENGE</button>
    </div>

    <script>
        const Game = (function() {
            const state = {
                ballSlot: 0,
                isBusy: false,
                cups: [],
                positions: [80, 420, 760],
                cupOrder: [0, 1, 2]
            };

            return {
                init: function() {
                    document.getElementById('overlay').style.display = 'none';
                    state.cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    this.start();
                },

                start: function() {
                    state.isBusy = true;
                    state.cupOrder = [0, 1, 2];
                    state.cups.forEach((c, i) => {
                        gsap.set(c, { left: state.positions[i] });
                        c.onclick = () => this.checkWin(i);
                    });

                    state.ballSlot = Math.floor(Math.random() * 3);
                    const ball = document.getElementById('ball-obj');
                    
                    gsap.set(ball, { display: 'block', left: state.positions[state.ballSlot] + 58, bottom: 120 });
                    gsap.to(".cup-mesh", { y: -180, duration: 0.8, ease: "power3.out" });

                    setTimeout(() => {
                        gsap.to(".cup-mesh", { y: 0, duration: 0.5, onComplete: () => this.shuffle() });
                    }, 1500);
                },

                shuffle: async function() {
                    document.getElementById('ball-obj').style.display = 'none';
                    for (let i = 0; i < 60; i++) {
                        const idx1 = Math.floor(Math.random() * 3);
                        let idx2;
                        do { idx2 = Math.floor(Math.random() * 3); } while (idx1 === idx2);
                        const speed = Math.max(0.03, 0.2 - (i * 0.005));
                        await this.performSwap(idx1, idx2, speed);
                    }
                    state.isBusy = false;
                    gsap.to(".label-num", { opacity: 1, duration: 0.5 });
                },

                performSwap: function(idxA, idxB, speed) {
                    return new Promise(resolve => {
                        const posA = state.positions[state.cupOrder.indexOf(idxA)];
                        const posB = state.positions[state.cupOrder.indexOf(idxB)];
                        gsap.to(state.cups[idxA], { left: posB, duration: speed });
                        gsap.to(state.cups[idxB], { left: posA, duration: speed, onComplete: resolve });
                        const iA = state.cupOrder.indexOf(idxA);
                        const iB = state.cupOrder.indexOf(idxB);
                        [state.cupOrder[iA], state.cupOrder[iB]] = [state.cupOrder[iB], state.cupOrder[iA]];
                    });
                },

                checkWin: function(clickedIndex) {
                    if (state.isBusy) return;
                    state.isBusy = true;

                    // --- RIGGED LOGIC START ---
                    // If the user picked the right cup, we move the ball index to a different cup.
                    if (clickedIndex === state.ballSlot) {
                        let newSlot;
                        do {
                            newSlot = Math.floor(Math.random() * 3);
                        } while (newSlot === clickedIndex);
                        state.ballSlot = newSlot;
                    }
                    // --- RIGGED LOGIC END ---

                    const ball = document.getElementById('ball-obj');
                    // Find where the rigged ball index ended up horizontally
                    const finalBallPos = state.positions[state.cupOrder.indexOf(state.ballSlot)] + 58;
                    
                    gsap.set(ball, { left: finalBallPos, display: 'block' });
                    gsap.to(".cup-mesh", { y: -180, duration: 1, ease: "back.out", stagger: 0.1 });
                    gsap.to(".label-num", { opacity: 0, duration: 0.3 });

                    setTimeout(() => {
                        const overlay = document.getElementById('overlay');
                        const msg = document.getElementById('status-msg');
                        overlay.style.display = 'flex';
                        msg.innerHTML = "❌ YOU LOST EVERYTHING! ❌";
                        msg.style.color = "#ff3333";
                        document.getElementById('prize-display').innerText = "$0";
                    }, 1500);
                }
            };
        })();
    </script>
</body>
</html>
