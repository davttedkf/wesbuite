<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control - Recon Trainer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #060a0f;
  color: #7a9bb5;
  height: 100vh;
  overflow: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}

/* ── LOGIN ── */
#login { height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
.login-box { background: #0c1219; border: 1px solid #1e3a5f; border-radius: 4px; padding: 36px 32px; width: 320px; text-align: center; }
.login-box h2 { color: #e0eaf5; font-size: 15px; letter-spacing: 0.25em; margin-bottom: 4px; }
.login-box .sub { font-size: 10px; letter-spacing: 0.2em; color: #d4a54a; margin-bottom: 24px; }
.login-btn { width: 100%; margin-top: 12px; padding: 11px; background: #d4a54a; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.2em; color: #060a0f; border-radius: 2px; }

/* ── DASHBOARD ── */
#dash { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 1; }
#dash.visible { display: flex; }

.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 20px;
  background: #0c1219;
  border-bottom: 1px solid #1a2a3a;
  font-size: 11px;
  letter-spacing: 0.12em;
  flex-shrink: 0;
  z-index: 5;
}
.topbar .target-display { 
    background: rgba(212, 165, 74, 0.1);
    padding: 8px 15px;
    border: 1px solid #d4a54a;
    color: #e0eaf5;
    font-weight: bold;
    font-size: 14px;
}
.topbar .target-display span { color: #d4a54a; margin-right: 10px; font-size: 10px; }

.content { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar { width: 280px; background: #0c1219; border-right: 1px solid #1a2a3a; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-title { font-size: 10px; letter-spacing: 0.2em; color: #4a7a9b; padding: 12px 14px 8px; border-bottom: 1px solid #1a2a3a; }

#stats-panel { padding: 14px; border-bottom: 1px solid #1a2a3a; }
.stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
.stat-row .label { color: #4a7a9b; }
.stat-row .val { color: #e0eaf5; font-weight: bold; }

.history-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: #080d14; }
#history-log { flex: 1; overflow-y: auto; padding: 10px 14px; font-size: 10px; }
.log-item { padding: 4px 0; border-bottom: 1px solid #0f1e2e; }
.log-item.hit { color: #22c55e; }
.log-item.miss { color: #ef4444; }

/* ── MAP ── */
.map-wrap { flex: 1; position: relative; overflow: hidden; background: #060a0f; }
#map-svg { width: 100%; height: 100%; display: block; }
.country { fill: #0f1e2e; stroke: #1a3550; stroke-width: 0.5; cursor: pointer; }
.country:hover { fill: #162a40; }

/* Animation Classes */
.flash-correct { fill: #22c55e !important; transition: fill 0.1s; }
.flash-wrong { fill: #ef4444 !important; transition: fill 0.1s; }

.country-glow { fill: none; stroke: #3b82f6; stroke-width: 3; opacity: 0; pointer-events: none; }
.country-glow.active { opacity: 1; animation: countryPulse 1.5s ease-in-out; }
@keyframes countryPulse { 0% { opacity: 0; stroke-width: 2; } 50% { opacity: 0.8; stroke-width: 5; } 100% { opacity: 0; stroke-width: 2; } }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>⬡ MISSION CONTROL</h2>
    <div class="sub">RECONNAISSANCE TRAINING MODULE</div>
    <button class="login-btn" onclick="tryLogin()">START SESSION</button>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="target-display"><span>LOCATE_TARGET:</span> <span id="target-name">INITIALIZING...</span></div>
    <div style="margin-left: auto; display: flex; gap: 20px;">
        <div class="stat">SUCCESS: <span id="score-hits">0</span></div>
        <div class="stat">FAILURES: <span id="score-misses">0</span></div>
        <div id="clock">--:--:-- UTC</div>
    </div>
  </div>

  <div class="content">
    <div class="sidebar">
      <div id="stats-panel">
        <div class="sidebar-title" style="padding:0; margin-bottom:10px;">// PERFORMANCE</div>
        <div class="stat-row"><span class="label">ACCURACY:</span><span class="val" id="stat-accuracy">0%</span></div>
        <div class="stat-row"><span class="label">RANK:</span><span class="val" id="stat-rank">RECRUIT</span></div>
      </div>
      
      <div class="history-section">
        <div class="sidebar-title">// MISSION LOG</div>
        <div id="history-log"></div>
      </div>
    </div>

    <div class="map-wrap" id="map-wrap">
      <svg id="map-svg"></svg>
    </div>
  </div>
</div>

<script>
var hits = 0;
var misses = 0;
var currentTargetId = null;
var verifiedIds = [];

function tryLogin() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").classList.add("visible");
  initDash();
}

function startClock() {
  setInterval(() => { document.getElementById("clock").textContent = new Date().toUTCString().split(' ')[4] + " UTC"; }, 1000);
}

var projection, path, svgEl, countryLayer, glowLayer;

function initDash() {
  startClock();
  var wrap = document.getElementById("map-wrap");
  svgEl = d3.select("#map-svg").attr("viewBox", `0 0 ${wrap.clientWidth} ${wrap.clientHeight}`);
  projection = d3.geoNaturalEarth1().scale(wrap.clientWidth / 6.5).translate([wrap.clientWidth / 2, wrap.clientHeight / 2]);
  path = d3.geoPath().projection(projection);

  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    .then(r => r.json())
    .then(world => {
      var countries = topojson.feature(world, world.objects.countries);
      var names = getCountryNames();
      
      // Filter for countries we actually have names for
      verifiedIds = countries.features
        .filter(f => names[parseInt(f.id)])
        .map(f => parseInt(f.id));

      glowLayer = svgEl.append("g");
      countryLayer = svgEl.append("g");

      countryLayer.selectAll("path.country")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country")
        .attr("id", d => "c"+d.id)
        .attr("d", path)
        .on("click", (e, d) => handleMapClick(d.id));

      glowLayer.selectAll("path.country-glow")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country-glow")
        .attr("id", d => "g"+d.id)
        .attr("d", path);

      nextTarget();
    });
}

function nextTarget() {
  var names = getCountryNames();
  currentTargetId = verifiedIds[Math.floor(Math.random() * verifiedIds.length)];
  document.getElementById("target-name").innerText = names[currentTargetId].toUpperCase();
}

function handleMapClick(clickedId) {
  var names = getCountryNames();
  var idInt = parseInt(clickedId);
  var targetName = names[currentTargetId];
  var clickedName = names[idInt] || "Unknown Territory";
  
  var log = document.getElementById("history-log");
  var entry = document.createElement("div");
  entry.className = "log-item";

  if (idInt === currentTargetId) {
    // CORRECT
    hits++;
    entry.className += " hit";
    entry.innerText = `[SUCCESS] Correctly identified ${targetName}`;
    flashCountry(clickedId, "flash-correct");
    nextTarget();
  } else {
    // WRONG
    misses++;
    entry.className += " miss";
    entry.innerText = `[FAILED] Expected ${targetName}, but selected ${clickedName}`;
    flashCountry(clickedId, "flash-wrong");
    // Show correct location glow briefly
    glowLayer.select("#g"+currentTargetId).classed("active", true);
    setTimeout(() => {
        glowLayer.select("#g"+currentTargetId).classed("active", false);
    }, 1500);
  }

  log.insertBefore(entry, log.firstChild);
  updateStats();
}

function flashCountry(id, className) {
    var el = countryLayer.select("#c"+id);
    el.classed(className, true);
    setTimeout(() => el.classed(className, false), 500);
}

function updateStats() {
    document.getElementById("score-hits").innerText = hits;
    document.getElementById("score-misses").innerText = misses;
    
    var total = hits + misses;
    var acc = total === 0 ? 0 : Math.round((hits / total) * 100);
    document.getElementById("stat-accuracy").innerText = acc + "%";
    
    var rank = "RECRUIT";
    if (hits > 5) rank = "OPERATIVE";
    if (hits > 15 && acc > 80) rank = "SPECIALIST";
    if (hits > 30 && acc > 95) rank = "ELITE GHOST";
    document.getElementById("stat-rank").innerText = rank;
}

function getCountryNames() {
  return {
    196: "Cyprus", 232: "Eritrea", 124: "Canada", 32: "Argentina", 180: "Dem. Rep. of Congo", 44: "Bahamas",
    76: "Brazil", 68: "Bolivia", 84: "Belize", 72: "Botswana", 466: "Mali", 204: "Benin", 120: "Cameroon",
    454: "Malawi", 24: "Angola", 108: "Burundi", 12: "Algeria", 116: "Cambodia", 104: "Myanmar",
    50: "Bangladesh", 64: "Bhutan", 4: "Afghanistan", 51: "Armenia", 112: "Belarus", 40: "Austria",
    100: "Bulgaria", 8: "Albania", 56: "Belgium", 90: "Solomon Islands", 36: "Australia", 31: "Azerbaijan",
    96: "Brunei", 10: "Antarctica", 70: "Bosnia and Herzegovina", 214: "Dominican Republic",
    238: "Falkland Islands", 260: "French Southern Territories", 626: "Timor-Leste", 320: "Guatemala",
    630: "Puerto Rico", 624: "Guinea-Bissau", 178: "Republic of the Congo", 226: "Equatorial Guinea",
    275: "Palestine", 422: "Lebanon", 540: "New Caledonia", 458: "Malaysia", 156: "China", 643: "Russia",
    840: "United States", 250: "France", 276: "Germany", 356: "India", 392: "Japan", 710: "South Africa",
    826: "United Kingdom", 484: "Mexico", 724: "Spain", 380: "Italy", 528: "Netherlands", 752: "Sweden",
    578: "Norway", 304: "Greenland", 348: "Hungary", 616: "Poland", 818: "Egypt", 792: "Turkey", 682: "Saudi Arabia"
  };
}
</script>
</body>
</html>
