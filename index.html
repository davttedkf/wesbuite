<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Specimens</title>
  
  <link rel="icon" href="favicon.ico?v=2">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #a38a6d; --bg: #f8f8f6; --white: #ffffff; --border: #e2e2df; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); }
    
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500; }
    #overlay.active { opacity: 1; visibility: visible; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
    .logo { font-weight: 800; letter-spacing: 5px; text-transform: uppercase; cursor: pointer; }
    .cart-trigger { position: relative; cursor: pointer; font-size: 1.2rem; }
    .badge { position: absolute; top: -10px; right: -12px; background: var(--primary); color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .screen { display: none; animation: fadeIn 0.4s ease forwards; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Product Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .product-card { background: white; border: 1px solid var(--border); padding: 24px; cursor: pointer; transition: 0.2s; }
    .product-card:hover { border-color: var(--accent); }
    .img-box { width: 100%; aspect-ratio: 1; margin-bottom: 20px; overflow: hidden; background: #eee; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Product Detail Page */
    .detail-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; align-items: center; }
    .detail-img { width: 100%; background: white; border: 1px solid var(--border); }
    .back-btn { cursor: pointer; display: inline-block; margin-bottom: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--accent); }

    /* Cart Drawer */
    #drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100%; background: white; z-index: 2000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.08); }
    #drawer.active { right: 0; }
    .drawer-header { padding: 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .drawer-content { flex: 1; padding: 30px; overflow-y: auto; }
    .cart-item { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; }
    .item-img { width: 60px; height: 60px; background: #f4f4f4; border-radius: 2px; overflow: hidden; }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .qty-wrap { display: flex; align-items: center; border: 1px solid var(--border); width: fit-content; margin-top: 10px; }
    .qty-btn { cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
    .drawer-footer { padding: 30px; background: #fafaf9; border-top: 1px solid var(--border); }

    .btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; }
    input { width: 100%; padding: 14px; border: 1px solid var(--border); margin-bottom: 12px; }
    .track-num { background: #eee; padding: 15px; font-family: monospace; display: block; margin: 20px 0; }
  </style>
</head>
<body>

<div id="overlay" onclick="toggleCart()"></div>

<nav>
  <div class="logo" onclick="showScreen('shop-screen')">LITHOS</div>
  <div class="cart-trigger" onclick="toggleCart()">
    <i class="fa-solid fa-bag-shopping"></i>
    <span class="badge" id="badge-count">0</span>
  </div>
</nav>

<section id="shop-screen" class="screen active">
  <div class="container">
    <h1 style="font-weight: 300; margin-bottom: 50px; font-size: 2.5rem;">The Collection.</h1>
    <div class="grid">
      <div class="product-card" onclick="openProduct('Highland Slate')">
        <div class="img-box"><img src="slate.png" alt="Slate"></div>
        <h3>Highland Slate</h3>
        <p style="color:var(--accent); font-weight:600;">$34.00</p>
      </div>
      <div class="product-card" onclick="openProduct('River Bed Stone')">
        <div class="img-box"><img src="river.png" alt="River"></div>
        <h3>River Bed Stone</h3>
        <p style="color:var(--accent); font-weight:600;">$28.00</p>
      </div>
      <div class="product-card" onclick="openProduct('Volcanic Basalt')">
        <div class="img-box"><img src="basalt.png" alt="Basalt"></div>
        <h3>Volcanic Basalt</h3>
        <p style="color:var(--accent); font-weight:600;">$49.00</p>
      </div>
    </div>
  </div>
</section>

<section id="detail-screen" class="screen">
  <div class="container">
    <div class="back-btn" onclick="showScreen('shop-screen')"><i class="fa-solid fa-arrow-left"></i> Back to Shop</div>
    <div class="detail-layout">
      <img id="detail-img" src="" class="detail-img">
      <div>
        <h1 id="detail-title" style="font-size: 2.5rem; margin-bottom: 10px;"></h1>
        <p id="detail-price" style="font-size: 1.5rem; color: var(--accent); margin-bottom: 20px;"></p>
        <p id="detail-desc" style="line-height: 1.8; color: #555; margin-bottom: 30px;"></p>
        <button class="btn" onclick="addCurrentToCart()">Add to Bag</button>
      </div>
    </div>
  </div>
</section>

<section id="payment-screen" class="screen">
  <div class="container" style="max-width: 600px;">
    <h1 style="margin-bottom: 30px;">Shipping Details</h1>
    <input type="text" id="cust-name" placeholder="Full Name">
    <input type="text" id="cust-street" placeholder="Address">
    <div style="background: white; border: 1px solid var(--border); padding: 20px; margin: 20px 0; display: flex; align-items: center; gap: 15px;">
        <i class="fa-brands fa-cc-visa fa-2x"></i>
        <span>Stored Visa ending in 4492</span>
    </div>
    <button class="btn" onclick="processOrder()">Place Order — <span id="pay-total"></span></button>
  </div>
</section>

<section id="tracking-screen" class="screen">
  <div class="container" style="text-align: center; max-width: 600px;">
    <i class="fa-solid fa-truck-fast fa-3x" style="color: var(--accent); margin-bottom: 30px;"></i>
    <h2>Dispatched.</h2>
    <div class="track-num" id="track-id"></div>
    <p><strong>Arriving:</strong> 1 Week — 1 Month</p>
    <button class="btn" style="margin-top: 40px; background: none; color: #121212; border: 1px solid #ccc;" onclick="location.reload()">Return Home</button>
  </div>
</section>

<div id="drawer">
  <div class="drawer-header">
    <span style="font-weight: 800; letter-spacing: 3px;">YOUR BAG</span>
    <i class="fa-solid fa-xmark" style="cursor: pointer;" onclick="toggleCart()"></i>
  </div>
  <div class="drawer-content" id="cart-items"></div>
  <div class="drawer-footer">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600;">
      <span>Subtotal</span>
      <span id="subtotal">$0.00</span>
    </div>
    <button class="btn" id="checkout-btn" onclick="startCheckout()">Checkout</button>
  </div>
</div>

<script>
  let cart = [];
  let currentProduct = null;

  const products = {
    'Highland Slate': { price: 34, img: 'slate.png', desc: 'Sourced from the misty peaks of the Scottish Highlands. This slate is known for its fine grain and exceptional silence.' },
    'River Bed Stone': { price: 28, img: 'river.png', desc: 'Smoothed by centuries of running water. A perfect, rounded companion for meditation and desk-top grounding.' },
    'Volcanic Basalt': { price: 49, img: 'basalt.png', desc: 'Born in fire. This dense volcanic rock carries the raw energy of the earth’s core. Heavy, dark, and permanent.' }
  };

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function toggleCart() {
    document.getElementById('drawer').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }

  function openProduct(name) {
    currentProduct = { name, ...products[name] };
    document.getElementById('detail-title').innerText = name;
    document.getElementById('detail-price').innerText = `$${currentProduct.price}.00`;
    document.getElementById('detail-desc').innerText = currentProduct.desc;
    document.getElementById('detail-img').src = currentProduct.img;
    showScreen('detail-screen');
  }

  function addCurrentToCart() {
    addToCart(currentProduct.name, currentProduct.price, currentProduct.img);
  }

  function addToCart(name, price, img) {
    const existing = cart.find(i => i.name === name);
    if (existing) { existing.qty++; } 
    else { cart.push({ name, price, img, qty: 1 }); }
    render();
    toggleCart();
  }

  function updateQty(index, delta) {
    cart[index].qty += delta;
    if(cart[index].qty <= 0) cart.splice(index, 1);
    render();
  }

  function render() {
    const container = document.getElementById('cart-items');
    let total = 0;
    let count = 0;

    container.innerHTML = cart.length === 0 ? '<p style="text-align:center; margin-top:50px; color:#999;">Empty.</p>' : 
      cart.map((item, i) => {
        total += item.price * item.qty;
        count += item.qty;
        return `
          <div class="cart-item">
            <div class="item-img"><img src="${item.img}"></div>
            <div style="flex:1;">
              <div style="font-weight:600; font-size:0.9rem;">${item.name}</div>
              <div class="qty-wrap">
                <div class="qty-btn" onclick="updateQty(${i}, -1)">-</div>
                <div style="padding: 0 10px; font-size: 0.8rem;">${item.qty}</div>
                <div class="qty-btn" onclick="updateQty(${i}, 1)">+</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

    document.getElementById('badge-count').innerText = count;
    document.getElementById('subtotal').innerText = `$${total}.00`;
    document.getElementById('pay-total').innerText = `$${total}.00`;
    document.getElementById('checkout-btn').style.display = cart.length === 0 ? 'none' : 'block';
  }

  function startCheckout() {
    toggleCart();
    showScreen('payment-screen');
  }

  function processOrder() {
    if(!document.getElementById('cust-street').value) return alert("Enter address");
    document.getElementById('track-id').innerText = "LITH-" + Math.floor(1000 + Math.random() * 9000);
    showScreen('tracking-screen');
  }
</script>

</body>
</html>
