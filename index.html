<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUP LEGENDS | CASINO GRAND MASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020308;
            --panel: rgba(16, 20, 35, 0.95);
            --gold: #c5a059;
            --gold-light: #f3d9a9;
            --cyan: #00e5ff;
            --red: #ff2e2e;
            --green: #00ff95;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Archivo', sans-serif;
            height: 100vh; display: grid; grid-template-columns: 320px 1fr;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: #000; border-right: 1px solid var(--glass);
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .sidebar-label { font-size: 0.6rem; color: var(--gold); letter-spacing: 3px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .dot { width: 100%; aspect-ratio: 1; border-radius: 4px; background: #111; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        .dot.win { background: var(--green); color: #000; box-shadow: 0 0 15px rgba(0, 255, 149, 0.3); border: none; }
        .dot.loss { background: var(--red); color: #fff; border: none; }

        .live-feed { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; gap: 8px; }
        .feed-item { background: var(--panel); padding: 10px; border-radius: 6px; font-size: 0.7rem; display: flex; justify-content: space-between; border-left: 2px solid #333; }
        .feed-item.big-win { border-left-color: var(--green); background: rgba(0, 255, 149, 0.05); }

        /* --- MAIN AREA --- */
        .main-stage { position: relative; display: flex; flex-direction: column; }
        
        header {
            padding: 25px 50px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 50;
        }
        .logo { font-weight: 900; font-size: 1.8rem; font-style: italic; color: #fff; }
        .logo span { color: var(--gold); }
        
        .balance-display {
            background: #000; padding: 12px 25px; border-radius: 12px;
            border: 1px solid var(--gold); color: var(--gold-light);
            font-family: 'JetBrains Mono'; font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        /* --- GAME ARENA --- */
        #arena { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1500px; }
        .floor { position: absolute; bottom: 0; width: 150%; height: 400px; background: radial-gradient(ellipse at center, #15192b 0%, #020308 80%); transform: rotateX(70deg); border-top: 1px solid rgba(255,255,255,0.05); }

        .cup-node { position: absolute; width: 160px; bottom: 140px; z-index: 20; }
        .cup-label { font-size: 4rem; font-weight: 900; color: rgba(255,255,255,0.02); text-align: center; margin-bottom: 20px; }
        
        /* THE PRO CUP */
        .cup-mesh {
            width: 140px; height: 185px; margin: 0 auto;
            background: linear-gradient(135deg, #e63946 0%, #7b0d1e 100%);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            position: relative; border-bottom: 8px solid #2b060c;
            cursor: pointer; transition: filter 0.2s;
        }
        .cup-mesh::before { content: ''; position: absolute; top: 0; width: 100%; height: 8px; background: var(--gold); opacity: 0.8; }
        .cup-mesh::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 40px; background: linear-gradient(to top, rgba(0,0,0,0.4), transparent); }
        .beast-svg { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: url('https://upload.wikimedia.org/wikipedia/en/d/db/MrBeast_logo.svg') no-repeat center; background-size: contain; filter: brightness(0) invert(1); opacity: 0.15; }

        .ball { position: absolute; width: 44px; height: 44px; background: radial-gradient(circle at 30% 30%, #fff 0%, #bdc3c7 50%, #2c3e50 100%); border-radius: 50%; display: none; bottom: 148px; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }

        /* --- DASHBOARD --- */
        .footer { height: 180px; background: #080a0f; border-top: 1px solid var(--glass); display: grid; grid-template-columns: 1fr 200px 1fr; align-items: center; padding: 0 50px; z-index: 60; }
        
        .control-panel { display: flex; align-items: center; gap: 20px; }
        .val-adjuster { display: flex; align-items: center; background: #000; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        .adj-btn { width: 45px; height: 45px; background: #111; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .adj-btn:hover { background: #222; color: var(--gold); }
        .val-display { width: 120px; text-align: center; font-family: 'JetBrains Mono'; font-weight: 700; color: #fff; }

        .mult-chips { display: flex; gap: 10px; }
        .chip { padding: 8px 15px; border-radius: 6px; background: #111; border: 1px solid #333; font-size: 0.8rem; font-weight: 900; cursor: pointer; transition: 0.2s; color: #666; }
        .chip.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 229, 255, 0.1); }

        .play-btn-wrap { display: flex; justify-content: center; }
        .master-go {
            width: 130px; height: 130px; border-radius: 50%; background: #fff; color: #000; border: 12px solid #161a24;
            font-weight: 900; font-size: 1.6rem; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: -80px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .master-go:hover:not(:disabled) { transform: scale(1.1) rotate(5deg); background: var(--gold-bright); }
        .master-go:active { transform: scale(0.9); }
        .master-go:disabled { opacity: 0.1; filter: grayscale(1); cursor: not-allowed; }

        /* --- NOTIFICATIONS --- */
        #toast-bin { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .toast { padding: 18px 50px; border-radius: 12px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border: 1px solid var(--glass); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; animation: toastIn 0.4s ease-out; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        @keyframes toastIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast.win { color: var(--green); border-color: var(--green); }
        .toast.loss { color: var(--red); border-color: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

    <aside class="sidebar">
        <div>
            <div class="sidebar-label">Session Roadmap</div>
            <div class="history-grid" id="roadmap">
                </div>
        </div>
        <div class="live-feed">
            <div class="sidebar-label">Live Activity</div>
            <div id="activity-log"></div>
        </div>
    </aside>

    <main class="main-stage">
        <header>
            <div class="logo">CUP<span>LEGENDS</span></div>
            <div class="balance-display" id="balance-ui">150,191.57 FUN</div>
        </header>

        <div id="arena">
            <div class="floor"></div>
            <div id="game-ball" class="ball"></div>
            
            <div class="cup-node" id="c0" style="left: calc(50% - 380px);">
                <div class="cup-label">1</div>
                <div class="cup-mesh"><div class="beast-svg"></div></div>
            </div>
            <div class="cup-node" id="c1" style="left: calc(50% - 80px);">
                <div class="cup-label">2</div>
                <div class="cup-mesh"><div class="beast-svg"></div></div>
            </div>
            <div class="cup-node" id="c2" style="left: calc(50% + 220px);">
                <div class="cup-label">3</div>
                <div class="cup-mesh"><div class="beast-svg"></div></div>
            </div>
        </div>

        <div class="footer">
            <div class="control-panel">
                <div class="dash-item">
                    <div class="sidebar-label">Bet Amount</div>
                    <div class="val-adjuster">
                        <button class="adj-btn" onclick="Game.adjBet(-0.5)">-</button>
                        <div class="val-display" id="bet-ui">1.50</div>
                        <button class="adj-btn" onclick="Game.adjBet(0.5)">+</button>
                    </div>
                </div>
                <div class="dash-item">
                    <div class="sidebar-label">Risk Multiplier</div>
                    <div class="mult-chips">
                        <div class="chip" onclick="Game.setMult(2, this)">x2</div>
                        <div class="chip active" onclick="Game.setMult(3, this)">x3</div>
                        <div class="chip" onclick="Game.setMult(5, this)">x5</div>
                        <div class="chip" onclick="Game.setMult(10, this)">x10</div>
                    </div>
                </div>
            </div>

            <div class="play-btn-wrap">
                <button class="master-go" id="btn-go" onclick="Game.play()">GO!</button>
            </div>

            <div class="dash-item" style="justify-self: end; text-align: right;">
                <div class="sidebar-label">Estimated Payout</div>
                <div class="val-display" style="color: var(--green); font-size: 1.4rem;" id="payout-ui">4.50 FUN</div>
            </div>
        </div>
    </main>

    <div id="toast-bin"></div>

    <script>
        // --- PRO AUDIO ---
        const FX = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f, t, d, v = 0.1) {
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(v, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            },
            tick() { this.play(800, 'sine', 0.05); },
            swipe() { this.play(200, 'triangle', 0.1, 0.03); },
            win() { [523, 659, 783].forEach((f, i) => setTimeout(() => this.play(f, 'sine', 0.2), i * 100)); },
            loss() { this.play(100, 'sawtooth', 0.4, 0.04); }
        };

        const Game = (function() {
            const S = {
                balance: 150191.57,
                bet: 1.50,
                mult: 3,
                isBusy: false,
                canPick: false,
                ballIdx: 0,
                order: [0, 1, 2],
                pos: []
            };

            function msg(text, type) {
                const b = document.getElementById('toast-bin');
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.innerText = text;
                b.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }

            function logActivity() {
                const log = document.getElementById('activity-log');
                const win = Math.random() > 0.85;
                const e = document.createElement('div');
                e.className = `feed-item ${win ? 'big-win' : ''}`;
                e.innerHTML = `<span>Player_${Math.floor(Math.random()*999)}</span> <span>${win ? '+' : '-'}${(Math.random()*10).toFixed(2)}</span>`;
                log.prepend(e);
                if(log.children.length > 12) log.lastChild.remove();
            }
            setInterval(logActivity, 4000);

            return {
                adjBet: function(v) {
                    if(S.isBusy) return;
                    S.bet = Math.max(0.5, S.bet + v);
                    document.getElementById('bet-ui').innerText = S.bet.toFixed(2);
                    this.updatePayout();
                    FX.tick();
                },
                setMult: function(m, el) {
                    if(S.isBusy) return;
                    S.mult = m;
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    el.classList.add('active');
                    this.updatePayout();
                    FX.tick();
                },
                updatePayout: function() {
                    document.getElementById('payout-ui').innerText = (S.bet * S.mult).toFixed(2) + " FUN";
                },
                play: function() {
                    if(S.isBusy || S.balance < S.bet) return;
                    S.isBusy = true;
                    S.canPick = false;
                    document.getElementById('btn-go').disabled = true;

                    S.balance -= S.bet;
                    this.updBalance();

                    const ball = document.getElementById('game-ball');
                    const cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    S.pos = cups.map(c => c.offsetLeft);

                    S.ballIdx = Math.floor(Math.random() * 3);
                    gsap.set(ball, { left: S.pos[S.ballIdx] + 58, display: 'block', bottom: 148 });
                    
                    gsap.to(".cup-mesh", { y: -190, duration: 0.6, ease: "power2.out", stagger: 0.1 });
                    
                    setTimeout(() => {
                        gsap.to(".cup-mesh", { y: 0, duration: 0.5, ease: "power2.in", onComplete: () => this.shuffle() });
                    }, 1400);
                },
                shuffle: async function() {
                    document.getElementById('game-ball').style.display = 'none';
                    const cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    
                    for (let i = 0; i < 60; i++) {
                        let a = Math.floor(Math.random() * 3), b;
                        do { b = Math.floor(Math.random() * 3); } while (a === b);
                        
                        const speed = Math.max(0.03, 0.22 - (i * 0.005));
                        if(i % 3 === 0) FX.swipe();
                        
                        const pA = S.pos[S.order.indexOf(a)], pB = S.pos[S.order.indexOf(b)];
                        gsap.to(cups[a], { left: pB, duration: speed });
                        await gsap.to(cups[b], { left: pA, duration: speed });

                        const iA = S.order.indexOf(a), iB = S.order.indexOf(b);
                        [S.order[iA], S.order[iB]] = [S.order[iB], S.order[iA]];
                    }
                    this.ready();
                },
                ready: function() {
                    S.canPick = true;
                    gsap.to(".cup-label", { opacity: 1, color: "var(--cyan)" });
                    [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')].forEach((a, i) => {
                        a.onclick = () => this.reveal(i);
                    });
                },
                reveal: function(choice) {
                    if(!S.canPick) return;
                    S.canPick = false;

                    // THE RIG: Chance of win decreases as multiplier increases
                    const rigThreshold = 1 - (1 / (S.mult * 1.5)); // e.g., x10 has tiny win chance
                    if (Math.random() < rigThreshold && choice === S.ballIdx) {
                        S.ballIdx = (choice + 1) % 3;
                    }

                    const win = (choice === S.ballIdx);
                    const ball = document.getElementById('game-ball');
                    const finalX = S.pos[S.order.indexOf(S.ballIdx)] + 58;
                    
                    gsap.set(ball, { left: finalX, display: 'block' });
                    gsap.to(".cup-mesh", { y: -200, duration: 0.8, ease: "back.out", stagger: 0.05 });
                    gsap.to(".cup-label", { opacity: 0 });

                    setTimeout(() => {
                        if (win) {
                            FX.win();
                            S.balance += (S.bet * S.mult);
                            msg(`WINNER! +${(S.bet * S.mult).toFixed(2)}`, "win");
                        } else {
                            FX.loss();
                            msg("BET FAILED", "loss");
                        }
                        this.updBalance();
                        this.updRoadmap(win);
                        this.cleanup();
                    }, 1000);
                },
                updBalance: function() {
                    document.getElementById('balance-ui').innerText = S.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " FUN";
                },
                updRoadmap: function(win) {
                    const r = document.getElementById('roadmap');
                    const d = document.createElement('div');
                    d.className = `dot ${win ? 'win' : 'loss'}`;
                    d.innerText = win ? 'W' : 'L';
                    r.prepend(d);
                    if(r.children.length > 20) r.lastChild.remove();
                },
                cleanup: function() {
                    setTimeout(() => {
                        gsap.to(".cup-mesh", { y: 0, duration: 0.5 });
                        document.getElementById('game-ball').style.display = 'none';
                        document.getElementById('btn-go').disabled = false;
                        S.isBusy = false;
                    }, 1500);
                }
            };
        })();

        // Initial Roadmap padding
        for(let i=0; i<20; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            document.getElementById('roadmap').appendChild(d);
        }
    </script>
</body>
</html>
