<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control - Recon Trainer v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #060a0f;
  color: #7a9bb5;
  height: 100vh;
  overflow: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}

/* ── LOGIN ── */
#login { height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
.login-box { background: #0c1219; border: 1px solid #1e3a5f; border-radius: 4px; padding: 36px 32px; width: 320px; text-align: center; }
.login-box h2 { color: #e0eaf5; font-size: 15px; letter-spacing: 0.25em; margin-bottom: 4px; }
.login-box .sub { font-size: 10px; letter-spacing: 0.2em; color: #d4a54a; margin-bottom: 24px; }
.login-btn { width: 100%; margin-top: 12px; padding: 11px; background: #d4a54a; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.2em; color: #060a0f; border-radius: 2px; }

/* ── DASHBOARD ── */
#dash { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 1; }
#dash.visible { display: flex; }

.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 20px;
  background: #0c1219;
  border-bottom: 1px solid #1a2a3a;
  font-size: 11px;
  letter-spacing: 0.12em;
  flex-shrink: 0;
  z-index: 5;
}
.topbar .target-display { 
    background: rgba(212, 165, 74, 0.1);
    padding: 8px 15px;
    border: 1px solid #d4a54a;
    color: #e0eaf5;
    font-weight: bold;
    font-size: 14px;
}

.content { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar { width: 300px; background: #0c1219; border-right: 1px solid #1a2a3a; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-title { font-size: 10px; letter-spacing: 0.2em; color: #4a7a9b; padding: 12px 14px 8px; border-bottom: 1px solid #1a2a3a; }

.panel-section { padding: 14px; border-bottom: 1px solid #1a2a3a; }
.stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; }
.stat-row .label { color: #4a7a9b; }
.stat-row .val { color: #e0eaf5; }

#diff-slider { width: 100%; margin: 10px 0; accent-color: #d4a54a; cursor: pointer; }
#diff-label { color: #d4a54a; font-weight: bold; letter-spacing: 1px; }

.history-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: #080d14; }
#history-log { flex: 1; overflow-y: auto; padding: 10px 14px; font-size: 10px; }
.log-item { padding: 4px 0; border-bottom: 1px solid #0f1e2e; }
.log-item.hit { color: #22c55e; }
.log-item.miss { color: #ef4444; }

/* ── MAP ── */
.map-wrap { flex: 1; position: relative; overflow: hidden; background: #060a0f; cursor: crosshair; }
#map-svg { width: 100%; height: 100%; display: block; }
.country { fill: #0f1e2e; stroke: #1a3550; stroke-width: 0.5; cursor: pointer; transition: fill 0.2s; }
.country:hover { fill: #162a40; }

.flash-correct { fill: #22c55e !important; }
.flash-wrong { fill: #ef4444 !important; }

.country-glow { fill: none; stroke: #3b82f6; stroke-width: 3; opacity: 0; pointer-events: none; }
.country-glow.active { opacity: 1; animation: countryPulse 1.5s ease-in-out; }
@keyframes countryPulse { 0% { opacity: 0; stroke-width: 2; } 50% { opacity: 0.8; stroke-width: 5; } 100% { opacity: 0; stroke-width: 2; } }

/* Zoom Hint */
.zoom-hint { position: absolute; bottom: 10px; right: 10px; font-size: 9px; color: #2a4a6a; pointer-events: none; }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>⬡ MISSION CONTROL</h2>
    <div class="sub">GLOBAL RECON TRAINING v4.0</div>
    <button class="login-btn" onclick="tryLogin()">START SESSION</button>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="target-display" id="target-display">LOCATING TARGET...</div>
    <div style="margin-left: auto; display: flex; gap: 20px;">
        <div class="stat">HITS: <span id="score-hits" style="color:#22c55e">0</span></div>
        <div class="stat">MISSES: <span id="score-misses" style="color:#ef4444">0</span></div>
        <div id="clock">--:--:-- UTC</div>
    </div>
  </div>

  <div class="content">
    <div class="sidebar">
      <div class="panel-section">
        <div class="sidebar-title" style="padding:0; margin-bottom:10px;">// CALIBRATION</div>
        <div class="stat-row">
            <span class="label">DIFFICULTY:</span>
            <span class="val" id="diff-label">NOOB</span>
        </div>
        <input type="range" min="0" max="3" value="0" id="diff-slider" oninput="updateDifficulty()">
      </div>

      <div class="panel-section">
        <div class="sidebar-title" style="padding:0; margin-bottom:10px;">// PERFORMANCE</div>
        <div class="stat-row"><span class="label">ACCURACY:</span><span class="val" id="stat-accuracy">0%</span></div>
        <div class="stat-row"><span class="label">STRIKES:</span><span class="val" id="stat-strikes">0</span></div>
        <div class="stat-row"><span class="label">RANK:</span><span class="val" id="stat-rank">EVALUATING</span></div>
      </div>
      
      <div class="history-section">
        <div class="sidebar-title">// MISSION LOG</div>
        <div id="history-log"></div>
      </div>
    </div>

    <div class="map-wrap" id="map-wrap">
      <svg id="map-svg"></svg>
      <div class="zoom-hint">[SCROLL TO ZOOM | DRAG TO PAN]</div>
    </div>
  </div>
</div>

<script>
var hits = 0;
var misses = 0;
var currentStrikes = 0;
var currentTargetId = null;
var verifiedIds = [];
var difficulty = 0;

const DIFF_LEVELS = ["NOOB", "NORMAL", "PRO", "EXPERT"];
const HINT_THRESHOLDS = [10, 50, 100, 99999];

function tryLogin() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").classList.add("visible");
  initDash();
}

function updateDifficulty() {
    difficulty = parseInt(document.getElementById("diff-slider").value);
    document.getElementById("diff-label").innerText = DIFF_LEVELS[difficulty];
    addLog(`System calibrated to ${DIFF_LEVELS[difficulty]} mode.`);
}

function startClock() {
  setInterval(() => { document.getElementById("clock").textContent = new Date().toUTCString().split(' ')[4] + " UTC"; }, 1000);
}

var projection, path, svgEl, mapContent, countryLayer, glowLayer;

function initDash() {
  startClock();
  var wrap = document.getElementById("map-wrap");
  
  // Setup Zoom
  const zoom = d3.zoom()
    .scaleExtent([1, 15]) // Max zoom level 15x
    .on("zoom", (event) => {
      mapContent.attr("transform", event.transform);
    });

  svgEl = d3.select("#map-svg")
    .attr("viewBox", `0 0 ${wrap.clientWidth} ${wrap.clientHeight}`)
    .call(zoom);

  // Wrapper group for all map elements to zoom together
  mapContent = svgEl.append("g").attr("class", "map-content");

  projection = d3.geoNaturalEarth1()
    .scale(wrap.clientWidth / 6.5)
    .translate([wrap.clientWidth / 2, wrap.clientHeight / 2]);
    
  path = d3.geoPath().projection(projection);

  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    .then(r => r.json())
    .then(world => {
      var countries = topojson.feature(world, world.objects.countries);
      var names = getCountryNames();
      
      verifiedIds = countries.features
        .filter(f => names[parseInt(f.id)])
        .map(f => parseInt(f.id));

      glowLayer = mapContent.append("g");
      countryLayer = mapContent.append("g");

      countryLayer.selectAll("path.country")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country")
        .attr("id", d => "c"+d.id)
        .attr("d", path)
        .on("click", (e, d) => handleMapClick(d.id));

      glowLayer.selectAll("path.country-glow")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country-glow")
        .attr("id", d => "g"+d.id)
        .attr("d", path);

      nextTarget();
    });
}

function nextTarget() {
  var names = getCountryNames();
  currentTargetId = verifiedIds[Math.floor(Math.random() * verifiedIds.length)];
  document.getElementById("target-display").innerHTML = `LOCATE_TARGET: <span style="color:#e0eaf5">${names[currentTargetId].toUpperCase()}</span>`;
  currentStrikes = 0;
  document.getElementById("stat-strikes").innerText = "0";
}

function handleMapClick(clickedId) {
  var names = getCountryNames();
  var idInt = parseInt(clickedId);
  var targetName = names[currentTargetId];
  var clickedName = names[idInt] || `ID: ${idInt}`;
  
  if (idInt === currentTargetId) {
    hits++;
    addLog(`[OK] ${targetName.toUpperCase()} SECURED.`, "hit");
    flashCountry(clickedId, "flash-correct");
    nextTarget();
  } else {
    misses++;
    currentStrikes++;
    document.getElementById("stat-strikes").innerText = currentStrikes;
    addLog(`[!] TARGET: ${targetName.toUpperCase()} | IMPACT: ${clickedName.toUpperCase()}`, "miss");
    flashCountry(clickedId, "flash-wrong");
    
    if (currentStrikes >= HINT_THRESHOLDS[difficulty]) {
        addLog("HINT_UPLINK: Correct location broadcasting...");
        glowLayer.select("#g"+currentTargetId).classed("active", true);
        setTimeout(() => {
            glowLayer.select("#g"+currentTargetId).classed("active", false);
        }, 1200);
    }
  }
  updateStats();
}

function addLog(msg, type = "") {
    var log = document.getElementById("history-log");
    var entry = document.createElement("div");
    entry.className = "log-item " + type;
    entry.innerText = msg;
    log.insertBefore(entry, log.firstChild);
}

function flashCountry(id, className) {
    var el = countryLayer.select("#c"+id);
    el.classed(className, true);
    setTimeout(() => el.classed(className, false), 400);
}

function updateStats() {
    document.getElementById("score-hits").innerText = hits;
    document.getElementById("score-misses").innerText = misses;
    var total = hits + misses;
    var acc = total === 0 ? 0 : Math.round((hits / total) * 100);
    document.getElementById("stat-accuracy").innerText = acc + "%";
    
    var rank = "RECRUIT";
    if (hits > 10) rank = "FIELD AGENT";
    if (hits > 25 && acc > 85) rank = "COMMANDER";
    if (hits > 50 && acc > 95) rank = "GLOBAL OVERSEER";
    document.getElementById("stat-rank").innerText = rank;
}

function getCountryNames() {
  return {
    4:"Afghanistan",8:"Albania",10:"Antarctica",12:"Algeria",24:"Angola",31:"Azerbaijan",32:"Argentina",36:"Australia",40:"Austria",44:"Bahamas",50:"Bangladesh",51:"Armenia",56:"Belgium",64:"Bhutan",68:"Bolivia",70:"Bosnia and Herzegovina",72:"Botswana",76:"Brazil",84:"Belize",90:"Solomon Islands",96:"Brunei",100:"Bulgaria",104:"Myanmar",108:"Burundi",112:"Belarus",116:"Cambodia",120:"Cameroon",124:"Canada",140:"Central African Republic",144:"Sri Lanka",148:"Chad",152:"Chile",156:"China",158:"Taiwan",170:"Colombia",178:"Republic of the Congo",180:"DR Congo",188:"Costa Rica",191:"Croatia",192:"Cuba",196:"Cyprus",203:"Czechia",204:"Benin",208:"Denmark",214:"Dominican Republic",218:"Ecuador",222:"El Salvador",226:"Equatorial Guinea",231:"Ethiopia",232:"Eritrea",233:"Estonia",238:"Falkland Islands",242:"Fiji",246:"Finland",250:"France",260:"French Southern Territories",262:"Djibouti",266:"Gabon",268:"Georgia",270:"Gambia",275:"Palestine",276:"Germany",288:"Ghana",300:"Greece",304:"Greenland",320:"Guatemala",324:"Guinea",328:"Guyana",332:"Haiti",340:"Honduras",348:"Hungary",352:"Iceland",356:"India",360:"Indonesia",364:"Iran",368:"Iraq",372:"Ireland",376:"Israel",380:"Italy",384:"Ivory Coast",388:"Jamaica",392:"Japan",398:"Kazakhstan",400:"Jordan",404:"Kenya",408:"North Korea",410:"South Korea",414:"Kuwait",417:"Kyrgyzstan",418:"Laos",422:"Lebanon",426:"Lesotho",428:"Latvia",430:"Liberia",434:"Libya",438:"Madagascar",440:"Lithuania",442:"Luxembourg",450:"Malawi",454:"Malaysia",458:"Malaysia",466:"Mali",478:"Mauritania",480:"Mauritius",484:"Mexico",496:"Mongolia",498:"Moldova",499:"Montenegro",504:"Morocco",508:"Mozambique",512:"Oman",516:"Namibia",524:"Nepal",528:"Netherlands",540:"New Caledonia",548:"Vanuatu",554:"New Zealand",558:"Nicaragua",562:"Niger",566:"Nigeria",578:"Norway",586:"Pakistan",591:"Panama",598:"Papua New Guinea",600:"Paraguay",604:"Peru",608:"Philippines",616:"Poland",620:"Portugal",624:"Guinea-Bissau",626:"Timor-Leste",630:"Puerto Rico",634:"Qatar",642:"Romania",643:"Russia",646:"Rwanda",682:"Saudi Arabia",686:"Senegal",688:"Serbia",694:"Sierra Leone",702:"Singapore",703:"Slovakia",704:"Vietnam",705:"Slovenia",706:"Somalia",710:"South Africa",716:"Zimbabwe",724:"Spain",728:"South Sudan",729:"Sudan",732:"Western Sahara",740:"Suriname",748:"Eswatini",752:"Sweden",756:"Switzerland",760:"Syria",762:"Tajikistan",764:"Thailand",768:"Togo",780:"Trinidad and Tobago",784:"UAE",788:"Tunisia",792:"Turkey",795:"Turkmenistan",800:"Uganda",804:"Ukraine",807:"North Macedonia",818:"Egypt",826:"United Kingdom",834:"Tanzania",840:"United States",854:"Burkina Faso",858:"Uruguay",860:"Uzbekistan",862:"Venezuela",882:"Samoa",887:"Yemen",894:"Zambia"
  };
}
</script>
</body>
</html>
