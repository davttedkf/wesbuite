<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITHOS | Curated Geologic Companions</title>
  <link rel="icon" href="favicon.ico?v=20">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #a38a6d; --bg: #ffffff; --light-bg: #f8f8f6; --border: #e8e8e6; --success: #2d5a27; --error: #c62828; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }
    
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500; }
    #overlay.active { opacity: 1; visibility: visible; }

    #loader { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2000; }
    .logo { font-weight: 800; letter-spacing: 6px; text-transform: uppercase; cursor: pointer; font-size: 1.1rem; }
    
    .screen { display: none; width: 100%; min-height: 100vh; background: var(--bg); }
    .screen.active { display: block; }

    /* Shop Grid */
    .shop-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 60px 5%; gap: 60px; }
    .sidebar { width: 220px; flex-shrink: 0; position: sticky; top: 120px; height: fit-content; }
    .sidebar h4 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: #aaa; }
    .sidebar-list { list-style: none; margin-bottom: 40px; }
    .sidebar-list li { padding: 10px 0; font-size: 0.9rem; color: #666; cursor: pointer; transition: 0.2s; }
    .sidebar-list li:hover { color: var(--primary); }
    .sidebar-list li.active { color: var(--primary); font-weight: 700; border-left: 2px solid var(--primary); padding-left: 15px; margin-left: -17px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .product-card { border: 2px solid var(--border); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.4s; position: relative; background: #fff; }
    .product-card:hover { border-color: var(--accent); transform: translateY(-8px); }
    .img-box { width: 100%; aspect-ratio: 1/1; background: #fafafa; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .img-box img { width: 75%; height: 75%; object-fit: contain; }

    .badge { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; z-index: 10; background:#121212; color:#fff; }

    /* Restored Split Checkout */
    .checkout-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .checkout-left { background: var(--light-bg); padding: 60px 10%; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .checkout-right { padding: 60px 10%; background: #fff; }

    /* Card Field UI matched to image */
    .payment-box { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 10px; }
    .pay-input { border: none; padding: 16px; width: 100%; font-size: 1rem; font-family: inherit; }
    .pay-input:focus { outline: none; }
    .pay-row { display: flex; border-top: 1px solid var(--border); }
    .sub-input { border: none; width: 65px; text-align: center; border-right: 1px solid var(--border); padding: 16px; }
    .cvc-input { border: none; flex: 1; text-align: right; padding: 16px 20px; }

    .btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
    .btn:hover { background: #333; }

    /* Social Proof */
    #social-toast { position: fixed; bottom: 30px; left: 30px; background: #fff; border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; display: none; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 5000; animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .drawer { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: #fff; z-index: 3000; transition: 0.5s; display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.1); }
    .drawer.active { right: 0; }

    @media (max-width: 900px) { .checkout-layout, .shop-container { grid-template-columns: 1fr; flex-direction: column; } .drawer { width: 100%; right: -100%; } }
  </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text" style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; font-weight: 700;">Processing Manifest...</p>
</div>

<div id="social-toast">
    <div style="width:10px; height:10px; border-radius:50%; background:var(--accent);"></div>
    <div id="toast-text" style="font-size: 0.8rem; font-weight: 600;"></div>
</div>

<div id="overlay" onclick="toggleCart()"></div>

<nav>
  <div class="logo" onclick="showScreen('shop-screen')">LITHOS</div>
  <div class="nav-icons">
    <div style="position: relative; cursor: pointer;" onclick="toggleCart()">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="badge-count" style="position: absolute; top: -10px; right: -12px; background: var(--primary); color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800;">0</span>
    </div>
  </div>
</nav>

<section id="shop-screen" class="screen active">
  <div class="shop-container">
    <aside class="sidebar">
      <h4>Collection</h4>
      <ul class="sidebar-list">
        <li class="active" onclick="filterItems('all', this)">All Friends</li>
        <li onclick="filterItems('volcanic', this)">Volcanic</li>
        <li onclick="filterItems('metamorphic', this)">Metamorphic</li>
        <li onclick="filterItems('special', this)">Value Packs</li>
        <li onclick="filterItems('fun', this)">Smooth Stones</li>
      </ul>
    </aside>
    <div class="main-content">
      <div class="grid" id="product-grid"></div>
    </div>
  </div>
</section>

<section id="detail-screen" class="screen">
  <div class="container" style="max-width:1200px; margin:0 auto; padding:60px 5%;">
    <div style="cursor: pointer; margin-bottom: 40px; font-weight: 700; font-size: 0.7rem; color: #aaa;" onclick="showScreen('shop-screen')">BACK</div>
    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: start;">
      <div style="background: #fcfcfc; padding: 60px; border-radius: 30px; text-align: center; border: 1px solid #f0f0f0;">
          <img id="detail-img" src="" style="width: 100%; max-height: 500px; object-fit: contain;">
      </div>
      <div>
        <h1 id="detail-title" style="font-size: 3.5rem; font-weight: 800; margin-bottom: 10px;"></h1>
        <div style="margin-bottom: 30px; display: flex; align-items: center;">
            <span id="detail-rating-header" style="color: var(--accent); font-weight: 600;"></span>
            <span class="view-reviews-link" onclick="toggleReviews()" style="font-size:0.8rem; color:#aaa; margin-left:10px; cursor:pointer; text-decoration:underline;">View Reviews</span>
        </div>
        <p id="detail-price" style="font-size: 2rem; margin-bottom: 30px;"></p>
        <p id="detail-desc" style="line-height: 1.8; color: #666; margin-bottom: 40px;"></p>
        <button class="btn" onclick="addCurrentToCart()">Add to Bag</button>
      </div>
    </div>
    <div id="reviews-section" style="display:none; margin-top:60px; border-top:1px solid var(--border); padding-top:40px;">
        <h3 id="review-title-count"></h3>
        <div id="reviews-container" style="max-height: 400px; overflow-y: auto; display: grid; gap: 20px; margin-top:20px;"></div>
    </div>
  </div>
</section>

<section id="checkout-screen" class="screen">
  <div class="checkout-layout">
    <div class="checkout-left">
      <div style="cursor: pointer; font-weight: 700; font-size: 0.7rem; color: #aaa; margin-bottom: 40px;" onclick="showScreen('shop-screen')">RETURN</div>
      <h2 id="checkout-total-display" style="font-size: 3rem; margin-bottom: 40px; font-weight: 800;"></h2>
      <div id="checkout-items-summary" style="flex:1;"></div>
      <div style="border-top: 1px solid #ddd; padding-top: 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">Subtotal <span id="ch-sub"></span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">Shipping <span>$5.00</span></div>
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.5rem;">Total <span id="ch-total"></span></div>
      </div>
    </div>
    <div class="checkout-right">
        <button class="btn" style="background: #000; margin-bottom: 40px;" onclick="validateAndProcess()"> Pay</button>
        <input type="text" id="ship-name" placeholder="Full Name" style="margin-bottom:10px;">
        <input type="text" id="ship-addr" placeholder="Address">
        <div class="payment-box">
            <input type="text" id="card-num" class="pay-input" placeholder="Card Number" maxlength="19">
            <div class="pay-row">
                <input type="text" id="exp-mm" class="sub-input" placeholder="MM" maxlength="2">
                <input type="text" id="exp-yy" class="sub-input" placeholder="YY" maxlength="2">
                <input type="text" id="cvc" class="cvc-input" placeholder="CVC" maxlength="3">
            </div>
        </div>
        <button class="btn" style="margin-top:30px;" onclick="validateAndProcess()">Complete Adoption</button>
    </div>
  </div>
</section>

<section id="tracking-screen" class="screen">
    <div class="container" style="text-align: center; padding-top: 150px; max-width:600px; margin:0 auto;">
      <i class="fa-solid fa-circle-check fa-5x" style="color: var(--success); margin-bottom: 30px;"></i>
      <h1>ADOPTION CONFIRMED.</h1>
      <div id="track-id" style="margin: 40px 0; font-family: monospace; font-size: 1.2rem; background: #f8f8f8; padding: 25px;"></div>
      <button class="btn" style="width: 250px;" onclick="location.reload()">HOME</button>
    </div>
</section>

<div id="drawer" class="drawer">
  <div style="padding: 30px; border-bottom: 1px solid var(--border); font-weight: 800;">YOUR BAG</div>
  <div id="cart-content" style="flex:1; padding:30px; overflow-y:auto;"></div>
  <div style="padding:30px; border-top:1px solid var(--border); background:#fafafa;">
    <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:20px;">
        <span>SUBTOTAL</span>
        <span id="subtotal"></span>
    </div>
    <button class="btn" onclick="goToCheckout()">CHECKOUT</button>
  </div>
</div>

<script>
  let cart = [];
  let activeProduct = null;

  const products = [
    { id: 1, type: 'volcanic', name: 'Volcanic Basalt', price: 49, img: 'basalt.png', badge: 'BEST SELLER', rating: 4.9, count: 128, desc: 'A dense igneous masterpiece. Patient and loyal.' },
    { id: 2, type: 'metamorphic', name: 'Highland Slate', price: 34, img: 'slate.png', badge: 'NEW', rating: 4.7, count: 42, desc: 'Layered metamorphic rock. Excellent for deep contemplation.' },
    { id: 3, type: 'river', name: 'River Bed Stone', price: 28, img: 'river.png', badge: '', rating: 4.8, count: 85, desc: 'Smoothed by Alpine water. High tactile satisfaction.' },
    { id: 4, type: 'volcanic', name: 'Obsidian Shard', price: 55, img: 'obsidian.png', badge: 'SHARP', rating: 4.6, count: 31, desc: 'Glassy volcanic sheen. Handle with care.' },
    { id: 5, type: 'special', name: 'Family Pack', price: 95, img: 'family.png', badge: 'BUNDLE', rating: 5.0, count: 18, desc: 'Four specimens of varying sizes.' },
    { id: 6, type: 'fun', name: 'Smooth Stone', price: 42, img: 'adopt.png', badge: 'FAN FAVORITE', rating: 4.9, count: 212, desc: 'Includes knit sweater and biologic eyes.' },
    { id: 7, type: 'metamorphic', name: 'Imperial Marble', price: 65, img: 'marble.png', badge: 'PREMIUM', rating: 4.8, count: 56, desc: 'Polished metamorphic limestone with natural veining.' }
  ];

  // Unique Review Logic
  const revPool = {
    volcanic: ["So dense!", "Feels like the heat of a volcano.", "The texture is incredible.", "Heaviest rock I own."],
    metamorphic: ["The layers tell a story.", "So much character.", "Looks amazing on my desk.", "Very deep focus."],
    river: ["So smooth...", "Perfect pocket companion.", "I haven't stopped holding it.", "Calming finish."],
    fun: ["The eyes follow me!", "Sweater is high quality.", "My favorite pet.", "Actually adorable."],
    special: ["Great family dynamic.", "Kids love them.", "Good value pack.", "Full household of rocks."]
  };

  function generateUniqueReviews(p) {
    let html = "";
    const names = ["James", "Emma", "Sarah", "Michael", "David", "Olivia", "Robert", "Sophia", "Will", "Luna", "Noah", "Mia", "Leo"];
    const traits = revPool[p.type] || ["Very solid choice."];
    for(let i=0; i<p.count; i++) {
        const name = names[Math.floor(Math.random() * names.length)];
        const trait = traits[Math.floor(Math.random() * traits.length)];
        html += `<div style="border-bottom:1px solid #f0f0f0; padding-bottom:15px;"><p style="font-weight:600;">"${trait} Satisfied collector."</p><p style="font-size:0.7rem; color:#aaa; margin-top:5px;">— ${name} ${String.fromCharCode(65 + i % 26)}.</p></div>`;
    }
    return html;
  }

  function renderGrid(items = products) {
    document.getElementById('product-grid').innerHTML = items.map(p => `
      <div class="product-card" onclick="openProduct(${p.id})">
        ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
        <div class="img-box"><img src="${p.img}"></div>
        <div style="font-size:0.75rem; color:var(--accent); margin-bottom:5px;"><i class="fa-solid fa-star"></i> ${p.rating} (${p.count})</div>
        <h3 style="font-size: 0.9rem; letter-spacing: 2px; text-transform:uppercase;">${p.name}</h3>
        <p style="color:#aaa;">$${p.price}.00</p>
      </div>`).join('');
  }

  function openProduct(id) {
    const p = products.find(item => item.id === id);
    activeProduct = p;
    document.getElementById('detail-title').innerText = p.name;
    document.getElementById('detail-price').innerText = `$${p.price}.00`;
    document.getElementById('detail-desc').innerText = p.desc;
    document.getElementById('detail-img').src = p.img;
    document.getElementById('detail-rating-header').innerText = `★ ${p.rating} / 5.0`;
    document.getElementById('review-title-count').innerText = `${p.count} Verified Feedback Entries`;
    document.getElementById('reviews-container').innerHTML = generateUniqueReviews(p);
    document.getElementById('reviews-section').style.display = 'none';
    showScreen('detail-screen');
  }

  function toggleReviews() { const s = document.getElementById('reviews-section'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
  function toggleCart() { document.getElementById('drawer').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
  function addCurrentToCart() { cart.push({...activeProduct}); renderCart(); toggleCart(); }

  function renderCart() {
    let sub = cart.reduce((a, b) => a + b.price, 0);
    document.getElementById('cart-content').innerHTML = cart.map(item => `<div style="display:flex; gap:15px; margin-bottom:20px; align-items:center;"><div style="width:60px; height:60px; background:#f4f4f4; border-radius:8px; overflow:hidden;"><img src="${item.img}" style="width:100%; height:100%; object-fit:contain;"></div><div style="flex:1;"><div style="font-weight:700;">${item.name}</div><div style="color:var(--accent);">$${item.price}.00</div></div></div>`).join('');
    document.getElementById('badge-count').innerText = cart.length;
    document.getElementById('subtotal').innerText = `$${sub}.00`;
    document.getElementById('ch-sub').innerText = `$${sub}.00`;
    document.getElementById('ch-total').innerText = `$${sub + 5}.00`;
    document.getElementById('checkout-total-display').innerText = `$${sub + 5}.00`;
    document.getElementById('checkout-items-summary').innerHTML = cart.map(item => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${item.name}</span><span>$${item.price}.00</span></div>`).join('');
  }

  function goToCheckout() { toggleCart(); showScreen('checkout-screen'); }
  function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }

  function validateAndProcess() {
    if(!document.getElementById('ship-addr').value) return alert("Enter address");
    document.getElementById('loader').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('track-id').innerText = "LITH-" + Math.floor(Math.random()*90000000);
        showScreen('tracking-screen');
        cart = []; renderCart();
    }, 2800);
  }

  // Social Proof Frequency
  const visitors = ["Sarah", "Mark", "Julian", "Elena", "Marcus", "Lydia", "Clara", "Arthur"];
  function showSocial() {
      const toast = document.getElementById('social-toast');
      const text = document.getElementById('toast-text');
      text.innerText = `${visitors[Math.floor(Math.random()*visitors.length)]} from London just adopted a rock!`;
      toast.style.display = 'flex';
      setTimeout(() => toast.style.display = 'none', 4000);
  }
  setInterval(showSocial, 15000); // 15 Seconds
  setTimeout(showSocial, 2000);

  document.getElementById('exp-mm').addEventListener('input', function() { if(this.value.length === 2) document.getElementById('exp-yy').focus(); });
  document.getElementById('card-num').addEventListener('input', function() {
    let val = this.value.replace(/\D/g, '').substring(0, 16);
    let out = "";
    for(let i=0; i < val.length; i++) { if(i > 0 && i % 4 === 0) out += " "; out += val[i]; }
    this.value = out;
  });

  function filterItems(type, el) {
    document.querySelectorAll('.sidebar-list li').forEach(li => li.classList.remove('active'));
    el.classList.add('active');
    renderGrid(type === 'all' ? products : products.filter(p => p.type === type));
  }

  renderGrid();
</script>
</body>
</html>
