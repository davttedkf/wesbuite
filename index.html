<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumpy's Fun-Time Survey!</title>
    <style>
        :root { --main-yellow: #FFF176; --main-pink: #F06292; }
        body { 
            background: var(--main-yellow); 
            font-family: 'Comic Sans MS', cursive; 
            margin: 0; display: flex; align-items: center; 
            justify-content: center; height: 100vh; overflow: hidden;
            transition: background 5s, filter 5s;
        }

        /* SURVEY BOX */
        #survey-card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 10px 10px 0px var(--main-pink);
            text-align: center; width: 400px; z-index: 10;
        }

        #lumpy-img { width: 120px; margin-bottom: 20px; transition: 0.5s; }
        
        button {
            background: var(--main-pink); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-size: 18px;
            cursor: pointer; margin-top: 20px; font-family: inherit;
        }

        /* THE CAMERA BLOCKER */
        #camera-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; color: white; z-index: 100;
        }

        #camera-modal p { font-size: 20px; max-width: 300px; line-height: 1.5; }

        /* THE CORRUPTION */
        .uneasy { background: #0a0a0a !important; filter: sepia(1) contrast(1.2); }
        .uneasy #survey-card { box-shadow: 10px 10px 0px #300; color: #400; }
        .uneasy #lumpy-img { filter: grayscale(1) invert(1); transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="overlay" style="position:fixed; inset:0; background:white; z-index:1000; display:flex; align-items:center; justify-content:center;">
        <button onclick="startExperience()">START THE FUN!</button>
    </div>

    <div id="survey-card">
        <img src="lumpy.png" id="lumpy-img" alt="Lumpy">
        <h2 id="question-text">Hi! I'm Lumpy! Want to play a game?</h2>
        <div id="options">
            <button onclick="next(1)">YES!</button>
        </div>
    </div>

    <div id="camera-modal">
        <p>To continue the Fun-Time Survey, Lumpy needs to see your smile!</p>
        <button onclick="requestCamera()" style="background: #4CAF50;">AGREE & CONTINUE</button>
    </div>

    <audio id="bgm" loop src="https://www.soundjay.com/misc/sounds/music-box-1.mp3"></audio>

    <script>
        const qText = document.getElementById('question-text');
        const options = document.getElementById('options');
        const bgm = document.getElementById('bgm');
        const card = document.getElementById('survey-card');
        const modal = document.getElementById('camera-modal');

        let step = 0;

        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            bgm.volume = 0.4;
            bgm.play();
        }

        function next(val) {
            step++;
            if (step === 1) {
                qText.innerText = "Great! Question 1: Do you like snacks?";
                options.innerHTML = '<button onclick="next(1)">I LOVE THEM!</button>';
            } 
            else if (step === 2) {
                qText.innerText = "Question 2: Are you having a good night?";
                options.innerHTML = '<button onclick="next(1)">YES, VERY GOOD!</button>';
            }
            else if (step === 3) {
                // THE HIJACK
                modal.style.display = 'flex';
            }
        }

        async function requestCamera() {
            modal.style.display = 'none';
            
            // Actually request camera to make the light turn on
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
            } catch (e) {
                console.log("Camera denied, but the fear is already there.");
            }

            beginHorror();
        }

        function beginHorror() {
            document.body.classList.add('uneasy');
            bgm.playbackRate = 0.5; // Music warps and slows down
            
            qText.innerText = "Processing your data...";
            options.innerHTML = "";

            setTimeout(async () => {
                // Get Battery
                const battery = await navigator.getBattery();
                const batLevel = Math.floor(battery.level * 100);
                
                // Get Time & Location (Simulated IP Fetch)
                const now = new Date().toLocaleTimeString();
                
                qText.innerHTML = `
                    <span style="font-size:14px;">
                        DATA FOUND:<br>
                        TIME: ${now}<br>
                        POWER: ${batLevel}% AND DROPPING<br>
                        DEVICE: ${navigator.platform}<br>
                        <br>
                        I'm watching you through the lens, Alex. 
                        You're so quiet in Old Forge tonight.
                    </span>
                `;

                // The final psychological hit
                setTimeout(() => {
                    qText.innerHTML = "I can see you blinking. <br> Why don't you look behind you?";
                    bgm.pause();
                }, 8000);

            }, 3000);
        }
    </script>
</body>
</html>
