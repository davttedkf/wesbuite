<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control - Global Grid v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #060a0f;
  color: #7a9bb5;
  height: 100vh;
  overflow: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── LOGIN ── */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 10;
}
.login-box {
  background: #0c1219;
  border: 1px solid #1e3a5f;
  border-radius: 4px;
  padding: 36px 32px;
  width: 320px;
  text-align: center;
}
.login-box h2 {
  color: #e0eaf5;
  font-size: 15px;
  letter-spacing: 0.25em;
  margin-bottom: 4px;
}
.login-box .sub {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #ef4444;
  margin-bottom: 24px;
}
.login-box input {
  width: 100%;
  margin: 6px 0;
  padding: 10px 12px;
  background: #060a0f;
  border: 1px solid #1e3a5f;
  color: #c8ddef;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s;
}
.login-box input:focus { border-color: #3b82f6; }
.login-btn {
  width: 100%;
  margin-top: 12px;
  padding: 11px;
  background: #d4a54a;
  border: none;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #060a0f;
  border-radius: 2px;
  transition: background 0.2s;
}
.login-btn:hover { background: #e6b85a; }
.login-err { color: #ef4444; font-size: 11px; margin-top: 10px; }

/* ── DASHBOARD ── */
#dash {
  display: none;
  height: 100vh;
  flex-direction: column;
  position: relative;
  z-index: 1;
}
#dash.visible { display: flex; }
.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 16px;
  background: #0c1219;
  border-bottom: 1px solid #1a2a3a;
  font-size: 11px;
  letter-spacing: 0.12em;
  flex-shrink: 0;
  z-index: 5;
}
.topbar .logo { color: #d4a54a; font-weight: 700; font-size: 13px; letter-spacing: 0.3em; }
.topbar .stat { color: #4a7a9b; }
.topbar .stat span { color: #22c55e; }
.topbar #clock { color: #7a9bb5; margin-left: auto; }

.content { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  background: #0c1219;
  border-right: 1px solid #1a2a3a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-title {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #4a7a9b;
  padding: 12px 14px 8px;
  border-bottom: 1px solid #1a2a3a;
}
#info-panel {
  padding: 14px;
  border-bottom: 1px solid #1a2a3a;
  min-height: 180px;
}
#info-panel h3 { color: #e0eaf5; font-size: 13px; letter-spacing: 0.15em; margin-bottom: 10px; border-left: 2px solid #d4a54a; padding-left: 8px; }
#info-panel .row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid #0f1e2e; }
#info-panel .row .label { color: #4a7a9b; font-size: 9px; }
#info-panel .row .val { color: #c8ddef; }

.log-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.log-title { font-size: 10px; letter-spacing: 0.2em; color: #4a7a9b; padding: 10px 14px 6px; }
#logs { flex: 1; overflow-y: auto; padding: 0 14px 10px; }
.log-entry { font-size: 10px; padding: 3px 0; border-bottom: 1px solid #0f1e2e; line-height: 1.5; }
.log-entry .ts { color: #2a5a7a; }
.log-entry .msg { color: #5a8aaa; margin-left: 4px; }

/* ── MAP ── */
.map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #060a0f;
}
#map-svg {
  width: 100%;
  height: 100%;
  display: block;
}
.country {
  fill: #0f1e2e;
  stroke: #1a3550;
  stroke-width: 0.5;
  cursor: pointer;
  transition: fill 0.2s, stroke 0.2s;
}
.country:hover { 
  fill: #162a40; 
  stroke: #3b82f6;
}
.country.selected {
  fill: #0d2a45;
  stroke: #3b82f6;
  stroke-width: 1.2;
}
.country-glow {
  fill: none;
  stroke: #3b82f6;
  stroke-width: 3;
  opacity: 0;
  pointer-events: none;
}
.country-glow.active {
  opacity: 1;
  animation: countryPulse 2s ease-in-out infinite;
}
@keyframes countryPulse {
  0%, 100% { opacity: 0.6; stroke-width: 2; filter: drop-shadow(0 0 4px #3b82f6); }
  50%        { opacity: 0.2; stroke-width: 4; filter: drop-shadow(0 0 10px #3b82f6); }
}

.corner {
  position: absolute;
  width: 16px;
  height: 16px;
  border-color: #d4a54a;
  border-style: solid;
  opacity: 0.4;
  z-index: 3;
  pointer-events: none;
}
.corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
.corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
.corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>⬡ MISSION CONTROL</h2>
    <div class="sub">AUTHORIZED PERSONNEL ONLY</div>
    <input id="uname" placeholder="USERNAME" onkeydown="if(event.key==='Enter')tryLogin()">
    <input id="upass" type="password" placeholder="PASSWORD" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">ACCESS SYSTEM</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <span class="logo">⬡ MISSION CONTROL</span>
    <span class="stat">GRID <span>ACTIVE</span></span>
    <span class="stat">UPLINK <span>SECURED</span></span>
    <span id="clock">--:--:-- UTC</span>
  </div>

  <div class="content">
    <div class="sidebar">
      <div class="sidebar-title">// INTEL REPORT</div>
      <div id="info-panel">
        <div class="no-select" style="font-size:11px; color:#2a4a6a;">Scanning orbital sensors... Select territory for analysis.</div>
      </div>
      <div class="log-section">
        <div class="log-title">// SYSTEM UPLINK</div>
        <div id="logs"></div>
      </div>
    </div>

    <div class="map-wrap" id="map-wrap">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <svg id="map-svg"></svg>
    </div>
  </div>
</div>

<script>
var VALID_USER = "admin", VALID_PASS = "admin";

function tryLogin() {
  var u = document.getElementById("uname").value.trim();
  var p = document.getElementById("upass").value;
  if (u === VALID_USER && p === VALID_PASS) {
    document.getElementById("login").style.display = "none";
    document.getElementById("dash").classList.add("visible");
    initDash();
  } else {
    document.getElementById("lerr").textContent = "ACCESS DENIED";
  }
}

function startClock() {
  setInterval(() => {
    document.getElementById("clock").textContent = new Date().toUTCString().split(' ')[4] + " UTC";
  }, 1000);
}

function addLog(msg) {
  var logs = document.getElementById("logs");
  var entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = `<span class="ts">[${new Date().toLocaleTimeString()}]</span> <span class="msg">${msg}</span>`;
  logs.insertBefore(entry, logs.firstChild);
}

var projection, path, svgEl;

function initMap() {
  var wrap = document.getElementById("map-wrap");
  svgEl = d3.select("#map-svg").attr("viewBox", `0 0 ${wrap.clientWidth} ${wrap.clientHeight}`);
  projection = d3.geoNaturalEarth1().scale(wrap.clientWidth / 6.5).translate([wrap.clientWidth / 2, wrap.clientHeight / 2]);
  path = d3.geoPath().projection(projection);

  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    .then(r => r.json())
    .then(world => {
      var countries = topojson.feature(world, world.objects.countries);
      var names = getCountryNames();

      var glowLayer = svgEl.append("g");
      var countryLayer = svgEl.append("g");

      countryLayer.selectAll("path.country")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country")
        .attr("id", d => "c"+d.id)
        .attr("d", path)
        .on("click", (e, d) => {
          // Check for specific -99 disputed ID used in Natural Earth data
          var name = (d.id === "-99" || d.id === -99) ? "Disputed Territory" : (names[d.id] || "Classified Sector (" + d.id + ")");
          
          countryLayer.selectAll(".country").classed("selected", false);
          glowLayer.selectAll(".country-glow").classed("active", false);
          countryLayer.select("#c"+d.id).classed("selected", true);
          glowLayer.select("#g"+d.id).classed("active", true);

          showIntel(name, d.id);
          addLog("SCAN_SYNC: " + name.toUpperCase());
        });

      glowLayer.selectAll("path.country-glow")
        .data(countries.features)
        .enter().append("path")
        .attr("class","country-glow")
        .attr("id", d => "g"+d.id)
        .attr("d", path);
    });
}

function showIntel(name, id) {
  var panel = document.getElementById("info-panel");
  panel.innerHTML = `
    <h3>${name.toUpperCase()}</h3>
    <div class="row"><span class="label">REGISTRY_ID</span><span class="val">${id}</span></div>
    <div class="row"><span class="label">INTEL_STATUS</span><span class="val" style="color:#d4a54a">ACTIVE_SCAN</span></div>
    <div class="row"><span class="label">ENCRYPTION</span><span class="val">LEVEL_4</span></div>
    <div class="row"><span class="label">ORBITAL_SYNC</span><span class="val">OPTIMAL</span></div>
  `;
}

    688:"Serbia", 690:"Seychelles", 694:"Sierra Leone", 702:"Singapore", 703:"Slovakia", 704:"Vietnam", 705:"Slovenia", 706:"Somalia",

}

function initDash() {
  startClock();
  initMap();
  addLog("GRID_ONLINE // GLOBAL SCAN ACTIVE");
}
</script>
</body>
</html>
