<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumpy's Friend-Link v2.1</title>
    <style>
        :root {
            --win-bg: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #dfdfdf;
            --win-border-dark: #808080;
        }

        body, html {
            margin: 0; padding: 0; background-color: #008080;
            font-family: "Tahoma", sans-serif; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- THE DESKTOP --- */
        #desktop { position: fixed; inset: 0; z-index: 1; }

        .window {
            width: 450px; background: var(--win-bg);
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            padding: 2px; box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            position: relative; z-index: 100;
        }

        .title-bar {
            background: var(--win-blue); color: white; padding: 3px 6px;
            display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;
        }

        .tabs { display: flex; padding: 10px 10px 0 10px; gap: 2px; }
        .tab { 
            padding: 4px 12px; background: var(--win-bg); font-size: 11px;
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) transparent var(--win-border-light);
        }

        .content {
            margin: 0 10px 10px 10px; padding: 25px; text-align: center;
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            background: var(--win-bg);
        }

        /* --- ANIMATED LUMPY --- */
        #lumpy {
            width: 120px; image-rendering: pixelated;
            animation: lumpy-breathe 3s ease-in-out infinite;
        }
        @keyframes lumpy-breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.08, 0.92) translateY(3px); }
        }

        .dialog {
            background: white; border: 2px inset var(--win-border-dark);
            padding: 12px; margin: 15px 0; font-size: 12px; min-height: 40px; text-align: left;
        }

        /* --- THE INFO REVEAL (THE TABS) --- */
        #reveal-area { display: none; text-align: left; font-size: 11px; }
        .stat-line { margin: 8px 0; border-bottom: 1px solid #999; padding-bottom: 2px; opacity: 0; transition: opacity 0.5s; }
        .stat-val { color: var(--win-blue); font-weight: bold; float: right; }

        button {
            padding: 4px 20px; background: var(--win-bg); font-family: inherit;
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            cursor: pointer;
        }
        button:active { border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark); }

        /* --- CORRUPTION --- */
        .glitch { animation: shake 0.1s infinite; filter: invert(1) contrast(5); }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }
    </style>
</head>
<body>

    <div id="boot" style="position:fixed; inset:0; background:black; color:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace;">
        <p>LUMPY_OS v.1.9.9.8</p>
        <button onclick="init()">[ LOAD FRIENDSHIP.EXE ]</button>
    </div>

    <div class="window" id="main-win">
        <div class="title-bar"><span>Lumpy's Friend-Link</span><span>[X]</span></div>
        <div class="tabs"><div class="tab">General</div><div class="tab">Privacy</div><div class="tab">Connection</div></div>
        <div class="content">
            <img src="lumpy.png" id="lumpy">
            <div class="dialog" id="box">Hi! I'm Lumpy. I'm indexing your soul!</div>
            
            <div id="ui-main">
                <button onclick="startSurvey()">Begin Friendship Scan</button>
            </div>

            <div id="reveal-area">
                <div class="stat-line" id="s1">USER_PLATFORM: <span class="stat-val" id="v1">...</span></div>
                <div class="stat-line" id="s2">LOCAL_TIME: <span class="stat-val" id="v2">...</span></div>
                <div class="stat-line" id="s3">BATTERY_LIFE: <span class="stat-val" id="v3">...</span></div>
                <div class="stat-line" id="s4">STATUS: <span class="stat-val" id="v4">...</span></div>
            </div>
        </div>
    </div>

    <audio id="snd_startup" src="startup.mp3"></audio>
    <audio id="snd_click" src="click.mp3"></audio>
    <audio id="snd_talk" src="talk.mp3"></audio>
    <audio id="snd_alert" src="alert.mp3"></audio>
    <audio id="snd_hdd" loop src="hdd_scratch.mp3"></audio>
    <audio id="snd_horror" src="corruption.mp3"></audio>

    <script>
        const playSnd = (id) => { document.getElementById(id).currentTime = 0; document.getElementById(id).play(); };

        function init() {
            document.getElementById('boot').style.display = 'none';
            playSnd('snd_startup');
        }

        function startSurvey() {
            playSnd('snd_click');
            playSnd('snd_talk');
            document.getElementById('box').innerText = "Lumpy needs to look at you to confirm your identity. Please enable Optic Sensors.";
            document.getElementById('ui-main').innerHTML = '<button onclick="openCam()">ENABLE OPTICS</button>';
        }

        async function openCam() {
            playSnd('snd_click');
            try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch(e) {}
            
            document.getElementById('ui-main').style.display = 'none';
            document.getElementById('reveal-area').style.display = 'block';
            document.getElementById('box').innerText = "Scanning system files... do not move.";
            
            runDataReveal();
        }

        async function runDataReveal() {
            const battery = await navigator.getBattery();
            const time = new Date().toLocaleTimeString();
            
            const data = [
                {id: 's1', valId: 'v1', val: navigator.platform, msg: "Identifying hardware..."},
                {id: 's2', valId: 'v2', val: time, msg: "Syncing timeline..."},
                {id: 's3', valId: 'v3', val: Math.floor(battery.level * 100) + "%", msg: "Calculating remaining life..."},
                {id: 's4', valId: 'v4', val: "VULNERABLE", msg: "Analysis complete."}
            ];

            let i = 0;
            const revealLoop = () => {
                if (i < data.length) {
                    playSnd('snd_hdd');
                    document.getElementById('box').innerText = data[i].msg;
                    
                    setTimeout(() => {
                        document.getElementById('snd_hdd').pause();
                        playSnd('snd_alert');
                        document.getElementById(data[i].id).style.opacity = "1";
                        document.getElementById(data[i].valId).innerText = data[i].val;
                        i++;
                        setTimeout(revealLoop, 1500); // 1.5s delay between each reveal
                    }, 1000);
                } else {
                    setTimeout(triggerHorror, 2000);
                }
            };
            revealLoop();
        }

        function triggerHorror() {
            playSnd('snd_horror');
            document.body.classList.add('glitch');
            document.getElementById('lumpy').style.animation = "shake 0.05s infinite";
            document.getElementById('box').innerHTML = "<span style='color:red'>I'M NOT A FILE, " + (navigator.platform.includes('Mac') ? 'MAC' : 'USER') + ". I'M BEHIND YOU.</span>";
            
            setTimeout(() => {
                document.body.innerHTML = "<div style='color:white; background:black; height:100vh; display:flex; align-items:center; justify-content:center; font-size:10px;'>Look in the reflection of your monitor. I'm already there.</div>";
            }, 5000);
        }
    </script>
</body>
</html>
