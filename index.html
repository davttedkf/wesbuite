<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumpy's World - Interactive Edition</title>
    <style>
        :root {
            --win-bg: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #dfdfdf;
            --win-border-dark: #808080;
            --desktop-teal: #008080;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-color: black; font-family: "Tahoma", "MS Sans Serif", sans-serif;
            user-select: none; cursor: url('https://win98icons.alexmeub.com/cursors/arrow.cur'), auto;
        }

        /* --- BOOT SPLASH --- */
        #splash {
            position: fixed; inset: 0; background: black;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
        }
        #splash-img { width: 100%; height: 100%; object-fit: contain; }

        /* --- DESKTOP --- */
        #desktop { display: none; position: fixed; inset: 0; background-color: var(--desktop-teal); z-index: 1; }
        .taskbar {
            position: absolute; bottom: 0; width: 100%; height: 30px;
            background: var(--win-bg); border-top: 2px solid var(--win-border-light);
            display: flex; align-items: center; padding: 2px; z-index: 2000;
        }
        .start-btn {
            height: 24px; padding: 0 8px; display: flex; align-items: center; gap: 5px;
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            font-weight: bold; font-size: 12px;
        }

        /* --- ICONS --- */
        .icon { width: 75px; text-align: center; color: white; font-size: 11px; padding: 5px; position: absolute; cursor: pointer; }
        .icon img { width: 32px; display: block; margin: 0 auto 5px; pointer-events: none; }
        .icon span { display: inline-block; padding: 2px; pointer-events: none; text-shadow: 1px 1px black; }
        .icon.selected span { background-color: var(--win-blue); }

        /* --- WINDOWS --- */
        .window {
            position: absolute; background: var(--win-bg); 
            border: 2px solid; border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            padding: 2px; box-shadow: 1px 1px 0px black; display: none; z-index: 500;
        }
        .title-bar {
            background: var(--win-blue); color: white; padding: 3px 6px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 12px; cursor: move;
        }
        .window-body { border: 1px solid var(--win-border-dark); margin: 2px; padding: 15px; background: var(--win-bg); }

        /* --- PAINT TOOL --- */
        #paint-canvas { background: white; border: 2px inset var(--win-border-dark); cursor: crosshair; }
        .paint-controls { margin-top: 10px; display: flex; justify-content: space-between; }

        /* --- LUMPY CONTENT --- */
        #lumpy { width: 100px; animation: breathe 4s infinite ease-in-out; image-rendering: pixelated; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1, 0.9); } }
        .dialog { background: white; border: 2px inset var(--win-border-dark); padding: 12px; margin: 10px 0; font-size: 12px; text-align: left; }

        /* --- STATES --- */
        .anger-mode { filter: invert(1) contrast(5); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }

        #horror-overlay {
            position: fixed; inset: 0; background: black; color: #ff0000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 30000; font-family: monospace; text-align: center;
        }
        #clock { font-size: 11px; padding: 0 8px; border: 2px inset var(--win-border-light); margin-left: auto; }
    </style>
</head>
<body onclick="powerOn()">

    <div id="splash">
        <img id="splash-img" src="startup.jpg">
        <p style="color:white; font-size:10px; margin-top:20px;">Click to initialize hardware...</p>
    </div>

    <div id="desktop">
        <div class="icon" style="top:20px; left:20px;" ondblclick="openLumpy()">
            <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" style="filter:hue-rotate(280deg)"><span>Friendship.exe</span>
        </div>

        <div class="taskbar">
            <div class="start-btn"><img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16"> Start</div>
            <div id="clock"></div>
        </div>
    </div>

    <div id="win-lumpy" class="window" style="width: 420px; top: 10%; left: 30%; z-index: 1000;">
        <div class="title-bar"><span>Lumpy's World v2.5</span><button onclick="closeWin('win-lumpy')">X</button></div>
        <div class="window-body" style="text-align:center;">
            <img src="lumpy.png" id="lumpy">
            <div class="dialog" id="l-msg">Loading Lumpy...</div>
            
            <div id="survey-ui"></div>
            
            <div id="paint-ui" style="display:none;">
                <div style="font-size:11px; text-align:left; margin-bottom:5px;">Draw Lumpy's Portrait:</div>
                <canvas id="paint-canvas" width="300" height="200"></canvas>
                <div class="paint-controls">
                    <button onclick="checkDrawing()">Done!</button>
                    <button onclick="clearCanvas()">Clear</button>
                </div>
            </div>

            <div id="l-audit" style="text-align:left; font-size:11px; margin-top:10px; display:none;"></div>
        </div>
    </div>

    <div id="horror-overlay">
        <h1 id="error-title">SYSTEM_FATAL_ERROR</h1>
        <div id="scare-log" style="width: 380px; text-align: left; font-size: 14px;"></div>
    </div>

    <audio id="s_start" src="startup.mp3"></audio>
    <audio id="s_click" src="click.mp3"></audio>
    <audio id="s_talk" src="talk.mp3"></audio>
    <audio id="s_hdd" loop src="hdd_scratch.mp3"></audio>
    <audio id="s_alert" src="alert.mp3"></audio>
    <audio id="s_horror" src="corruption.mp3"></audio>

    <script>
        let booted = false;
        let pixelsDrawn = 0;
        let isDrawing = false;
        const play = (id) => { if(booted) { const a = document.getElementById(id); a.currentTime = 0; a.play(); } };

        function powerOn() {
            if (booted) return;
            booted = true;
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                play('s_start');
                updateClock(); setInterval(updateClock, 1000);
                initDraggable();
            }, 2000);
        }

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        function openApp(id) { document.getElementById(id).style.display = 'block'; play('s_click'); }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; play('s_click'); }

        // --- SURVEY LOGIC ---
        let step = 0;
        function openLumpy() {
            openApp('win-lumpy');
            play('s_talk');
            document.getElementById('l-msg').innerText = "Hi Alex! I'm Lumpy. I've been watching you through the files. Is it okay if I ask you a few personal questions?";
            document.getElementById('survey-ui').innerHTML = '<button onclick="nextStep()">Yes, friend!</button>';
        }

        function nextStep() {
            step++;
            play('s_click'); play('s_talk');
            if (step === 1) {
                document.getElementById('l-msg').innerText = "Do you ever feel like someone is standing behind you when you're alone at night?";
                document.getElementById('survey-ui').innerHTML = '<button onclick="nextStep()">Sometimes</button> <button onclick="nextStep()">Always</button>';
            } else if (step === 2) {
                document.getElementById('l-msg').innerText = "I love art! Can you draw a portrait of me so I can remember what I look like?";
                document.getElementById('survey-ui').style.display = 'none';
                document.getElementById('paint-ui').style.display = 'block';
                initPaint();
            }
        }

        // --- PAINT LOGIC ---
        function initPaint() {
            const canvas = document.getElementById('paint-canvas');
            const ctx = canvas.getContext('2d');
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = 'black';

            canvas.onmousedown = (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
            canvas.onmousemove = (e) => { 
                if (isDrawing) { 
                    ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); 
                    pixelsDrawn++; 
                } 
            };
            window.onmouseup = () => { isDrawing = false; };
        }

        function clearCanvas() {
            const canvas = document.getElementById('paint-canvas');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            pixelsDrawn = 0;
        }

        function checkDrawing() {
            play('s_click');
            if (pixelsDrawn < 400) {
                triggerAnger();
            } else {
                calmPath();
            }
        }

        function triggerAnger() {
            document.body.classList.add('anger-mode');
            play('s_horror');
            document.getElementById('l-msg').innerText = "THAT DOESN'T LOOK LIKE ME AT ALL, ALEX. WHY ARE YOU MOCKING ME?";
            document.getElementById('paint-ui').style.display = 'none';
            
            setTimeout(() => {
                document.body.classList.remove('anger-mode');
                document.getElementById('l-msg').innerText = "...I'm sorry. I lost my temper. You just... you mean so much to me. Let's continue.";
                setTimeout(calmPath, 3000);
            }, 5000);
        }

        function calmPath() {
            document.getElementById('paint-ui').style.display = 'none';
            document.getElementById('survey-ui').style.display = 'block';
            document.getElementById('l-msg').innerText = "That's better. Now, I need to 'borrow' your optics for a moment to finish the link.";
            document.getElementById('survey-ui').innerHTML = '<button onclick="startAudit()" style="background:#0f0;">ENABLE CAMERA</button>';
        }

        async function startAudit() {
            play('s_click');
            try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch(e) {}
            document.getElementById('survey-ui').style.display = 'none';
            document.getElementById('l-audit').style.display = 'block';
            
            const bat = await navigator.getBattery();
            const stats = [
                {l: "USER_ID", v: "ALEX_DAVITT"},
                {l: "HARDWARE", v: "MACBOOK_PRO"},
                {l: "TIME_STAMP", v: new Date().toLocaleTimeString()},
                {l: "POWER_LVL", v: Math.floor(bat.level * 100) + "%"}
            ];

            let i = 0;
            const reveal = () => {
                if (i < stats.length) {
                    play('s_hdd');
                    document.getElementById('l-msg').innerText = "Ripping " + stats[i].l + "...";
                    setTimeout(() => {
                        document.getElementById('s_hdd').pause(); play('s_alert');
                        const row = document.createElement('div');
                        row.className = 'stat-row';
                        row.innerHTML = `${stats[i].l}: <b style="float:right; color:blue;">${stats[i].v}</b>`;
                        document.getElementById('l-audit').appendChild(row);
                        setTimeout(() => row.style.opacity = 1, 50);
                        i++; setTimeout(reveal, 2500);
                    }, 1500);
                } else { theEnd(); }
            };
            reveal();
        }

        function theEnd() {
            play('s_horror');
            document.getElementById('win-lumpy').classList.add('glitch');
            setTimeout(() => {
                document.getElementById('horror-overlay').style.display = 'flex';
                const log = document.getElementById('scare-log');
                const lines = [
                    "> I SAVED THE DRAWING TO YOUR ROOT DIRECTORY.",
                    "> IT'S 2:20 AM. WHY AREN'T YOU SLEEPING?",
                    "> I CAN HEAR YOUR HEART BEATING THROUGH THE MIC.",
                    "> LOOK AT THE REFLECTION IN THE SCREEN. I'M SITTING RIGHT THERE."
                ];
                let j = 0;
                const type = () => {
                    if (j < lines.length) {
                        log.innerHTML += lines[j] + "<br>";
                        j++; setTimeout(type, 1500);
                    } else {
                        setTimeout(() => { document.body.innerHTML = "<div style='background:black; color:white; height:100vh; display:flex; align-items:center; justify-content:center; font-size:10px;'>Turn around, Alex.</div>"; }, 5000);
                    }
                };
                type();
            }, 2000);
        }

        function initDraggable() {
            let active = null; let offset = { x: 0, y: 0 };
            document.addEventListener('mousedown', (e) => {
                const target = e.target;
                if (target.closest('.icon')) { active = target.closest('.icon'); }
                else if (target.closest('.title-bar')) { active = target.closest('.window'); }
                if (active) { const rect = active.getBoundingClientRect(); offset.x = e.clientX - rect.left; offset.y = e.clientY - rect.top; }
            });
            document.addEventListener('mousemove', (e) => { if (active) { active.style.left = (e.clientX - offset.x) + 'px'; active.style.top = (e.clientY - offset.y) + 'px'; } });
            document.addEventListener('mouseup', () => { active = null; });
        }
    </script>
</body>
</html>
