<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE $1,000,000 IMPOSSIBLE CHALLENGE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f2ff;
            --money-green: #00ff88;
            --cup-red: #d00000;
            --bg-dark: #0a0a0c;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- UI OVERLAY --- */
        #ui-top {
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            border-bottom: 2px solid var(--neon-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .prize-pool {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3.5rem;
            color: var(--money-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            margin: 0;
        }

        .challenge-label {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            font-weight: 900;
        }

        /* --- THE STAGE --- */
        #stage {
            position: relative;
            width: 1000px;
            height: 500px;
            margin-top: 50px;
        }

        .cup-container {
            position: absolute;
            width: 140px;
            height: 180px;
            bottom: 50px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            transition: transform 0.2s;
        }

        /* THE REAL LOGO CUP */
        .cup {
            position: relative;
            width: 120px;
            height: 160px;
            background: var(--cup-red);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            border-bottom: 8px solid #800000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .cup::before {
            content: '';
            position: absolute;
            top: 0; width: 100%; height: 10px;
            background: #ff4d4d;
        }

        /* Custom Logo on Cup */
        .cup-logo {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cup-logo::after {
            content: '$';
            font-family: 'Archivo Black';
            font-size: 24px;
            color: white;
            opacity: 0.5;
        }

        .ball {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
            bottom: 60px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1;
            display: none;
        }

        .cup-number {
            position: absolute;
            top: -50px;
            font-family: 'Archivo Black';
            font-size: 40px;
            color: var(--neon-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- SCREEN STATES --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .btn-play {
            padding: 20px 60px;
            font-family: 'Archivo Black';
            font-size: 2rem;
            background: var(--neon-cyan);
            border: none;
            color: black;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        #message {
            font-family: 'Archivo Black';
            font-size: 3rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-top">
        <p class="challenge-label">The Impossible Challenge</p>
        <h1 class="prize-pool" id="prize">$1,000,000</h1>
    </div>

    <div id="stage">
        <div id="ball" class="ball"></div>

        <div class="cup-container" id="cup-0" style="left: 100px;">
            <div class="cup-number">1</div>
            <div class="cup">
                <div class="cup-logo"></div>
            </div>
        </div>

        <div class="cup-container" id="cup-1" style="left: 430px;">
            <div class="cup-number">2</div>
            <div class="cup">
                <div class="cup-logo"></div>
            </div>
        </div>

        <div class="cup-container" id="cup-2" style="left: 760px;">
            <div class="cup-number">3</div>
            <div class="cup">
                <div class="cup-logo"></div>
            </div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div style="font-size: 1.5rem; color: var(--neon-pink); margin-bottom: 10px;">MR BEAST PRESENTS</div>
        <div id="message">CAN YOU WIN THE MILLION?</div>
        <button class="btn-play" onclick="startGame()">PLAY NOW</button>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const cups = [
            document.getElementById('cup-0'),
            document.getElementById('cup-1'),
            document.getElementById('cup-2')
        ];
        const positions = [100, 430, 760];
        let cupOrder = [0, 1, 2]; // Tracks which cup is at which visual position
        let ballSlot = 0; // The index of the cup containing the ball
        let isSpinning = false;

        function startGame() {
            document.getElementById('menu-overlay').classList.add('hidden');
            ballSlot = Math.floor(Math.random() * 3);
            
            // 1. Show Ball
            const ballX = positions[ballSlot] + 50;
            ball.style.left = ballX + 'px';
            ball.style.display = 'block';

            // 2. Lift Cups
            gsap.to(".cup", { y: -150, duration: 0.6, stagger: 0.1, ease: "back.out" });

            // 3. Lower and Shuffle
            setTimeout(() => {
                gsap.to(".cup", { y: 0, duration: 0.5, ease: "power2.in", onComplete: startShuffle });
            }, 1500);
        }

        async function startShuffle() {
            isSpinning = true;
            ball.style.display = 'none';

            // IMPOSSIBLE LOGIC: 50 swaps, accelerating to lightspeed
            const totalSwaps = 50;
            
            for (let i = 0; i < totalSwaps; i++) {
                const [idxA, idxB] = getRandomPair();
                const speed = Math.max(0.05, 0.2 - (i * 0.004)); // Speeds up!
                
                await swapCups(idxA, idxB, speed);
                
                // Add screen shake at high speeds
                if (i > 30) {
                    gsap.to("#stage", { x: i%2===0?5:-5, y: i%2===0?-5:5, duration: 0.05 });
                }
            }

            gsap.to("#stage", { x: 0, y: 0, duration: 0.1 });
            endShuffle();
        }

        function getRandomPair() {
            let a = Math.floor(Math.random() * 3);
            let b;
            do { b = Math.floor(Math.random() * 3); } while (a === b);
            return [a, b];
        }

        function swapCups(idxA, idxB, speed) {
            return new Promise(resolve => {
                const posA = positions[cupOrder.indexOf(idxA)];
                const posB = positions[cupOrder.indexOf(idxB)];

                // Visual Swap
                gsap.to(cups[idxA], { left: posB, duration: speed, ease: "power2.inOut" });
                gsap.to(cups[idxB], { left: posA, duration: speed, ease: "power2.inOut", onComplete: resolve });

                // Update Logic Order
                const entryA = cupOrder.indexOf(idxA);
                const entryB = cupOrder.indexOf(idxB);
                [cupOrder[entryA], cupOrder[entryB]] = [cupOrder[entryB], cupOrder[entryA]];
            });
        }

        function endShuffle() {
            isSpinning = false;
            // Show Numbers
            gsap.to(".cup-number", { opacity: 1, duration: 0.5 });
            
            cups.forEach((cup, index) => {
                cup.onclick = () => selectCup(index);
            });
        }

        function selectCup(index) {
            if (isSpinning) return;
            
            // Move ball to chosen cup position logic
            const finalBallX = parseInt(cups[ballSlot].style.left) + 50;
            ball.style.left = finalBallX + 'px';
            ball.style.display = 'block';

            // Reveal All
            gsap.to(".cup", { y: -150, duration: 0.6, ease: "back.out" });
            gsap.to(".cup-number", { opacity: 0, duration: 0.2 });

            setTimeout(() => {
                const overlay = document.getElementById('menu-overlay');
                const msg = document.getElementById('message');
                overlay.classList.remove('hidden');
                
                if (index === ballSlot) {
                    msg.innerHTML = "🏆 YOU WON $1,000,000! 🏆";
                    msg.style.color = "var(--money-green)";
                } else {
                    msg.innerHTML = "❌ YOU LOST EVERYTHING! ❌";
                    msg.style.color = "var(--neon-pink)";
                    document.getElementById('prize').innerText = "$0";
                }
            }, 1000);
        }
    </script>
</body>
</html>
