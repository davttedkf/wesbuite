<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUP LEGENDS | PRO GAMBLER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060a;
            --panel: rgba(15, 18, 28, 0.8);
            --gold: #facc15;
            --cyan: #22d3ee;
            --red: #ef4444;
            --green: #10b981;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Archivo', sans-serif;
            height: 100vh; display: grid; grid-template-columns: 280px 1fr;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: rgba(0, 0, 0, 0.5); border-right: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .feed-title { font-size: 0.7rem; color: var(--cyan); letter-spacing: 2px; font-weight: 900; }
        .log-entry {
            background: var(--panel); padding: 10px; border-radius: 6px;
            font-size: 0.7rem; display: flex; justify-content: space-between;
            border-left: 3px solid var(--red);
        }
        .log-entry.win { border-left-color: var(--green); }

        /* --- MAIN AREA --- */
        .main { position: relative; display: flex; flex-direction: column; }
        
        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 900; font-size: 1.4rem; font-style: italic; }
        .logo span { color: var(--gold); }
        .balance-box {
            background: #000; padding: 10px 20px; border-radius: 8px;
            border: 1px solid var(--gold); font-family: 'JetBrains Mono'; color: var(--gold);
        }

        /* --- GAME STAGE --- */
        #stage {
            flex-grow: 1; position: relative; display: flex; justify-content: center;
            align-items: center; perspective: 1000px;
            background: radial-gradient(circle at 50% 100%, #1a1e36 0%, #05060a 100%);
        }

        .cup-item { position: absolute; width: 140px; cursor: pointer; }
        .cup-num {
            font-size: 3rem; font-weight: 900; color: rgba(255,255,255,0.05);
            text-align: center; margin-bottom: 20px; pointer-events: none;
        }
        .cup-visual {
            width: 130px; height: 170px; margin: 0 auto;
            background: linear-gradient(135deg, #ff3333 0%, #660000 100%);
            clip-path: polygon(12% 0%, 88% 0%, 100% 100%, 0% 100%);
            position: relative; border-bottom: 8px solid #330000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .cup-visual::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.3);
        }
        .beast-seal {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: url('https://upload.wikimedia.org/wikipedia/en/d/db/MrBeast_logo.svg') no-repeat center;
            background-size: contain; filter: brightness(0) invert(1); opacity: 0.15;
        }

        .ball {
            position: absolute; width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%, #fff, #777);
            border-radius: 50%; display: none; bottom: 100px;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        /* --- CONTROLS --- */
        .controls {
            height: 140px; background: #0a0c14; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-evenly; padding: 0 40px;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .label { font-size: 0.65rem; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .input-display {
            background: #161b22; padding: 12px 20px; border-radius: 6px;
            font-family: 'JetBrains Mono'; border: 1px solid #222; min-width: 140px;
        }

        .go-btn {
            width: 100px; height: 100px; border-radius: 50%; background: #fff;
            color: #000; border: 8px solid #1a1e26; font-weight: 900;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            margin-top: -50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .go-btn:hover { background: var(--gold); transform: scale(1.05); }
        .go-btn:disabled { opacity: 0.1; filter: grayscale(1); }

        /* --- NOTIFICATIONS --- */
        #notif-container {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            padding: 15px 25px; border-radius: 8px; background: var(--panel);
            backdrop-filter: blur(10px); border: 1px solid var(--border);
            font-weight: 700; font-size: 0.9rem; animation: slideToast 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; gap: 12px;
        }
        @keyframes slideToast { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.win { border-left: 5px solid var(--green); color: var(--green); }
        .toast.loss { border-left: 5px solid var(--red); color: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

    <aside class="sidebar">
        <div class="feed-title">REAL-TIME CHALLENGE LOG</div>
        <div id="feed"></div>
    </aside>

    <div class="main">
        <header>
            <div class="logo">CUP<span>LEGENDS</span></div>
            <div class="balance-box" id="balance">150 191.57 FUN</div>
        </header>

        <div id="stage">
            <div id="the-ball" class="ball"></div>
            <div class="cup-item" id="c0" style="left: calc(50% - 320px);">
                <div class="cup-num">1</div>
                <div class="cup-visual"><div class="beast-seal"></div></div>
            </div>
            <div class="cup-item" id="c1" style="left: calc(50% - 65px);">
                <div class="cup-num">2</div>
                <div class="cup-visual"><div class="beast-seal"></div></div>
            </div>
            <div class="cup-item" id="c2" style="left: calc(50% + 190px);">
                <div class="cup-num">3</div>
                <div class="cup-visual"><div class="beast-seal"></div></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <div class="label">Multiplier</div>
                <div class="input-display" style="color:var(--green)">x3.00</div>
            </div>
            <button class="go-btn" id="go-btn" onclick="Game.play()">GO!</button>
            <div class="control-group">
                <div class="label">Bet Amount</div>
                <div class="input-display">1.50 FUN</div>
            </div>
        </div>
    </div>

    <div id="notif-container"></div>

    <script>
        // --- AUDIO ENGINE (Synthesized) ---
        const AudioFX = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(freq, type, dur, vol = 0.1) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            },
            click() { this.play(800, 'sine', 0.1); },
            whoosh() { this.play(150, 'triangle', 0.2, 0.05); },
            win() { 
                this.play(523.25, 'sine', 0.1); 
                setTimeout(() => this.play(659.25, 'sine', 0.1), 100);
                setTimeout(() => this.play(783.99, 'sine', 0.3), 200);
            },
            loss() { this.play(100, 'sawtooth', 0.4, 0.05); }
        };

        const Game = (function() {
            const state = {
                ballSlot: 0,
                isBusy: false,
                cupOrder: [0, 1, 2],
                balance: 150191.57,
                positions: [0,0,0]
            };

            function notify(msg, type) {
                const container = document.getElementById('notif-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span>${type === 'win' ? '✅' : '❌'}</span> ${msg}`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }

            // Fake Live Feed
            setInterval(() => {
                const feed = document.getElementById('feed');
                const win = Math.random() > 0.8;
                const entry = document.createElement('div');
                entry.className = `log-entry ${win ? 'win' : ''}`;
                entry.innerHTML = `<span>User_${Math.floor(Math.random()*999)}</span> <span>${win ? '+' : '-'}${win ? '4.50' : '1.50'} FUN</span>`;
                feed.prepend(entry);
                if(feed.children.length > 10) feed.lastChild.remove();
            }, 3000);

            return {
                play: function() {
                    if (state.isBusy) return;
                    AudioFX.click();
                    state.isBusy = true;
                    document.getElementById('go-btn').disabled = true;

                    state.balance -= 1.50;
                    document.getElementById('balance').innerText = state.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " FUN";

                    const ball = document.getElementById('the-ball');
                    const cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    state.positions = cups.map(c => c.offsetLeft);

                    // 1. Initial Position
                    state.ballSlot = Math.floor(Math.random() * 3);
                    gsap.set(ball, { left: state.positions[state.ballSlot] + 50, display: 'block', bottom: 100 });
                    
                    // 2. Reveal then Shuffle
                    gsap.to(".cup-visual", { y: -160, duration: 0.6, ease: "power2.out", stagger: 0.1 });
                    
                    setTimeout(() => {
                        gsap.to(".cup-visual", { y: 0, duration: 0.4, onComplete: () => this.shuffle() });
                    }, 1200);
                },

                shuffle: async function() {
                    document.getElementById('the-ball').style.display = 'none';
                    const cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    
                    for (let i = 0; i < 50; i++) {
                        let a = Math.floor(Math.random() * 3);
                        let b; do { b = Math.floor(Math.random() * 3); } while (a === b);
                        
                        const speed = Math.max(0.05, 0.22 - (i * 0.005));
                        AudioFX.whoosh();
                        
                        const pA = state.positions[state.cupOrder.indexOf(a)];
                        const pB = state.positions[state.cupOrder.indexOf(b)];

                        gsap.to(cups[a], { left: pB, duration: speed, ease: "sine.inOut" });
                        await gsap.to(cups[b], { left: pA, duration: speed, ease: "sine.inOut" });

                        const iA = state.cupOrder.indexOf(a);
                        const iB = state.cupOrder.indexOf(b);
                        [state.cupOrder[iA], state.cupOrder[iB]] = [state.cupOrder[iB], state.cupOrder[iA]];
                    }
                    this.enableSelection();
                },

                enableSelection: function() {
                    gsap.to(".cup-num", { opacity: 1, color: "var(--cyan)" });
                    const cups = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
                    cups.forEach((c, i) => {
                        c.onclick = () => this.reveal(i);
                    });
                    state.isBusy = false;
                },

                reveal: function(choice) {
                    if(state.isBusy) return;
                    state.isBusy = true;

                    // THE RIG: 85% Chance you lose.
                    const forceLoss = Math.random() < 0.85;
                    if (forceLoss && choice === state.ballSlot) {
                        state.ballSlot = (choice + 1) % 3; // Shift ball away
                    }

                    const won = (choice === state.ballSlot);
                    const ball = document.getElementById('the-ball');
                    const finalX = state.positions[state.cupOrder.indexOf(state.ballSlot)] + 50;
                    
                    gsap.set(ball, { left: finalX, display: 'block' });
                    gsap.to(".cup-visual", { y: -160, duration: 0.8, ease: "back.out", stagger: 0.05 });
                    gsap.to(".cup-num", { opacity: 0 });

                    setTimeout(() => {
                        if (won) {
                            AudioFX.win();
                            state.balance += 4.50;
                            notify("JACKPOT! +4.50 FUN Credited.", "win");
                        } else {
                            AudioFX.loss();
                            notify("FAILED. Try again to recover losses.", "loss");
                        }
                        document.getElementById('balance').innerText = state.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " FUN";
                        this.reset();
                    }, 1000);
                },

                reset: function() {
                    setTimeout(() => {
                        gsap.to(".cup-visual", { y: 0, duration: 0.5 });
                        document.getElementById('the-ball').style.display = 'none';
                        document.getElementById('go-btn').disabled = false;
                        state.isBusy = false;
                    }, 1000);
                }
            };
        })();
    </script>
</body>
</html>
